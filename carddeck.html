<!DOCTYPE html>
<!-- KIMANUS Card-Deck Prototyp v1.1 - Buero-Metapher Hauptscreen -->
<!-- BEREICHE: B1=Header, B2=Status, B3=Schnellzugriff, B4=Karussell1, B5=CardGrid, B6=Karussell2, B7=Buecherregal, B8=Karussell3+Ablage, B9=CommBar -->
<html lang="de" style="color-scheme:dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111111">
<title>KIMANUS - Card Deck</title>
<style>
/* === RESET & BASE === */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100dvh;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0e0e0e;color:#e0e0e0;color-scheme:dark}

:root{
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --kim-red:#e63946;
  --kai-blue:#4a90d9;
  --manus-gold:#d4a017;
  --bg-dark:#0e0e0e;
  --panel-bg:#141414;
  --border-subtle:rgba(255,255,255,0.08);
  --border-light:rgba(255,255,255,0.15);
  --text-primary:#e0e0e0;
  --text-dim:#888;
  --text-muted:#555;
  --radius:10px;
  --radius-sm:6px;
}

#app{
  display:flex;flex-direction:column;height:100dvh;
  padding-top:var(--sat);padding-bottom:var(--sab);
  max-width:430px;margin:0 auto;
  position:relative;overflow:hidden;
}

/* =========================================
   1. HEADER
   ========================================= */
#header{
  display:flex;align-items:center;gap:8px;
  padding:12px 12px;
  background:linear-gradient(180deg,#363636 0%,#2a2a2a 30%,#2e2e2e 70%,#333 100%);
  border-bottom:1px solid #444;
  box-shadow:0 4px 16px rgba(0,0,0,.6);
  flex-shrink:0;z-index:10;
}
.logo-circle{
  width:36px;height:36px;border-radius:50%;
  background:var(--kim-red);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:18px;color:#fff;
  box-shadow:0 2px 8px rgba(230,57,70,.4);
  flex-shrink:0;
}
#header .title{flex:1;font-size:18px;font-weight:800;letter-spacing:3px;text-transform:uppercase}
.hdr-btn{
  width:36px;height:36px;border-radius:8px;border:none;
  background:transparent;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.hdr-btn:active{transform:scale(.9);opacity:.7}
.hdr-btn svg{width:22px;height:22px;fill:currentColor}

/* =========================================
   2. STATUS-LEISTE
   ========================================= */
#status-bar{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;
  background:linear-gradient(90deg,rgba(74,144,217,.15) 0%,rgba(74,144,217,.05) 100%);
  border-bottom:1px solid var(--border-subtle);
  flex-shrink:0;cursor:pointer;
  transition:background .3s;
}
#status-bar:active{background:rgba(255,255,255,.05)}
#status-bar .agent-dot{
  width:8px;height:8px;border-radius:50%;
  background:#4caf50;flex-shrink:0;
  box-shadow:0 0 6px rgba(76,175,80,.5);
}
#status-bar .agent-icon{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;flex-shrink:0;
}
#status-bar .agent-name{font-size:13px;font-weight:600;letter-spacing:1px;flex:1}
#status-bar .agent-role{font-size:10px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase}

/* Agent-Farben fuer Status-Leiste */
#status-bar[data-agent="kim"]{background:linear-gradient(90deg,rgba(230,57,70,.15) 0%,rgba(230,57,70,.03) 100%)}
#status-bar[data-agent="kim"] .agent-icon{background:var(--kim-red)}
#status-bar[data-agent="kai"]{background:linear-gradient(90deg,rgba(74,144,217,.15) 0%,rgba(74,144,217,.03) 100%)}
#status-bar[data-agent="kai"] .agent-icon{background:var(--kai-blue)}
#status-bar[data-agent="manus"]{background:linear-gradient(90deg,rgba(212,160,23,.15) 0%,rgba(212,160,23,.03) 100%)}
#status-bar[data-agent="manus"] .agent-icon{background:var(--manus-gold)}

/* =========================================
   3. SCROLLABLE CONTENT
   ========================================= */
#main-scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:8px 10px;
  display:flex;flex-direction:column;gap:8px;
}

/* =========================================
   4. SCHNELLZUGRIFF
   ========================================= */
/* =========================================
   B3. SCHLIESSFACH & POSTFACH (Metalltuer)
   ========================================= */
.locker-header{
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--text-dim);padding:6px 10px 2px;
  flex-shrink:0;
}
.locker-row{
  display:grid;grid-template-columns:1fr 1fr;gap:4px;
  padding:4px 10px 6px;flex-shrink:0;
  margin-bottom:10px;
}
.locker{
  flex:1;cursor:pointer;
  transition:transform .15s;
}
.locker:active{transform:scale(.97)}
.locker-door{
  height:52px;
  border-radius:2px;/* Eckig wie echtes Schliessfach! */
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  position:relative;
  /* Gebuerstetes Metall */
  background:linear-gradient(180deg,#4a4a4a 0%,#3a3a3a 15%,#404040 30%,#383838 50%,#3c3c3c 70%,#353535 85%,#3a3a3a 100%);
  border:1px solid #555;
  border-top:1px solid #666;
  border-bottom:2px solid #2a2a2a;
  box-shadow:0 3px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.12),inset 0 -1px 0 rgba(0,0,0,.3);
}
/* Horizontale Buerststreifen */
.locker-door::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255,255,255,.02) 2px,
    rgba(255,255,255,.02) 3px
  );
  border-radius:2px;
  pointer-events:none;
}
.locker-label{
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,.7);
  text-shadow:0 1px 2px rgba(0,0,0,.5);
}
.locker-sublabel{
  font-size:7px;font-weight:600;letter-spacing:1.5px;
  color:rgba(255,255,255,.35);
}
/* Schluesselloch */
.locker-keyhole{
  display:flex;align-items:center;justify-content:center;
}
.keyhole-outer{
  width:14px;height:14px;border-radius:50%;
  background:linear-gradient(145deg,#555 0%,#333 100%);
  border:1px solid #666;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
}
.keyhole-inner{
  width:4px;height:4px;border-radius:50%;
  background:#1a1a1a;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.8);
}
.keyhole-slot{
  width:2px;height:4px;
  background:#1a1a1a;
  margin-top:-1px;
  box-shadow:inset 0 1px 1px rgba(0,0,0,.8);
}
/* Postfach = blaeulicher Stahl */
.postfach-locker .locker-door{
  background:linear-gradient(180deg,#3a4555 0%,#2e3a48 15%,#334050 30%,#2c3645 50%,#303c4c 70%,#2a3442 85%,#2e3848 100%);
  border-color:#4a6080;border-top-color:#5a7090;
}
.postfach-locker .locker-label{color:rgba(140,180,220,.9)}
.postfach-locker .locker-sublabel{color:rgba(140,180,220,.4)}
/* Schliessfach = goldener Stahl */
.schliessfach-locker .locker-door{
  background:linear-gradient(180deg,#4a4535 0%,#3a3828 15%,#404030 30%,#383528 50%,#3c3a2c 70%,#353225 85%,#3a3828 100%);
  border-color:#6a6040;border-top-color:#7a7050;
}
.schliessfach-locker .locker-label{color:rgba(220,200,140,.9)}
.schliessfach-locker .locker-sublabel{color:rgba(220,200,140,.4)}

/* =========================================
   5. KARUSSELL (wiederverwendbar)
   ========================================= */
.carousel{margin:0 -10px}
.carousel-header{
  display:flex;align-items:center;padding:0 10px;
}
.carousel-tabs{
  display:flex;gap:0;overflow-x:auto;flex:1;
  scrollbar-width:none;-ms-overflow-style:none;
  scroll-snap-type:x mandatory;
  padding:4px 0;
}
.carousel-tabs::-webkit-scrollbar{display:none}
.carousel-tab{
  flex-shrink:0;padding:6px 14px;
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--text-dim);cursor:pointer;
  border-bottom:2px solid transparent;
  scroll-snap-align:start;
  white-space:nowrap;
  transition:color .2s,border-color .2s;
}
.carousel-tab:hover{color:var(--text-primary)}
.carousel-tab.active{color:var(--kim-red);border-bottom-color:var(--kim-red)}
.carousel-arrow{
  width:28px;height:28px;border:none;background:transparent;
  color:var(--text-dim);cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.carousel-arrow:active{color:var(--text-primary)}

/* =========================================
   6. CARD GRID (3x3)
   ========================================= */
.card-grid-wrap{padding:0 10px}
.card-grid{
  display:grid;grid-template-rows:1fr 1fr 1fr;
  grid-auto-columns:calc((100% - 18px) / 4);
  grid-auto-flow:column;
  gap:6px;
  padding:6px 0;
  overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x mandatory;/* Klack-Klack Raster! */
}
.card-grid::-webkit-scrollbar{display:none}
.card-item{scroll-snap-align:start}/* Jede Karte = Rasterpunkt */
.card-item{
  aspect-ratio:85.6/54;border-radius:var(--radius-sm);/* EC-Karten-Format 85.6x54mm */
  background:linear-gradient(160deg,#1a1a1a 0%,#141414 40%,#181818 100%);
  border:1px solid var(--border-subtle);
  box-shadow:inset 0 3px 10px rgba(0,0,0,.6);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  cursor:pointer;transition:transform .15s,border-color .2s;
  padding:8px;overflow:hidden;
}
.card-item:active{transform:scale(.95);border-color:var(--border-light)}
.card-item .card-icon{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.card-item .card-icon svg{width:18px;height:18px;fill:currentColor}
.card-item .card-label{
  font-size:8px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
  color:var(--text-dim);text-align:center;line-height:1.1;
  max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
/* Agent-Karten Farben */
.card-item[data-type="kim"] .card-icon{background:rgba(230,57,70,.2);color:var(--kim-red)}
.card-item[data-type="kai"] .card-icon{background:rgba(74,144,217,.2);color:var(--kai-blue)}
.card-item[data-type="manus"] .card-icon{background:rgba(212,160,23,.2);color:var(--manus-gold)}
.card-item[data-type="agent"] .card-icon{background:rgba(76,175,80,.2);color:#4caf50}
.card-item[data-type="add"]{border-style:dashed;border-color:var(--text-muted)}
.card-item[data-type="add"] .card-icon{color:var(--text-muted);font-size:28px}

/* =========================================
   7. BUECHERREGAL
   ========================================= */
.bookshelf{
  padding:0 0 0;
  position:relative;overflow:hidden;
}
.shelf-row{
  display:flex;gap:4px;align-items:flex-end;
  padding:4px 10px 4px;
  overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x mandatory;/* Klack-Klack Raster! */
}
.shelf-row::-webkit-scrollbar{display:none}
.book{scroll-snap-align:start}/* Jeder Ordner = Rasterpunkt */
.shelf-row::-webkit-scrollbar{display:none}
.book{
  flex-shrink:0;width:50px;border-radius:3px;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  cursor:pointer;transition:transform .15s;
  padding:4px 2px;position:relative;
}
.book:active{transform:translateY(-4px)}
.book-spine{
  width:100%;border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:2px 0 4px rgba(0,0,0,.4),-1px 0 2px rgba(255,255,255,.05);
}
.book-label{
  font-size:7px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  color:rgba(255,255,255,.9);writing-mode:vertical-lr;text-orientation:mixed;
  padding:4px 0;
}
/* Buch-Farben */
/* Alle Ordner gleiche Hoehe, unterschiedliche Breite */
.book .book-spine{height:130px}
.book.green .book-spine{background:linear-gradient(180deg,#2d6a2d 0%,#1e4d1e 100%)}
.book.blue .book-spine{background:linear-gradient(180deg,#2d4a6a 0%,#1e3350 100%)}
.book.red .book-spine{background:linear-gradient(180deg,#6a2d2d 0%,#501e1e 100%)}
.book.gold .book-spine{background:linear-gradient(180deg,#6a5a2d 0%,#504420 100%)}
.book.purple .book-spine{background:linear-gradient(180deg,#4a2d6a 0%,#351e50 100%)}
.book.gray .book-spine{background:linear-gradient(180deg,#444 0%,#333 100%)}
/* Breiten-Varianten (schmaler, naeher zusammen) */
.book.thin{width:20px}
.book.normal{width:30px}
.book.thick{width:40px}
.book.extra{width:50px}


/* =========================================
   8. ABLAGE
   ========================================= */
/* Ablage-Header */
.ablage-header{
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--text-dim);padding:4px 10px 2px;
  flex-shrink:0;
}
/* Ablage = festes 2x2 Grid, gleiche Breite wie Karten */
.ablage-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:4px;
  padding:0 10px;
  align-content:end;
  flex-shrink:0;
}
.ablage-tray{
  height:34px;
  background:linear-gradient(180deg,#2a2a2a 0%,#222 60%,#1e1e1e 100%);
  border:1px solid var(--border-subtle);
  border-radius:3px;
  position:relative;
  display:flex;align-items:center;padding:0 8px;gap:6px;
  cursor:pointer;
  transition:background .15s;
}
.ablage-tray:active{background:#2e2e2e}
/* Vorderkante/Lippe wie echte Briefablage */
.ablage-tray::before{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:3px;border-radius:0 0 3px 3px;
  background:linear-gradient(180deg,#444 0%,#333 100%);
  box-shadow:0 2px 3px rgba(0,0,0,.3);
}
/* Griff-Ausschnitt */
.ablage-tray::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:36px;height:5px;
  background:linear-gradient(180deg,#1a1a1a 0%,#111 100%);
  border-radius:5px 5px 0 0;
  border:1px solid var(--border-subtle);border-bottom:none;
}
.ablage-tray .tray-icon{font-size:12px;flex-shrink:0}
.ablage-tray .tray-label{
  font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
  color:var(--text-dim);flex:1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.ablage-tray .badge{
  background:var(--kim-red);color:#fff;font-size:7px;font-weight:700;
  padding:1px 4px;border-radius:8px;min-width:14px;text-align:center;flex-shrink:0;
}
/* Postfach = gold/sicher */
.ablage-tray.postfach{border-left:3px solid var(--manus-gold)}
.ablage-tray.postfach .tray-label{color:var(--manus-gold)}

/* =========================================
   9. COMM-BAR (fest unten)
   ========================================= */
#comm-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 8px;padding-bottom:calc(14px + var(--sab));
  background:linear-gradient(180deg,#2a2a2a 0%,#222 50%,#1e1e1e 100%);
  border-top:1px solid #444;
  box-shadow:0 -4px 16px rgba(0,0,0,.6);
  flex-shrink:0;z-index:10;
}
.comm-group{
  display:flex;align-items:center;gap:8px;
}
.comm-group.center{gap:10px}
.comm-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;
}
.comm-btn:active{transform:scale(.9)}
/* Grosse Buttons (KAI + KIM) */
.comm-btn .btn-circle{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:14px;color:#fff;
  transition:transform .15s;
}
/* Kleine Buttons (Setup, Mikro, Chat, Home) */
.comm-btn .btn-circle-sm{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,background .15s;
}
.comm-btn:active .btn-circle-sm{background:rgba(255,255,255,.15)}
/* KAI = blau */
.comm-btn.kai .btn-circle{background:var(--kai-blue);box-shadow:0 2px 8px rgba(74,144,217,.3);font-size:12px}
/* KIM rechts = rot */
.comm-btn.kim-right .btn-circle{background:var(--kim-red);box-shadow:0 2px 8px rgba(230,57,70,.3);font-size:11px}
/* Eck-Buttons (Setup + Home) kleiner */
.comm-btn.corner-btn .btn-circle-sm{width:28px;height:28px}
/* Grosser KIM-Button in der Mitte */
.comm-btn.kim-main .btn-circle{
  width:56px;height:56px;
  background:radial-gradient(circle at 30% 30%,#ff4d5a 0%,var(--kim-red) 50%,#b81c2a 100%);
  box-shadow:0 4px 16px rgba(230,57,70,.5),0 0 30px rgba(230,57,70,.2);
  font-size:22px;margin-top:-8px;
  border:2px solid rgba(255,255,255,.15);
}
.comm-btn.kim-main:active .btn-circle{box-shadow:0 2px 8px rgba(230,57,70,.5)}

/* =========================================
   UTILITY
   ========================================= */
.section-divider{
  height:1px;background:var(--border-subtle);margin:2px 0;
}
</style>
</head>
<body>

<div id="app">

  <!-- B1. HEADER -->
  <div id="header">
    <div class="logo-circle">K</div>
    <span class="title">KIMANUS</span>
    <button class="hdr-btn" onclick="alert('QR Scanner oeffnen')">
      <svg viewBox="0 0 24 24"><path d="M3 11h2V9H3v2zm0-4h2V5h2V3H3v4zm4 12h2v-2H7v2zm8-16v2h2v2h2V3h-4zm-4 16h2v-2h-2v2zm-8 0h4v-2H5v-2H3v4zm16-4h2v4h-4v-2h2v-2zm0-4h2V9h-2v2zm0 0h-2v4h-2v2h2v-2h2v-4zm-8-2V7h2V5h-4v2h-2v2h4zm-4 8v2h4v-4h-2v2H9zm4-4h4V9h-2v2h-2v2zm2-8h2v2h-2V3z"/></svg>
    </button>
  </div>

  <!-- B2. STATUS-LEISTE -->
  <div id="status-bar" data-agent="kai" onclick="cycleAgent()">
    <div class="agent-dot"></div>
    <div class="agent-icon" id="status-icon">KAI</div>
    <div style="display:flex;flex-direction:column;flex:1">
      <span class="agent-name" id="status-name">KAI</span>
      <span class="agent-role" id="status-role">Business-Agent</span>
    </div>
    <svg width="16" height="16" fill="#555" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
  </div>

  <!-- SCROLLABLE CONTENT (oben - Platz fuer KIMANUS/KAI) -->
  <div id="main-scroll">
    <!-- Hier kommt spaeter mehr Inhalt rein (Visitenkarten gross, Agent-Details etc.) -->
  </div>

  <!-- B4. KARUSSELL 1 - Kategorien (fest, ueber Cards) -->
  <div class="carousel" id="carousel-1" style="flex-shrink:0;margin:0">
    <div class="carousel-header">
      <button class="carousel-arrow" onclick="scrollCarousel('cat-tabs',-1)">&lt;</button>
      <div class="carousel-tabs" id="cat-tabs">
        <div class="carousel-tab active" onclick="switchCategory('agenten',this)">Agenten</div>
        <div class="carousel-tab" onclick="switchCategory('clubcard',this)">Clubcard</div>
        <div class="carousel-tab" onclick="switchCategory('webseiten',this)">Webseiten</div>
        <div class="carousel-tab" onclick="switchCategory('bilderrahmen',this)">Bilderrahmen</div>
        <div class="carousel-tab" onclick="switchCategory('capcoin',this)">Cap-Coin</div>
        <div class="carousel-tab" onclick="switchCategory('apps',this)">Meine Apps</div>
      </div>
      <button class="carousel-arrow" onclick="scrollCarousel('cat-tabs',1)">&gt;</button>
    </div>
  </div>

  <!-- B5. CARD GRID (fest, 3x4 mit Slider) -->
  <div class="card-grid-wrap" style="flex-shrink:0">
    <div class="card-grid" id="card-grid">
      <!-- Wird dynamisch befuellt via JS -->
    </div>
  </div>

  <!-- B6. KARUSSELL 2 - Buecherregal (fest, ueber Ablage) -->

// Drag-to-Scroll + Endlos-Karussell
function setupInfiniteScroll(el) {
  if (!el || el.scrollWidth <= el.clientWidth) return;
  if (el.dataset.infinite === 'true') return;
  el.dataset.infinite = 'true';

  // === DRAG-TO-SCROLL (Maus + Touch) ===
  let isDragging = false, startX = 0, startScroll = 0;

  el.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.pageX;
    startScroll = el.scrollLeft;
    el.style.cursor = 'grabbing';
    el.style.scrollSnapType = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.pageX - startX;
    el.scrollLeft = startScroll - dx;
  });

  document.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    el.style.cursor = 'grab';
    el.style.scrollSnapType = 'x mandatory';
    // Endlos-Check nach Drag
    setTimeout(() => loopCheck(el), 200);
  });

  el.style.cursor = 'grab';

  // === ENDLOS-LOOP ===
  function loopCheck(container) {
    const maxScroll = container.scrollWidth - container.clientWidth;
    const threshold = 50;

    if (container.scrollLeft >= maxScroll - threshold) {
      // Am Ende: erste 4 Elemente ans Ende schieben
      container.style.scrollSnapType = 'none';
      container.style.scrollBehavior = 'auto';
      for (let i = 0; i < 4; i++) {
        if (container.children.length < 2) break;
        const first = container.children[0];
        const w = first.getBoundingClientRect().width + 4;
        container.appendChild(first);
        container.scrollLeft = Math.max(0, container.scrollLeft - w);
      }
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          container.style.scrollSnapType = 'x mandatory';
          container.style.scrollBehavior = '';
        });
      });
    } else if (container.scrollLeft <= threshold) {
      // Am Anfang: letzte 4 Elemente an den Anfang
      container.style.scrollSnapType = 'none';
      container.style.scrollBehavior = 'auto';
      for (let i = 0; i < 4; i++) {
        if (container.children.length < 2) break;
        const last = container.children[container.children.length - 1];
        const w = last.getBoundingClientRect().width + 4;
        container.insertBefore(last, container.children[0]);
        container.scrollLeft = container.scrollLeft + w;
      }
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          container.style.scrollSnapType = 'x mandatory';
          container.style.scrollBehavior = '';
        });
      });
    }
  }

  // Auch bei normalem Scroll (Touchscreen, Trackpad)
  let scrollTimer = null;
  el.addEventListener('scroll', () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
      if (!isDragging) loopCheck(el);
    }, 250);
  });
}
