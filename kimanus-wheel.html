<!DOCTYPE html>
<!-- KIMANUS Wheel v2.0 - Echte 3D-Drehanimation -->
<html lang="de" style="color-scheme:dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0e">
<title>KIMANUS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{height:100dvh;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0e0e0e;color:#e0e0e0}

:root{
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --kim-red:#e63946;
}

#app{
  display:flex;flex-direction:column;
  height:100dvh;
  padding-top:var(--sat);padding-bottom:var(--sab);
  position:fixed;inset:0;
}

/* === HEADER === */
#header{
  display:flex;align-items:center;gap:8px;
  height:60px;
  padding:0 12px;
  background:#161616;
  border-bottom:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;z-index:20;
}
.logo-circle{
  width:30px;height:30px;border-radius:50%;
  background:var(--kim-red);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:14px;color:#fff;
}
#header .title{font-size:18px;font-weight:800;letter-spacing:3px;flex:1}
#header .hdr-btn{background:none;border:none;cursor:pointer;padding:4px}
#header .hdr-btn svg{width:22px;height:22px;fill:#888}

/* === DREI GLEICH GROSSE FELDER === */
#wheel-container{
  flex:1;display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}

.panel{
  flex:1;position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
/* Obere Glasplatte groesser (Platz fuer geflippte Karte) */
#panel-top{
  flex:1.2;
}
/* Sichtfenster fest */
#panel-center{
  flex:none;
  height:230px;
}
/* Untere Glasplatte kleiner */
#panel-bottom{
  flex:0.8;
}

/* Milchiges Glas oben */
#panel-top{
  position:relative;
}
#panel-top::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(14,14,14,0.35) 0%, rgba(14,14,14,0.08) 80%, transparent 100%);
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
  pointer-events:none;z-index:2;
  border-bottom:2px solid rgba(255,255,255,0.1);
}

/* Sichtfenster - klar */
#panel-center{
  position:relative;z-index:5;
}

/* Milchiges Glas unten */
#panel-bottom{
  position:relative;
}
#panel-bottom::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(0deg, rgba(14,14,14,0.35) 0%, rgba(14,14,14,0.08) 80%, transparent 100%);
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
  pointer-events:none;z-index:2;
  border-top:2px solid rgba(255,255,255,0.1);
}

/* === RAD-MECHANISMUS === */
#wheel-track{
  position:absolute;
  left:12px;right:12px;
  transition:transform 0.5s cubic-bezier(0.23,1,0.32,1);
  will-change:transform;
}

.wheel-card{
  height:210px;
  width:100%;
  left:50%;
  transform:translateX(-50%);
  margin-left:0;
  position:absolute;
  border-radius:0;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  perspective:800px;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}

/* Card-Inneres fuer Flip */
.card-inner{
  width:100%;height:100%;
  position:relative;
  transition:transform 1.2s cubic-bezier(0.25,0.1,0.25,1);
  transform-style:preserve-3d;
}
.wheel-card.flipped .card-inner{
  transform:rotateY(180deg);
}

.card-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:0;
  padding:16px;
}

/* Vorderseite */
.card-front{
  background:transparent;
}
.card-front .card-icon{font-size:72px}

/* Rückseite */
.card-back{
  background:transparent;
  transform:rotateY(180deg);
}
.card-back .back-title{
  font-size:13px;font-weight:600;color:rgba(255,255,255,0.3);
  text-transform:uppercase;letter-spacing:2px;
  margin-bottom:10px;
}
.card-back .back-content{
  font-size:12px;color:rgba(255,255,255,0.2);text-align:center;line-height:1.8;
  white-space:pre-line;padding:0 20px;
}

/* Keine Extra-Effekte - reine Glasplatte */

/* === FLIP LABEL (Vorderseite oben beim Flip) === */
#flip-label{
  display:none;
  position:absolute;
  left:50%;
  transform:translateX(-50%) scale(0.85);
  z-index:30;
  width:100%;
  height:210px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
  align-items:center;justify-content:center;
  opacity:0;
  transition:all 0.8s ease;
}
#flip-label.visible{
  display:flex;
  opacity:0.7;
}
#flip-label .fl-icon{font-size:48px}
#flip-label .fl-title{display:none}
#flip-label .fl-sub{display:none}

/* === REGISTER === */
#register-panel{
  display:none;
  position:absolute;bottom:0;left:0;right:0;
  height:33.33%;z-index:15;
  background:#161616;
  border-top:1px solid rgba(255,255,255,0.08);
}
#register-panel.visible{display:flex;flex-direction:column}
#register-tabs{flex:1;overflow-y:auto;padding:6px 12px;scrollbar-width:none}
#register-tabs::-webkit-scrollbar{display:none}
.register-tab{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,0.04);
  cursor:pointer;
}
.register-tab:active{background:rgba(255,255,255,0.06)}
.register-tab .tab-icon{font-size:20px}
.register-tab .tab-name{font-size:14px;font-weight:600;color:#ccc;flex:1}

/* === BOTTOM BAR === */
#bottom-bar{
  display:flex;align-items:center;justify-content:center;gap:20px;
  height:80px;
  margin-bottom:-40px;
  padding:0 16px;
  background:#161616;
  border-top:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;z-index:20;
}

#speech-btn{
  width:70px;height:70px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#ff4d5a 0%,var(--kim-red) 50%,#b81c2a 100%);
  border:4px solid rgba(220,220,220,0.5);
  box-shadow:0 4px 20px rgba(230,57,70,0.4);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform 0.15s;
  margin-top:-35px;
}
#speech-btn:active{transform:scale(0.9)}
#speech-btn svg{width:28px;height:28px;fill:#fff}
#speech-btn.listening{animation:pulse 1.5s infinite}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(230,57,70,0.5)}
  70%{box-shadow:0 0 0 15px rgba(230,57,70,0)}
  100%{box-shadow:0 0 0 0 rgba(230,57,70,0)}
}

.small-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.small-btn:active{transform:scale(0.9);background:rgba(255,255,255,0.1)}
.small-btn svg{width:18px;height:18px;fill:#888}

/* Status */
#status-text{
  display:none;
}
#speech-btn span{
  font-size:14px;font-weight:800;color:#fff;letter-spacing:2px;
}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="logo-circle">K</div>
    <span class="title">KIMANUS</span>
    <button class="hdr-btn" onclick="location.reload()" title="Aktualisieren">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.96 7.96 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </button>
    <button class="hdr-btn" onclick="toggleRegister()" title="Register">
      <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
  </div>

  <div id="wheel-container">
    <div id="flip-label">
      <span class="fl-icon" id="fl-icon"></span>
      <div>
        <div class="fl-title" id="fl-title"></div>
        <div class="fl-sub" id="fl-sub"></div>
      </div>
    </div>

    <div class="panel" id="panel-top"></div>
    <div class="panel" id="panel-center"></div>
    <div class="panel" id="panel-bottom"></div>

    <div id="wheel-track"></div>
    <div id="register-panel"><div id="register-tabs"></div></div>
  </div>

  <div id="status-text"></div>

  <div id="bottom-bar">
    <button id="speech-btn" onclick="toggleSpeech()">
      <span id="speech-agent">KIM</span>
    </button>
  </div>
</div>

<script>
const CARDS = [
  {id:'kim', icon:'👤', title:'KIM', subtitle:'Dein Assistent', color:'#e63946',
   backs:[
     {title:'Über KIM', content:'Dein persönlicher Assistent.\nFrag mich einfach was du brauchst!'},
     {title:'Fähigkeiten', content:'Termine • Wetter • Erinnerungen\nRecherche • Empfehlungen'},
     {title:'Letzte Gespräche', content:'Heute: Wetter abgefragt\nGestern: Termin eingetragen'},
   ]},
  {id:'kai', icon:'💼', title:'KAI', subtitle:'Business-Berater', color:'#4a90d9',
   backs:[
     {title:'Über KAI', content:'Dein Business-Berater.\nKalkulation, Einkauf und Geschäft.'},
     {title:'Services', content:'Rohaufschlag • Preisvergleich\nBestellungen • Lieferanten'},
   ]},
  {id:'wetterfrosch', icon:'🌤️', title:'Wetterfrosch', subtitle:'Meteorologe', color:'#4caf50',
   backs:[
     {title:'Aktuelles Wetter', content:'Nürnberg: 14°C, bewölkt\nRegenwahrscheinlichkeit: 20%'},
     {title:'Wochenvorschau', content:'Mo: ☀️ 16°C\nDi: 🌧️ 12°C\nMi: ⛅ 14°C'},
   ]},
  {id:'animateur', icon:'🎯', title:'Animateur', subtitle:'Freizeit & Events', color:'#ff9800',
   backs:[
     {title:'In der Nähe', content:'Kaiserburg Nürnberg (2km)\nTiergarten (5km)'},
     {title:'Empfehlung', content:'Bei dem Wetter:\nBiergarten am Dutzendteich!'},
   ]},
  {id:'kalkulierer', icon:'🧮', title:'Kalkulierer', subtitle:'Rohaufschlag-Experte', color:'#9c27b0',
   backs:[
     {title:'Letzte Kalkulation', content:'Schnitzel: WEK 4.20€ → VK 12.90€\nRohaufschlag: 207%'},
   ]},
  {id:'sekretaer', icon:'📅', title:'Sekretär', subtitle:'Termine', color:'#607d8b',
   backs:[
     {title:'Heute', content:'14:00 Zahnarzt\n16:30 Jannick anrufen'},
     {title:'Diese Woche', content:'Mi: Steuerberater\nFr: Lieferant Getränke'},
   ]},
  {id:'capcoin', icon:'🪙', title:'Cap-Coin', subtitle:'Sammeln & Einlösen', color:'#d4a017',
   backs:[
     {title:'Dein Guthaben', content:'127 Cap-Coins\n= 12,70 EUR'},
     {title:'Zuletzt gesammelt', content:'Brauerei Schlenkerla: +5\nGasthof Krone: +3'},
   ]},
];

const REGISTERS = [
  {icon:'👥', name:'Agenten'},
  {icon:'💳', name:'Clubkarten'},
  {icon:'🌐', name:'Webseiten'},
  {icon:'🖼️', name:'Bilderrahmen'},
  {icon:'🪙', name:'Cap-Coin'},
  {icon:'📱', name:'Meine Apps'},
  {icon:'📁', name:'Projektordner'},
  {icon:'📧', name:'E-Mail'},
  {icon:'🔒', name:'Schliessfach'},
];

let currentIndex = 0;
let isFlipped = false;
let backIndex = 0;
let isListening = false;
let registerOpen = false;
let panelH = 0;
let isAnimating = false;

function init() {
  calcSizes();
  buildCards();
  positionCards(false);
  window.addEventListener('resize', () => { calcSizes(); positionCards(false); });
}

function calcSizes() {
  const container = document.getElementById('wheel-container');
  const totalH = container.clientHeight;
  const centerH = 230;
  const remainH = totalH - centerH;
  const topH = Math.floor(remainH * 0.6);
  const bottomH = remainH - topH;
  panelH = centerH;
  // Debug
  document.querySelector('#header .title').textContent = 'KIMANUS';
}

function buildCards() {
  const track = document.getElementById('wheel-track');
  track.innerHTML = CARDS.map((card, i) => `
    <div class="wheel-card" id="card-${i}" onclick="handleCardTap(${i})">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-icon">${card.icon}</div>
        </div>
        <div class="card-face card-back">
          <div class="back-title" id="back-title-${i}">${card.backs?.[0]?.title || ''}</div>
          <div class="back-content" id="back-content-${i}">${card.backs?.[0]?.content || ''}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function positionCards(animate) {
  const container = document.getElementById('wheel-container');
  const totalH = container.clientHeight;
  const centerH = 230;
  const remainH = totalH - centerH;
  const topH = Math.floor(remainH * 0.6);
  const bottomH = remainH - topH;

  // Mittelpunkte der drei Panels
  const topMid = topH / 2;
  const centerMid = topH + (centerH / 2);
  const bottomMid = topH + centerH + (bottomH / 2);

  CARDS.forEach((card, i) => {
    const el = document.getElementById('card-' + i);
    if (!el) return;

    const cardH = el.offsetHeight || 200;
    const offset = getOffset(i);

    let cardMid;
    if (offset === 0) cardMid = centerMid;
    else if (offset === -1) cardMid = topMid;
    else if (offset === 1) cardMid = bottomMid + 40;
    else if (offset < -1) cardMid = topMid - topH;
    else cardMid = bottomMid + bottomH + 60;

    el.style.top = (cardMid - cardH / 2) + 'px';
    el.style.transition = animate ? 'all 0.5s cubic-bezier(0.23,1,0.32,1)' : 'none';

    if (offset === 0) {
      el.style.opacity = '1';
      el.style.transform = 'translateX(-50%) scale(1)';
      el.style.zIndex = '10';
    } else if (Math.abs(offset) === 1) {
      el.style.opacity = '0.5';
      el.style.transform = 'translateX(-50%) scale(0.9)';
      el.style.zIndex = '5';
    } else {
      el.style.opacity = '0';
      el.style.transform = 'translateX(-50%) scale(0.8)';
      el.style.zIndex = '1';
    }
  });
  updateStatus();
  updateFlipLabel();
}

function getOffset(i) {
  let diff = i - currentIndex;
  if (diff > CARDS.length / 2) diff -= CARDS.length;
  if (diff < -CARDS.length / 2) diff += CARDS.length;
  return diff;
}

function spinWheel(direction) {
  if (isAnimating) return;
  if (isFlipped) {
    // Rückseiten-Rad drehen
    const backs = CARDS[currentIndex].backs || [];
    if (backs.length <= 1) return;
    backIndex = (backIndex + direction + backs.length) % backs.length;
    updateBackContent();
    return;
  }
  isAnimating = true;
  currentIndex = (currentIndex + direction + CARDS.length) % CARDS.length;
  positionCards(true);
  setTimeout(() => { isAnimating = false; }, 500);
}

function handleCardTap(i) {
  if (i === currentIndex) {
    // Aktive Karte antippen = Flip
    flipCard();
  }
}

function flipCard() {
  const el = document.getElementById('card-' + currentIndex);
  if (!el) return;
  isFlipped = !isFlipped;
  backIndex = 0;

  if (isFlipped) {
    el.classList.add('flipped');
    updateBackContent();
  } else {
    el.classList.remove('flipped');
  }
  updateFlipLabel();
  updateStatus();
}

function updateBackContent() {
  const card = CARDS[currentIndex];
  const backs = card.backs || [];
  if (backs.length === 0) return;
  const back = backs[backIndex];
  const titleEl = document.getElementById('back-title-' + currentIndex);
  const contentEl = document.getElementById('back-content-' + currentIndex);
  if (titleEl) titleEl.textContent = back.title;
  if (contentEl) contentEl.textContent = back.content;
}

function updateFlipLabel() {
  const fl = document.getElementById('flip-label');
  if (isFlipped) {
    const card = CARDS[currentIndex];
    document.getElementById('fl-icon').textContent = card.icon;
    // Position: gleich wie die obere Milchglas-Karte
    const container = document.getElementById('wheel-container');
    const totalH = container.clientHeight;
    const centerH = 230;
    const remainH = totalH - centerH;
    const topH = Math.floor(remainH * 0.6);
    const topMid = topH / 2;
    const cardH = 210;
    fl.style.top = (topMid - cardH / 2) + 'px';
    fl.classList.add('visible');
  } else {
    fl.classList.remove('visible');
  }
}

function updateStatus() {
  const card = CARDS[currentIndex];
  document.getElementById('status-text').textContent = card.title;
}

// Register
function toggleRegister() {
  registerOpen = !registerOpen;
  const p = document.getElementById('register-panel');
  if (registerOpen) {
    p.classList.add('visible');
    p.innerHTML = '<div id="register-tabs">' + REGISTERS.map((r, i) =>
      `<div class="register-tab" onclick="selectRegister(${i})">
        <span class="tab-icon">${r.icon}</span>
        <span class="tab-name">${r.name}</span>
      </div>`
    ).join('') + '</div>';
  } else {
    p.classList.remove('visible');
  }
}
function selectRegister(i) { toggleRegister(); }

// Speech
function toggleSpeech() {
  isListening = !isListening;
  const btn = document.getElementById('speech-btn');
  if (isListening) {
    btn.classList.add('listening');
    document.getElementById('status-text').textContent = 'Kim hört zu...';
    setTimeout(() => {
      btn.classList.remove('listening');
      isListening = false;
      demoKimAction();
    }, 3000);
  } else {
    btn.classList.remove('listening');
    updateStatus();
  }
}

function demoKimAction() {
  document.getElementById('status-text').textContent = 'KIM: "Hier ist das Wetter!"';
  if (isFlipped) flipCard();
  const target = CARDS.findIndex(c => c.id === 'wetterfrosch');
  animateToCard(target, () => setTimeout(flipCard, 500));
}

function animateToCard(target, cb) {
  if (currentIndex === target) { if (cb) cb(); return; }
  const iv = setInterval(() => {
    if (currentIndex === target) { clearInterval(iv); if (cb) cb(); return; }
    const diff = (target - currentIndex + CARDS.length) % CARDS.length;
    spinWheel(diff <= CARDS.length / 2 ? 1 : -1);
  }, 250);
}

function showKeyboard() { alert('Tastatur - kommt noch!'); }

// Touch - vertikal=Rad drehen, horizontal=Flip
let dragStartY = 0;
let dragStartX = 0;
const wc = document.getElementById('wheel-container');

wc.addEventListener('touchstart', e => {
  dragStartY = e.touches[0].clientY;
  dragStartX = e.touches[0].clientX;
}, {passive:true});
wc.addEventListener('touchend', e => {
  const diffY = dragStartY - e.changedTouches[0].clientY;
  const diffX = e.changedTouches[0].clientX - dragStartX;
  // Horizontal stärker = Flip
  if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
    flipCard();
  }
  // Vertikal stärker = Rad drehen
  else if (Math.abs(diffY) > 40) {
    spinWheel(diffY > 0 ? 1 : -1);
  }
}, {passive:true});

// Mouse
wc.addEventListener('mousedown', e => { dragStartY = e.clientY; dragStartX = e.clientX; });
wc.addEventListener('mouseup', e => {
  const diffY = dragStartY - e.clientY;
  const diffX = e.clientX - dragStartX;
  if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
    flipCard();
  } else if (Math.abs(diffY) > 40) {
    spinWheel(diffY > 0 ? 1 : -1);
  }
});

// Scroll wheel
wc.addEventListener('wheel', e => {
  e.preventDefault();
  spinWheel(e.deltaY > 0 ? 1 : -1);
}, {passive:false});

// Init
init();
</script>
</body>
</html>
