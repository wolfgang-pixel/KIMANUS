async function ytSearch(query) {
  // Auf der aktuellen BACK-Card anzeigen (bcard-0 = Eingabe-Platte)
  const bcard = document.getElementById('bcard-0');
  if (!bcard) return;

  // Ladebildschirm
  bcard.innerHTML = `
    <div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:8px">
      <div style="font-size:24px;animation:spin 1s linear infinite">⏳</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.3)">Suche: ${query}</div>
    </div>`;

  try {
    const resp = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        message: 'Suche die 5 besten YouTube Videos zu: ' + query + '. Antworte EXAKT in diesem Format pro Zeile: NUMMER. TITEL | youtube.com/watch?v=VIDEO_ID - Nur echte YouTube URLs die wirklich existieren!',
        agent:'kim',
        model:'groq-llama',
        session:'yt-search-' + Date.now()
      })
    });
    const data = await resp.json();
    const answer = data.output || data.text || 'Keine Ergebnisse';

    // Ergebnisse in einzelne Video-Karten aufteilen
    const results = answer.split(/\n/).filter(l => l.trim().length > 10);
    if (results.length > 1) {
      const backTrack = document.getElementById('back-track');
      const colors = ['#e63946','#4a90d9','#4caf50','#ff9800','#9c27b0','#607d8b','#d4a017','#e91e63'];

      const cards = results.slice(0, 8).map((r, idx) => {
        const color = colors[idx % colors.length];
        const line = r.replace(/^\d+[\.\)\-]\s*/, '').trim();
        const num = idx + 1;

        // YouTube Video-ID extrahieren falls vorhanden
        const vidMatch = line.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
        const vidId = vidMatch ? vidMatch[1] : '';
        const title = line.replace(/\|.*$/, '').replace(/https?:\/\/\S+/g, '').replace(/-\s*$/, '').trim();

        const thumbArea = vidId
          ? `<img src="https://img.youtube.com/vi/${vidId}/mqdefault.jpg" style="width:100%;height:100%;object-fit:cover;opacity:0.7" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div style="display:none;width:100%;height:100%;align-items:center;justify-content:center"><div style='font-size:40px;opacity:0.3'>▶</div></div>`
          : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,${color}22,${color}11)"><div style='font-size:40px;opacity:0.3'>▶</div></div>`;

        return `
        <div class="back-wheel-card" id="bcard-${idx}" ${vidId ? 'onclick="ytLoadVideo(\''+vidId+'\')"' : ''}>
          <div style="width:100%;height:100%;display:flex;flex-direction:row;padding:0;overflow:hidden;cursor:${vidId?'pointer':'default'}">
            <div style="width:45%;height:100%;overflow:hidden;border-right:1px solid rgba(255,255,255,0.04)">
              ${thumbArea}
            </div>
            <div style="flex:1;padding:12px;display:flex;flex-direction:column;justify-content:center;gap:4px">
              <div style="font-size:9px;color:rgba(255,255,255,0.15)">Video ${num}${vidId?' • Antippen = Abspielen':''}</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.4);line-height:1.4">${title}</div>
            </div>
          </div>
        </div>`;
      }).join('');

      const resetCard = `<div class="back-wheel-card" id="bcard-${results.length}">
        <div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:12px">
          <div style="font-size:11px;color:rgba(255,255,255,0.2)">🔍 ${query} - ${results.length} Ergebnisse</div>
          <button onclick="ytResetInput()" style="padding:10px 20px;background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.2);color:rgba(230,57,70,0.4);font-size:12px;cursor:pointer">↩ Neue Suche</button>
        </div>
      </div>`;

      backTrack.innerHTML = cards + resetCard;

      const tempBacks = results.slice(0, 8).map(r => ({title:'', content:r.trim()}));
      tempBacks.push({title:'reset', content:''});
      activeCards[currentIndex].backs = tempBacks;

      backIndex = 0;
      positionBackCards(true);
    } else {
      bcard.innerHTML = `
        <div style="width:100%;height:100%;display:flex;flex-direction:column;padding:12px 16px;overflow-y:auto;scrollbar-width:none">
          <div style="font-size:9px;color:rgba(255,255,255,0.2);margin-bottom:6px">🔍 ${query}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.35);line-height:1.7;white-space:pre-line">${answer}</div>
          <div onclick="ytResetInput()" style="font-size:10px;color:rgba(230,57,70,0.3);text-align:center;margin-top:6px;cursor:pointer">↩ Neue Suche</div>
        </div>`;
    }

  } catch(e) {
    bcard.innerHTML = `
      <div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px">
        <div style="font-size:12px;color:rgba(230,57,70,0.4)">Suche fehlgeschlagen</div>
        <div onclick="ytResetInput()" style="font-size:10px;color:rgba(255,255,255,0.2);margin-top:8px;cursor:pointer">↩ Nochmal</div>
      </div>`;
  }
}

function ytResetInput() {
  // Zurück zur Eingabe-Glasplatte
  backIndex = 0;
  buildBackCards();
  positionBackCards(false);
}

function updateHeaderAgents() {
  const cfg = getSetupConfig();
  const hdrKai = document.getElementById('hdr-kai');
  const hdrKim = document.getElementById('hdr-kim');
  const kaiOn = cfg['agent_kai'] !== false;
  const kimOn = cfg['agent_kim'] !== false;
  if (hdrKai) hdrKai.style.display = kaiOn ? '' : 'none';
  if (hdrKim) hdrKim.style.display = kimOn ? '' : 'none';
  if (kaiOn && !kimOn) { currentAgent = 'KAI'; setMicAgent('KAI'); }
  if (kimOn && !kaiOn) { currentAgent = 'KIM'; setMicAgent('KIM'); }
  updateHeaderHighlight();
}

let currentInputMode = 'walkie'; // Default

function updateInputModes() {
  const cfg = getSetupConfig();
  const modes = [
    { id: 'walkie', key: 'input_walkie', defaultOn: true },
    { id: 'keyboard', key: 'input_keyboard', defaultOn: false },
    { id: 'stt', key: 'input_stt', defaultOn: false },
    { id: 'live', key: 'input_live', defaultOn: false }
  ];
  let anyVisible = false;
  modes.forEach(m => {
    const btn = document.getElementById('btn-' + m.id);
    if (!btn) return;
    const on = m.defaultOn ? cfg[m.key] !== false : cfg[m.key] === true;
    btn.classList.toggle('visible', on);
    if (on) anyVisible = true;
    btn.classList.toggle('active', m.id === currentInputMode);
  });
  // Wenn aktiver Modus ausgeblendet, auf ersten sichtbaren wechseln
  const activeBtn = document.getElementById('btn-' + currentInputMode);
  if (!activeBtn || !activeBtn.classList.contains('visible')) {
    const first = modes.find(m => {
      const b = document.getElementById('btn-' + m.id);
      return b && b.classList.contains('visible');
    });
    if (first) setInputMode(first.id);
  }
  // Haupt-Input-Button auch aktualisieren
  updateMainInputButton(currentInputMode);
}

function setInputMode(mode) {
  currentInputMode = mode;
  document.querySelectorAll('.input-mode-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + mode);
  if (btn) btn.classList.add('active');
  // Legacy Hauptbutton-Icon anpassen (versteckt, aber intern genutzt)
  const agent = document.getElementById('speech-agent');
  if (agent) {
    if (mode === 'live') {
      agent.innerHTML = '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="4" y1="8" x2="4" y2="16"/><line x1="8" y1="6" x2="8" y2="18"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="16" y1="6" x2="16" y2="18"/><line x1="20" y1="8" x2="20" y2="16"/></svg>';
    } else {
      const legacyIcons = { walkie: '🎙', keyboard: '⌨️', stt: '💬' };
      agent.textContent = legacyIcons[mode] || '🎙';
    }
  }
  // NEU: Haupt-Input-Button in der Bottom-Bar aktualisieren
  updateMainInputButton(mode);
  localStorage.setItem('kimanus-input-mode', mode);
  // Tastatur-Modus: direkt Tastatur oeffnen beim Wechsel
  if (mode === 'keyboard') {
    setTimeout(() => openKeyboardInput(), 300);
  }
}

// Haupt-Input-Button (in der Bottom-Bar) updaten
function updateMainInputButton(mode) {
  const iconEl = document.getElementById('main-input-icon');
  const labelEl = document.getElementById('main-input-label');
  const btnEl = document.getElementById('settings-btn');
  if (!iconEl || !labelEl) return;
  // Statische Wellen-Icon fuer Live (ohne permanente Animation)
  const staticLiveSvg = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="4" y1="8" x2="4" y2="16"/><line x1="8" y1="6" x2="8" y2="18"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="16" y1="6" x2="16" y2="18"/><line x1="20" y1="8" x2="20" y2="16"/></svg>';
  const config = {
    walkie:   { icon: '🎙',  label: 'Walkie' },
    keyboard: { icon: '⌨️',  label: 'Tastatur' },
    stt:      { icon: '💬',  label: 'Sprechen' },
    live:     { icon: staticLiveSvg, label: 'Live' }
  };
  const c = config[mode] || config.walkie;
  if (c.icon.startsWith('<svg')) iconEl.innerHTML = c.icon;
  else iconEl.textContent = c.icon;
  labelEl.textContent = c.label;
  // Im Idle-Zustand: KEINE active-Animation (gruen, statisch)
  if (btnEl) btnEl.classList.remove('listening', 'live-active');
}

// Setzt den Button auf "aktiv" (rot, animiert) - wird beim Druecken gerufen
function setMainInputButtonActive(active) {
  const btnEl = document.getElementById('settings-btn');
  const iconEl = document.getElementById('main-input-icon');
  if (!btnEl) return;
  if (active) {
    btnEl.classList.add('live-active');
    // Fuer Live-Modus: animiertes rotes Wellen-SVG

function triggerCurrentInputMode() {

}

// Input-Modus-Button Touch-Handler (Option A: Swipe + Walkie-PTT)
// - Tap (kurz) = Aktion starten (je nach Modus)
// - Hold im Walkie-Modus = Push-to-Talk sprechen
// - Swipe links/rechts = Modus wechseln (durch alle 4 Modi rotieren)
// - Nach Swipe: 800ms Cool-down damit kein Tap mehr triggert
const INPUT_MODES_ORDER = ['walkie', 'keyboard', 'stt', 'live'];
let inputModeBtnTouchStartX = 0;
let inputModeBtnTouchStartY = 0;
let inputModeBtnTouchStartTime = 0;
let inputModeBtnSwipeFired = false;
let inputModeBtnWalkieActive = false;
let inputModeBtnHandledTouch = false;
let inputModeBtnRecentSwipe = 0; // Zeitpunkt des letzten Swipes (fuer Cool-down)
const INPUT_SWIPE_THRESHOLD = 35; // Pixel horizontal fuer Modus-Wechsel
const INPUT_SWIPE_COOLDOWN_MS = 800; // Nach Swipe 800ms keine Aktion triggern
const INPUT_WALKIE_HOLD_MS = 180;  // Kurze Verzoegerung bevor Walkie-Aufnahme startet (gibt Zeit fuer Swipe-Erkennung)
let inputModeBtnWalkieTimer = null;

function inputModeBtnTouchStart(e) {
  // Cool-down: Wenn gerade eben geswiped, diesen Touch ignorieren
  if (Date.now() - inputModeBtnRecentSwipe < INPUT_SWIPE_COOLDOWN_MS) {
    inputModeBtnHandledTouch = true;
    return;
  }
  inputModeBtnSwipeFired = false;
  inputModeBtnWalkieActive = false;
  inputModeBtnHandledTouch = false;
  if (e.touches && e.touches[0]) {
    inputModeBtnTouchStartX = e.touches[0].clientX;
    inputModeBtnTouchStartY = e.touches[0].clientY;
    inputModeBtnTouchStartTime = Date.now();
  }
  // Nur im Walkie-Modus: nach kurzer Verzoegerung Walkie-Aufnahme starten
  if (currentInputMode === 'walkie') {
    inputModeBtnWalkieTimer = setTimeout(() => {
      inputModeBtnWalkieTimer = null;
      if (!inputModeBtnSwipeFired) {
        inputModeBtnWalkieActive = true;
        if (navigator.vibrate) navigator.vibrate(20);
        if (typeof walkieStartDirect === 'function') walkieStartDirect();
      }
    }, INPUT_WALKIE_HOLD_MS);
  }
}
function inputModeBtnTouchMove(e) {
  if (!e.touches || !e.touches[0]) return;
  const dx = e.touches[0].clientX - inputModeBtnTouchStartX;
  const dy = e.touches[0].clientY - inputModeBtnTouchStartY;
  const adx = Math.abs(dx);
  const ady = Math.abs(dy);
  // Horizontaler Swipe erkannt?
  if (!inputModeBtnSwipeFired && !inputModeBtnWalkieActive && adx > INPUT_SWIPE_THRESHOLD && adx > ady * 1.5) {
    inputModeBtnSwipeFired = true;
    inputModeBtnHandledTouch = true;
    inputModeBtnRecentSwipe = Date.now(); // Cool-down starten
    // Walkie-Timer abbrechen
    if (inputModeBtnWalkieTimer) {
      clearTimeout(inputModeBtnWalkieTimer);
      inputModeBtnWalkieTimer = null;
    }
    // Modus wechseln: links = vorheriger, rechts = naechster
    const idx = INPUT_MODES_ORDER.indexOf(currentInputMode);
    let newIdx;
    if (dx < 0) newIdx = (idx - 1 + INPUT_MODES_ORDER.length) % INPUT_MODES_ORDER.length;
    else newIdx = (idx + 1) % INPUT_MODES_ORDER.length;
    if (navigator.vibrate) navigator.vibrate(15);
    animateInputModeSwitch(dx > 0 ? 'right' : 'left');
    // Nur Modus wechseln, KEIN openKeyboardInput automatisch bei Tastatur
    currentInputMode = INPUT_MODES_ORDER[newIdx];
    updateMainInputButton(currentInputMode);
    localStorage.setItem('kimanus-input-mode', currentInputMode);
    // Legacy Update
    document.querySelectorAll('.input-mode-btn').forEach(b => b.classList.remove('active'));
    const legacyBtn = document.getElementById('btn-' + currentInputMode);
    if (legacyBtn) legacyBtn.classList.add('active');
  }
}
function inputModeBtnTouchEnd(e) {
  e.preventDefault();
  inputModeBtnHandledTouch = true;
  // Walkie-Timer aufraeumen
  if (inputModeBtnWalkieTimer) {
    clearTimeout(inputModeBtnWalkieTimer);
    inputModeBtnWalkieTimer = null;
  }
  // Wenn Swipe gefeuert hat: nichts mehr tun (Cool-down laeuft)
  if (inputModeBtnSwipeFired) return;
  // Cool-down: Wenn gerade eben geswiped, ignorieren
  if (Date.now() - inputModeBtnRecentSwipe < INPUT_SWIPE_COOLDOWN_MS) return;
  // Wenn Walkie aktiv war: Aufnahme beenden + senden
  if (inputModeBtnWalkieActive) {
    inputModeBtnWalkieActive = false;
    if (typeof walkieEndDirect === 'function') walkieEndDirect();
    return;
  }
  // Sonst: kurzer Tap = Aktion starten je nach Modus
  triggerCurrentInputMode();
}
function inputModeBtnTouchCancel() {
  if (inputModeBtnWalkieTimer) {
    clearTimeout(inputModeBtnWalkieTimer);
    inputModeBtnWalkieTimer = null;
  }
  if (inputModeBtnWalkieActive) {
    inputModeBtnWalkieActive = false;
    if (typeof walkieEndDirect === 'function') walkieEndDirect();
  }
  inputModeBtnHandledTouch = true;
}
// Click-Fallback fuer Desktop-Maus (Touch setzt Flag, dann ignoriert)
function inputModeBtnClickFallback(e) {
  e.stopPropagation();
  if (inputModeBtnHandledTouch) {
    inputModeBtnHandledTouch = false;
    return;
  }
  // Cool-down: Wenn gerade eben geswiped, Click ignorieren
  if (Date.now() - inputModeBtnRecentSwipe < INPUT_SWIPE_COOLDOWN_MS) return;
  triggerCurrentInputMode();
}

// Animation beim Modus-Wechsel (Icon slided raus und neues kommt rein)

// ============================================================
// VOLLBILD-CHAT-DIALOG MODAL (v24.16 - WhatsApp-Style)
// ============================================================
// - Dialog-basiert, sichtbare Messages
// - Beim Schliessen: Loeschen oder Als Notiz speichern
// - Unterstuetzt Multi-Turn-Conversations mit einem Agenten

let kbDialogHistory = [];  // Array von {role: 'user'|'agent', text, time}
let kbDialogAgent = 'KAI';
let kbDialogWebhook = 'https://manus.kimanus.de/webhook/claude';
let kbDialogRequestInFlight = false;

function openKeyboardInput() {
  let modal = document.getElementById('kb-fullscreen-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'kb-fullscreen-modal';
    modal.innerHTML = `
      <div id="kb-modal-header">
        <button id="kb-modal-close" type="button" aria-label="Schliessen">✕</button>
        <div id="kb-modal-title-wrap">
          <div id="kb-modal-title">Dialog mit <span id="kb-modal-agent">KAI</span></div>
          <div id="kb-modal-status"></div>
        </div>
      </div>
      <div id="kb-chat-history" class="empty"></div>
      <div id="kb-modal-input-area">
        <textarea id="kb-modal-textarea" placeholder="Nachricht eingeben..." autocomplete="off" autocapitalize="sentences" rows="1"></textarea>
        <button id="kb-modal-send" type="button" aria-label="Senden">➤</button>
      </div>
      <div id="kb-modal-actions" class="disabled">
        <button id="kb-action-discard" type="button">🗑 Loeschen</button>
        <button id="kb-action-save" type="button">💾 Als Notiz</button>
      </div>
    `;
    document.body.appendChild(modal);
    // Event Listeners
    document.getElementById('kb-modal-close').addEventListener('click', handleModalClose);
    document.getElementById('kb-modal-send').addEventListener('click', submitKeyboardInput);
    document.getElementById('kb-action-discard').addEventListener('click', () => confirmAndClose('discard'));
    document.getElementById('kb-action-save').addEventListener('click', () => confirmAndClose('save'));

    const ta = document.getElementById('kb-modal-textarea');
    ta.addEventListener('keydown', (e) => {
      // Enter sendet, Shift+Enter = neue Zeile
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submitKeyboardInput();
      }
    });
    // Textarea auto-resize
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    });
  }
  // Agenten bestimmen (aktuell aktive Karte oder Default KAI)
  determineDialogAgent();
  // History leeren
  kbDialogHistory = [];
  renderDialogHistory();
  updateActionsState();
  // Status-Text leeren
  const status = document.getElementById('kb-modal-status');
  if (status) { status.textContent = ''; status.className = ''; }
  // Modal oeffnen
  modal.classList.add('open');
  // Textarea fokussieren (triggert Tastatur)
  setTimeout(() => {
    const ta = document.getElementById('kb-modal-textarea');
    if (ta) { ta.value = ''; ta.style.height='auto'; ta.focus(); }
  }, 150);
}

function determineDialogAgent() {
  // Aktuelle Karte im Wheel pruefen
  let agent = 'KAI';
  let webhook = 'https://manus.kimanus.de/webhook/kai';
  try {
    const card = activeCards && activeCards[currentIndex];
    if (card) {
      if (card.id === 'claude' || card.title === 'Claude' || (card.id && card.id.startsWith('claude_'))) {
        agent = 'Claude';
        webhook = 'https://manus.kimanus.de/webhook/claude';
      } else if (card.webhookUrl) {
        agent = card.title || 'KAI';
        webhook = card.webhookUrl;
      } else if (card.title === 'KIM' || card.id === 'kim') {
        agent = 'KIM';
        webhook = 'https://manus.kimanus.de/webhook/kim';
      }
    }
  } catch(e) { console.log('determineDialogAgent error:', e); }
  kbDialogAgent = agent;
  kbDialogWebhook = webhook;
  const agentEl = document.getElementById('kb-modal-agent');
  if (agentEl) agentEl.textContent = agent;
}

function renderDialogHistory() {
  const container = document.getElementById('kb-chat-history');
  if (!container) return;
  if (kbDialogHistory.length === 0) {
    container.innerHTML = '';
    container.classList.add('empty');
    return;
  }
  container.classList.remove('empty');
  let html = '';
  kbDialogHistory.forEach(msg => {
    const cleanText = (msg.text || '').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                                      .replace(/\*(.*?)\*/g, '<em>$1</em>')
                                      .replace(/\n/g, '<br>');
    const timeStr = msg.time || '';
    if (msg.role === 'user') {
      html += `<div class="kb-bubble kb-bubble-user">${cleanText}<div class="kb-bubble-time">${timeStr}</div></div>`;
    } else if (msg.role === 'agent') {
      html += `<div class="kb-bubble kb-bubble-agent"><div class="kb-bubble-agent-label">${kbDialogAgent}</div>${cleanText}<div class="kb-bubble-time">${timeStr}</div></div>`;
    } else if (msg.role === 'thinking') {
      html += `<div class="kb-bubble-thinking"><div class="kb-bubble-agent-label">${kbDialogAgent}</div><div class="kb-bubble-thinking-dots"><span></span><span></span><span></span></div></div>`;
    }
  });
  container.innerHTML = html;
  // Auto-scroll zum Ende
  container.scrollTop = container.scrollHeight;
}

function updateActionsState() {
  const actions = document.getElementById('kb-modal-actions');
  if (!actions) return;
  if (kbDialogHistory.filter(m => m.role !== 'thinking').length > 0) {
    actions.classList.remove('disabled');
  } else {
    actions.classList.add('disabled');
  }
}

async function submitKeyboardInput() {
  if (kbDialogRequestInFlight) return;
  const ta = document.getElementById('kb-modal-textarea');
  if (!ta) return;
  const text = ta.value.trim();
  if (!text) return;
  ta.value = '';
  ta.style.height = 'auto';
  // User-Message hinzufuegen
  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  kbDialogHistory.push({ role: 'user', text: text, time: timeStr });
  // Thinking-Indicator hinzufuegen
  kbDialogHistory.push({ role: 'thinking' });
  renderDialogHistory();
  updateActionsState();
  // Status setzen
  const status = document.getElementById('kb-modal-status');
  if (status) { status.textContent = kbDialogAgent + ' denkt nach...'; status.className = 'thinking'; }
  // Webhook-Call starten
  kbDialogRequestInFlight = true;
  try {
    // Kontext aus der History fuer Multi-Turn (ohne 'thinking')
    const context = kbDialogHistory
      .filter(m => m.role !== 'thinking')
      .slice(-10) // letzte 10 Nachrichten
      .map(m => (m.role === 'user' ? 'User: ' : kbDialogAgent + ': ') + m.text)
      .join('\n');
    const response = await fetch(kbDialogWebhook, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        context: context,
        agent: kbDialogAgent,
        source: 'chat-modal',
        session_id: 'chat-modal-' + Date.now()
      })
    });
    let agentText = '';
    if (response.ok) {
      const contentType = response.headers.get('content-type') || '';
      if (contentType.includes('application/json')) {
        const data = await response.json();
        agentText = data.response || data.message || data.text || data.output || JSON.stringify(data).substring(0, 200);
      } else {
        agentText = await response.text();
      }
    } else {
      agentText = '⚠️ Fehler: Server antwortet mit Status ' + response.status;
    }
    // Thinking entfernen
    kbDialogHistory = kbDialogHistory.filter(m => m.role !== 'thinking');
    // Antwort einfuegen
    const replyTime = new Date();
    const replyTimeStr = replyTime.getHours().toString().padStart(2,'0') + ':' + replyTime.getMinutes().toString().padStart(2,'0');
    kbDialogHistory.push({ role: 'agent', text: agentText, time: replyTimeStr });
  } catch (err) {
    // Thinking entfernen
    kbDialogHistory = kbDialogHistory.filter(m => m.role !== 'thinking');
    kbDialogHistory.push({ role: 'agent', text: '⚠️ Verbindungs-Fehler: ' + (err.message || 'Unbekannt'), time: '' });
  }
  renderDialogHistory();
  updateActionsState();
  kbDialogRequestInFlight = false;
  // Status zuruecksetzen
  if (status) { status.textContent = ''; status.className = ''; }
  // Fokus zurueck zur Textarea
  ta.focus();
}

function handleModalClose() {
  const hasContent = kbDialogHistory.filter(m => m.role !== 'thinking').length > 0;
  if (!hasContent) {
    // Nichts zu speichern, direkt schliessen
    closeKeyboardInput();
    return;
  }
  // Confirm-Dialog anzeigen
  showConfirmDialog();
}

function showConfirmDialog() {
  let overlay = document.getElementById('kb-confirm-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'kb-confirm-overlay';
    overlay.innerHTML = `

function closeConfirmDialog() {

function confirmAndClose(action) {
  closeConfirmDialog();
  if (action === 'save') {
    saveDialogAsNote();
  } else if (action === 'discard') {
    // Dialog wird nicht gespeichert
  }
  // History leeren und Modal schliessen
  kbDialogHistory = [];
  closeKeyboardInput();
}

async function saveDialogAsNote() {
  if (kbDialogHistory.length === 0) return;
  const now = new Date();
  const dateStr = now.toISOString().split('T')[0];
  const timeStr = now.toTimeString().substring(0, 5);
  // Dialog als Markdown formatieren
  let md = '# Dialog mit ' + kbDialogAgent + ' - ' + dateStr + ' ' + timeStr + '\n\n';
  kbDialogHistory.forEach(msg => {
    if (msg.role === 'user') {
      md += '**Du** (' + (msg.time || '') + '):\n' + msg.text + '\n\n';
    } else if (msg.role === 'agent') {
      md += '**' + kbDialogAgent + '** (' + (msg.time || '') + '):\n' + msg.text + '\n\n';
    }
  });
  md += '\n---\n*Gespeichert via Wheel UI Chat-Modal*\n';
  // An Claude-Home senden damit es im Vault landet
  try {
    await fetch('https://manus.kimanus.de/webhook/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: '[NOTE_SAVE] Bitte speichere diesen Dialog im Vault unter raw/dialogues/' +
                 dateStr + '_' + kbDialogAgent.toLowerCase() + '_' + timeStr.replace(':','') + '.md:\n\n' + md
      })
    });
    // Lokale Kopie in localStorage falls der Server nicht antwortet
    const key = 'kimanus-saved-dialogues';
    const saved = JSON.parse(localStorage.getItem(key) || '[]');
    saved.push({ date: dateStr, time: timeStr, agent: kbDialogAgent, md: md });
    // Max 50 gespeicherte Dialoge
    if (saved.length > 50) saved.shift();
    localStorage.setItem(key, JSON.stringify(saved));
  } catch(e) {
    console.log('saveDialogAsNote error:', e);
  }
}

// === MIC-BUTTON: Halten=Aufnahme, dabei verschiebbar ===
let micDragging = false;
let micDragStartX = 0, micDragStartY = 0;
let micOffsetX = 0, micOffsetY = 0;
let micRecording = false;
let micHoldTimer = null;
const MIC_HOLD_MS = 400; // Ab 400ms = Aufnahme starten
const MIC_DRAG_PX = 15;  // Ab 15px = verschieben

function initMicPosition() {
  const wrap = document.getElementById('mic-ring-wrap');
  const panel = document.getElementById('panel-bottom');
  if (!wrap || !panel) return;
  const saved = localStorage.getItem('kimanus-mic-pos');
  const pr = panel.getBoundingClientRect();
  if (saved) {
    const pos = JSON.parse(saved);
    wrap.style.left = pos.left + 'px';
    wrap.style.top = pos.top + 'px';
  } else {
    wrap.style.left = (pr.width / 2 - 46) + 'px';
    wrap.style.top = ((pr.height - 92) / 2) + 'px';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('speech-btn');
  const ring = document.getElementById('mic-ring');
  const wrap = document.getElementById('mic-ring-wrap');
  if (!btn) return;

  // === MIC-BUTTON: Nur Sprechen ===
  let micRecordStart = 0;

  // Hilfsfunktion: Prueft ob aktuelle Karte Claude ist
  function isOnClaudeCard() {
    const card = activeCards[currentIndex];
    return card && (card.id === 'claude' || card.title === 'Claude' || (card.id && card.id.startsWith('claude_')));
  }

  btn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    // Live-Modus: Sofort reagieren (Toggle), kein Hold noetig
    // ABER: Claude nutzt immer Walkie-Talkie, auch wenn Live-Modus aktiv ist
    if (currentInputMode === 'live' && !isOnClaudeCard()) {
      walkieStartDirect();
      return;
    }
    micRecording = false;
    micHoldTimer = setTimeout(() => {
      micRecording = true;
      micRecordStart = Date.now();
      walkieStartDirect();
      micHoldTimer = null;
    }, MIC_HOLD_MS);
  });

  btn.addEventListener('touchend', () => {
    // Live-Modus: Nichts beim Loslassen (AUSSER bei Claude - da Walkie-Talkie)
    if (currentInputMode === 'live' && !isOnClaudeCard()) return;
    if (micHoldTimer) { clearTimeout(micHoldTimer); micHoldTimer = null; }
    if (micRecording) {
      const dur = Date.now() - micRecordStart;
      micRecording = false;
      if (dur >= 800) {
        walkieEndDirect();
      } else {
        resetSpeechState();
        closeChatOverlay();
      }
    }
  });

  // === RING = DRAG-HANDLE: 300ms halten dann verschieben ===
  if (ring && wrap) {
    let ringHoldTimer = null;
    let ringReady = false;

    ring.addEventListener('touchstart', (e) => {
      e.stopPropagation();
      const t = e.touches[0];
      micDragStartX = t.clientX;
      micDragStartY = t.clientY;
      const rect = wrap.getBoundingClientRect();
      micOffsetX = t.clientX - rect.left;
      micOffsetY = t.clientY - rect.top;
      micDragging = false;
      ringReady = false;
      ringHoldTimer = setTimeout(() => {
        ringReady = true;
        if (navigator.vibrate) navigator.vibrate(30);
        ringHoldTimer = null;
      }, 300);
    });

    ring.addEventListener('touchmove', (e) => {
      if (!ringReady) {
        // Noch nicht bereit - Timer abbrechen bei Bewegung
        if (ringHoldTimer) { clearTimeout(ringHoldTimer); ringHoldTimer = null; }
        return;
      }
      e.stopPropagation();
      const t = e.touches[0];
      micDragging = true;
      const panel = document.getElementById('panel-bottom');
      const pr = panel.getBoundingClientRect();
      let newLeft = t.clientX - pr.left - micOffsetX;
      let newTop = t.clientY - pr.top - micOffsetY;
      newLeft = Math.max(-10, Math.min(newLeft, pr.width - 70));
      newTop = Math.max(-5, Math.min(newTop, pr.height - 70));
      wrap.style.left = newLeft + 'px';
      wrap.style.top = newTop + 'px';
    }, {passive: true});

    ring.addEventListener('touchend', () => {
      if (ringHoldTimer) { clearTimeout(ringHoldTimer); ringHoldTimer = null; }
      ringReady = false;
      if (micDragging) {
        micDragging = false;
        localStorage.setItem('kimanus-mic-pos', JSON.stringify({
          left: parseInt(wrap.style.left),
          top: parseInt(wrap.style.top)
        }));
      }
    });
  }
});

// Direkte Start/End ohne Event (von neuem Mic-Handler aufgerufen)
function walkieStartDirect() {
  console.log('walkieStartDirect called, inputMode=' + currentInputMode);
  // Aktuelle Karte pruefen
  const card = activeCards[currentIndex];

  // CLAUDE AUSNAHME: Claude IMMER ueber Webhook (claude-home), NIE ueber Gemini Live
  // Grund: Claude braucht Gedaechtnis + Vault-Zugriff, nicht Geschwindigkeit
  const isClaude = card && (card.id === 'claude' || card.title === 'Claude' || (card.id && card.id.startsWith('claude_')));

  // Live-Dialog Modus: Gemini Live starten (aber NICHT fuer Claude)
  if (currentInputMode === 'live' && !isClaude) {
    if (liveIsActive) {
      endLiveSession();
    } else {
      startLiveSession();
    }
    return;
  }

  // Aktuellen Agenten SOFORT setzen (bevor Aufnahme startet)
  if (card && card.webhookUrl) {
    currentAgent = card.title;
    setMicAgent(card.title);
  }
  const e = {preventDefault:()=>{}};
  walkieStart(e);
}
function walkieEndDirect() {
  const card = activeCards[currentIndex];
  const isClaude = card && (card.id === 'claude' || card.title === 'Claude' || (card.id && card.id.startsWith('claude_')));
  // Im Live-Modus: Nichts tun beim Loslassen (laeuft weiter) - AUSSER bei Claude
  if (currentInputMode === 'live' && !isClaude) return;
  const e = {preventDefault:()=>{}};
  walkieEnd(e);
}

function walkieStart(e) {
  e.preventDefault();
  const btn = document.getElementById('speech-btn');

  // Wenn Setup offen: KIM Karte zeigen
  if (settingsOpen) {
    showKimBubble();
    return;
  }

  if (walkieActive) return;
  walkieActive = true;

  // Chat-Overlay oeffnen (statt Glasplatte)
  openChatOverlay();

  // Sofort Aufnahme starten
  speechState = 'recording';
  isListening = true;
  btn.classList.add('listening');
  btn.querySelector('span').textContent = '●';
  btn.querySelector('span').style.fontSize = '22px';
  btn.style.background = 'radial-gradient(circle at 30% 30%,#ff4d5a 0%,var(--kim-red) 50%,#b81c2a 100%)';
  startRecording();

  // Wave-Animation im KIM-Kaertchen starten
  kimStartWave();
}

function walkieEnd(e) {
  e.preventDefault();
  if (!walkieActive) return;
  walkieActive = false;

  const btn = document.getElementById('speech-btn');

  // Aufnahme stoppen und SOFORT senden
  speechState = 'processing';
  isListening = false;
  btn.classList.remove('listening');
  btn.querySelector('span').textContent = '⏳';
  btn.querySelector('span').style.fontSize = '';
  btn.style.background = 'radial-gradient(circle at 30% 30%,#4ade80 0%,#22c55e 50%,#16a34a 100%)';

  const cc = document.getElementById('chat-content');
  if (cc) cc.innerHTML = '<span style="color:rgba(255,255,255,0.35);font-size:14px">Wird erkannt...</span>';

  // Wave stoppen, Denk-Animation starten
  kimStartThink();

  stopRecording();
  // processVoice wird durch mediaRecorder.onstop aufgerufen
  // und sendet dann direkt an KIM (walkieTalkieMode)
}

function toggleSpeech() {
  // Fallback fuer alte Aufrufe
  const btn = document.getElementById('speech-btn');

  if (settingsOpen) {
    showKimBubble();
    return;
  }

  if (speechState === 'idle') {
    // Start: Aufnahme beginnen (kein separater Chat-Modus mehr)
    speechState = 'recording';
    isListening = true;
    btn.classList.add('listening');
    btn.querySelector('span').textContent = '●';
    btn.querySelector('span').style.fontSize = '22px';
    btn.style.background = 'radial-gradient(circle at 30% 30%,#ff4d5a 0%,var(--kim-red) 50%,#b81c2a 100%)';
    showEmptyBook();
    startRecording();

  } else if (speechState === 'recording') {
    // Stop: Aufnahme beenden
    speechState = 'processing';
    isListening = false;
    if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
    btn.classList.remove('listening');
    btn.querySelector('span').textContent = '⏳';
    btn.querySelector('span').style.fontSize = '';
    btn.style.background = 'radial-gradient(circle at 30% 30%,#4ade80 0%,#22c55e 50%,#16a34a 100%)';
    // Zeige auf Glasplatte: "Wird erkannt..."
    const cc = document.getElementById('chat-content');
    if (cc) cc.innerHTML = '<span style="color:rgba(255,255,255,0.35);font-size:14px">Wird erkannt<span style="display:inline-flex;gap:2px;margin-left:6px;vertical-align:middle"><span style="width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.4);animation:bwave 0.6s ease-in-out infinite"></span><span style="width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.4);animation:bwave 0.6s ease-in-out 0.2s infinite"></span><span style="width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.4);animation:bwave 0.6s ease-in-out 0.4s infinite"></span></span></span>';
    stopRecording();
    // processVoice wird automatisch aufgerufen durch mediaRecorder.onstop

  } else if (speechState === 'processing') {
    return;

  } else if (speechState === 'review') {
    // Senden!
    speechState = 'sending';
    btn.classList.remove('send-ready');
    btn.querySelector('span').textContent = '⏳';
    btn.style.background = '';
    if (pendingText) {
      sendToKim(pendingText).then(() => {
        speechState = 'idle';
        btn.querySelector('span').textContent = '🎙';
      });
    } else {
      resetSpeechState();
    }
  }
}

function resetSpeechState() {
  speechState = 'idle';
  pendingText = '';
  isListening = false;
  walkieActive = false;
  kimStopWave();
  kimStopThink();
  const btn = document.getElementById('speech-btn');
  btn.classList.remove('listening');
  btn.classList.remove('send-ready');
  btn.querySelector('span').textContent = '🎙';
  btn.querySelector('span').style.fontSize = '';
  btn.style.background = 'radial-gradient(circle at 30% 30%,#4ade80 0%,#22c55e 50%,#16a34a 100%)';
  const delBtn = document.getElementById('delete-btn');
  if (delBtn) delBtn.style.display = 'none';
}

let audioCtx, analyser, animFrameId;

function startAudioVisualizer(stream) {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  const source = audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);
  const canvas = document.getElementById('audio-wave');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const barCount = 20;
  const barW = 3, gap = (W - barCount * barW) / (barCount - 1);

  function draw() {
    animFrameId = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(data);
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < barCount; i++) {
      const val = data[i * 3] / 255;
      const h = Math.max(2, val * H);
      const x = i * (barW + gap);
      const y = (H - h) / 2;
      const alpha = 0.2 + val * 0.5;
      ctx.fillStyle = `rgba(230,57,70,${alpha})`;
      ctx.fillRect(x, y, barW, h);
    }
  }
  draw();
}

function stopAudioVisualizer() {
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  if (audioCtx) { audioCtx.close().catch(()=>{}); audioCtx = null; }
  const canvas = document.getElementById('audio-wave');
  if (canvas) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // Zeichne flache Linie
    ctx.fillStyle = 'rgba(230,57,70,0.15)';
    ctx.fillRect(0, 11, canvas.width, 2);
  }
}

async function startRecording() {
  try {
    audioStream = await navigator.mediaDevices.getUserMedia({audio: true});
    startAudioVisualizer(audioStream);
    mediaRecorder = new MediaRecorder(audioStream);
    audioChunks = [];
    let liveTranscriptTimer = null;

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    // Live-Transkription: Alle 3 Sekunden bisheriges Audio transkribieren
    let lastLiveText = '';
    liveTranscriptTimer = setInterval(async () => {
      if (speechState !== 'recording' || audioChunks.length === 0) return;
      try {
        const mimeType = mediaRecorder.mimeType || 'audio/webm';
        const liveBlob = new Blob([...audioChunks], {type: mimeType});
        if (liveBlob.size < 3000) return;
        const fd = new FormData();
        const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
        fd.append('audio', liveBlob, 'live.' + ext);
        const resp = await fetch('/api/stt', {method:'POST', body:fd});
        const data = await resp.json();
        if (data.text && data.text.trim() && data.text !== lastLiveText && speechState === 'recording') {
          lastLiveText = data.text;
          const cc = document.getElementById('chat-content');
          if (cc) cc.innerHTML = '<span style="color:rgba(255,255,255,0.4)">' + data.text + '</span><span style="display:inline-block;width:2px;height:13px;background:rgba(230,57,70,0.5);margin-left:3px;vertical-align:middle;animation:bwave 0.5s infinite"></span>';
        }
      } catch(e) {}
    }, 3000);

    mediaRecorder.onstop = async () => {
      if (liveTranscriptTimer) { clearInterval(liveTranscriptTimer); liveTranscriptTimer = null; }
      const mimeType = mediaRecorder.mimeType || 'audio/webm';
      const blob = new Blob(audioChunks, {type: mimeType});
      cleanupMic();
      if (blob.size > 1000) {
        await processVoice(blob, mimeType);
      }
    };
    mediaRecorder.start(250);
  } catch(err) {
    console.error('Mikrofon-Fehler:', err);
    resetSpeechState();
  }
}

function stopRecording() {
  stopAudioVisualizer();
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

function cleanupMic() {
  if (audioStream) {
    audioStream.getTracks().forEach(t => t.stop());
    audioStream = null;
  }
}

// === RUFANLAGE: Name im gesprochenen Text erkennen ===
function detectSpokenAgent(text) {
  const lower = text.toLowerCase().trim();
  // Begruessung + Name am Anfang erkennen ("hey kai", "hallo kim", "justus,")
  const greetings = /^(hey|hallo|hi|guten tag|morgen|moin|servus)?\s*/;
  const cleaned = lower.replace(greetings, '').trim();

  // Claude = Entwickler-Partner
  if (/^claude[\s,!.]/.test(cleaned) || lower.startsWith('hey claude') || lower.startsWith('hallo claude') || lower.startsWith('cloud'))
    return {name:'Claude', role:'Entwickler', agent:'claude'};

  // KIM = Persoenliche Assistentin
  if (/^kim[\s,!.]/.test(cleaned) || lower.startsWith('hey kim') || lower.startsWith('hallo kim'))
    return {name:'KIM', role:'Assistentin', agent:'kim'};

  // KAI = Concierge (explizit angesprochen)
  if (/^kai[\s,!.]/.test(cleaned) || lower.startsWith('hey kai') || lower.startsWith('hallo kai'))
    return {name:'KAI', role:'Concierge', agent:'kai'};

  // Alle Agenten aus ALL_AGENTS durchgehen
  const agentNames = [
    {match:['justus'], name:'Justus', role:'Recht', agent:'ag-justus'},
    {match:['lena'], name:'Lena', role:'Buchhaltung', agent:'ag-lena'},
    {match:['wetterfrosch','wetter'], name:'Wetterfrosch', role:'Wetter', agent:'ag-wetterfrosch'},
    {match:['kalkulierer','kalkulation'], name:'Kalkulierer', role:'Kalkulation', agent:'ag-kalkulierer'},
    {match:['bestellprofi','bestell'], name:'Bestellprofi', role:'Bestellung', agent:'ag-bestellprofi'},
    {match:['lagerist','lager'], name:'Lagerist', role:'Lager', agent:'ag-lagerist'},
    {match:['sekretaer','sekretär'], name:'Sekretaer', role:'Termine', agent:'ag-sekretaer'},
    {match:['dolmetscher','übersetzer','uebersetzer'], name:'Dolmetscher', role:'Sprachen', agent:'ag-dolmetscher'},
    {match:['bibliothekar','bibliothek'], name:'Bibliothekar', role:'Wissen', agent:'ag-bibliothekar'},
    {match:['animateur','freizeit'], name:'Animateur', role:'Freizeit', agent:'ag-animateur'},
    {match:['it-hilfe','it hilfe','technik'], name:'IT-Hilfe', role:'Support', agent:'ag-ithilfe'},
    {match:['marketing'], name:'Marketing', role:'Werbung', agent:'ag-marketing'},
    {match:['dj','musik'], name:'DJ', role:'Musik', agent:'ag-dj'},
    {match:['nachtfahrer','taxi','heimfahrt'], name:'Nachtfahrer', role:'Heimfahrt', agent:'ag-nachtfahrer'},
    {match:['dr. steuer','steuerrecht','steuer'], name:'Dr. Steuer', role:'Steuerrecht', agent:'ag-steuerrecht'},
    {match:['patentius','patentrecht','patent'], name:'Patentius', role:'Patentrecht', agent:'ag-patentrecht'},
    {match:['arbex','arbeitsrecht'], name:'Arbex', role:'Arbeitsrecht', agent:'ag-arbeitsrecht'},
    {match:['eventus','veranstaltung'], name:'Eventus', role:'Veranstaltungsrecht', agent:'ag-veranstaltungsrecht'},
    {match:['controller','controlling'], name:'Controller', role:'Controlling', agent:'ag-controlling'},
    {match:['steuerchen'], name:'Steuerchen', role:'Steuern', agent:'ag-steuerlena'},
    {match:['youtube','video scout'], name:'YouTube Scout', role:'Videos', agent:'ag-youtube'},
    {match:['web scout','web-scout'], name:'Web Scout', role:'Recherche', agent:'ag-web'},
    {match:['news','nachrichten'], name:'News Scout', role:'Nachrichten', agent:'ag-news'},
  ];

  for (const a of agentNames) {
    for (const m of a.match) {
      if (cleaned.startsWith(m + ' ') || cleaned.startsWith(m + ',') || cleaned.startsWith(m + '!') || cleaned === m)
        return {name:a.name, role:a.role, agent:a.agent};
    }
  }

  // Custom-Agenten (vom Agent Builder) pruefen
  const builtAgents = JSON.parse(localStorage.getItem('kimanus-built-agents') || '[]');
  for (const ba of builtAgents) {
    const baName = ba.name.toLowerCase();
    if (cleaned.startsWith(baName + ' ') || cleaned.startsWith(baName + ',') || cleaned === baName) {
      return {name: ba.name, role: ba.role, agent: 'custom-' + (ba.webhookPath || ba.name.toLowerCase().replace(/\s+/g,'-'))};
    }
  }

  // Kein Name erkannt → KAI (Concierge) nimmt an
  return null;
}

async function processVoice(blob, mimeType) {
  const btn = document.getElementById('speech-btn');
  btn.querySelector('span').textContent = '⏳';

  // Sofort-Check: Sind wir offline?
  if (!navigator.onLine) {
    chatAddMessage('KAI', 'Ich bin gerade offline. Sobald du wieder Netz hast, bin ich sofort fuer dich da! 📡');
    const _flr = document.querySelector('#flip-label .fl-role'); if(_flr) _flr.textContent = 'Offline 📡';
    resetSpeechState();
    return;
  }

  // 1. Sprache -> Text (Groq Whisper)
  const formData = new FormData();
  const ext = mimeType.includes('mp4') ? 'mp4' : mimeType.includes('webm') ? 'webm' : 'wav';
  formData.append('audio', blob, 'recording.' + ext);

  try {
    const sttResp = await fetch('/api/stt', {method:'POST', body:formData});
    const sttData = await sttResp.json();
    const userText = sttData.text || '';

    if (!userText.trim()) {
      btn.querySelector('span').textContent = '❌';
      setTimeout(() => resetSpeechState(), 2000);
      return;
    }

    // Pruefen ob wir im YouTube Scout sind
    const currentCard = activeCards[currentIndex];
    const ytUrlField = document.getElementById('yt-url');

    if (currentCard && currentCard.id === 'yt-scout' && ytUrlField) {
      // Im YouTube Scout: Text ins URL-Feld oder direkt an KIM
      const videoId = ytExtractId(userText);
      if (videoId) {
        // User hat eine URL gesprochen
        ytUrlField.textContent = userText;
        ytUrlField.style.color = 'rgba(255,255,255,0.5)';
        btn.querySelector('span').textContent = '🎙';
        ytAnalyze();
        return;
      }
      // Kein URL - als Suchanfrage an KIM weiterleiten
    }

    // === RUFANLAGE: Wer wird angesprochen? ===
    const spokenAgent = detectSpokenAgent(userText);
    if (spokenAgent) {
      currentAgent = spokenAgent.name;
      setMicAgent(currentAgent);
    } else if (!currentAgent || currentAgent === 'KAI') {
      // Kein Name erkannt - pruefen ob aktuelle Karte ein Custom-Agent ist
      const cc = activeCards[currentIndex];
      if (cc && cc.webhookUrl) {
        currentAgent = cc.title;
        setMicAgent(cc.title);
      }
    }
    if (spokenAgent) {
      // Agent direkt angesprochen - Avatar-Kaertchen updaten
      const flName = document.querySelector('#flip-label .fl-name');
      if (flName) flName.textContent = spokenAgent.name;
      const flRole = document.querySelector('#flip-label .fl-role');
      if (flRole) flRole.textContent = spokenAgent.role + ' · Hoert zu...';
    }

    // Erkannten Text direkt im Chat-Overlay zeigen
    pendingText = userText;
    chatAddMessage('DU', userText);
    chatShowThinking();
    const _flr = document.querySelector('#flip-label .fl-role'); if(_flr) _flr.textContent = (spokenAgent ? spokenAgent.role : 'Concierge') + ' · Denkt nach...';
    // Button auf SENDEN setzen (gruen, blinkend) + Loeschen-Button zeigen
    speechState = 'review';
    btn.querySelector('span').textContent = '▶';
    btn.querySelector('span').style.fontSize = '';
    btn.classList.add('send-ready');
    btn.style.background = 'radial-gradient(circle at 30% 30%,#4ade80 0%,#22c55e 50%,#16a34a 100%)';
    const delBtn = document.getElementById('delete-btn');
    if (delBtn) delBtn.style.display = 'flex';

    if (walkieTalkieMode) {
      // Walkie-Talkie: Sofort senden
      await sendToKim(userText);
    }
    // Review: Warten bis User auf gruenen Button drueckt

  } catch(err) {
    console.error('Pipeline-Fehler:', err);
  }
  if (speechState !== 'review') {
    resetSpeechState();
  }
}

let walkieTalkieMode = true; // Walkie-Talkie: Loslassen = sofort senden

async function sendToKim(userText) {
  const btn = document.getElementById('speech-btn');
  const delBtn = document.getElementById('delete-btn');
  if (delBtn) delBtn.style.display = 'none';
  btn.classList.remove('send-ready');

  // Denk-Animation im KIM-Kaertchen
  kimStartThink();

  // Sofort-Check: Offline?
  if (!navigator.onLine) {
    chatAddMessage('KAI', 'Ich bin gerade offline. Deine Frage habe ich mir gemerkt - sobald du wieder Netz hast, beantworte ich sie! 📡');
    const _flr = document.querySelector('#flip-label .fl-role'); if(_flr) _flr.textContent = 'Offline 📡';
    resetSpeechState();
    return;
  }

  btn.querySelector('span').textContent = '⏳';
  btn.style.background = 'radial-gradient(circle at 30% 30%,#4ade80 0%,#22c55e 50%,#16a34a 100%)';

  // Zeige "KIM denkt nach" auf der Glasplatte
  showBookQuestion(userText);

  try {
    // Custom-Agent? Direkt an seinen Webhook senden
    let chatUrl = '/api/chat';
    let chatBody = { message: userText, agent: 'kim', model: 'groq-llama', session: 'wheel-' + Date.now() };

    // 1. AKTUELLE KARTE hat VORRANG - wenn sie einen Webhook hat, nutze ihn
    const currentCard = activeCards[currentIndex];
    // SICHTBARES Debug auf der Glasplatte
    const debugMsg = '[DEBUG] idx=' + currentIndex + ' id=' + (currentCard?.id || '?') + ' title=' + (currentCard?.title || '?') + ' hook=' + (currentCard?.webhookUrl || 'KEINER');
    console.log(debugMsg);
    document.title = debugMsg.substring(0, 80);
    if (currentCard && currentCard.webhookUrl) {
      chatUrl = currentCard.webhookUrl;
      chatBody = { message: userText, history: [], session: 'wheel-' + Date.now() };
      currentAgent = currentCard.title;
      setMicAgent(currentCard.title);
      console.log('[DEBUG sendToKim] Using webhook:', chatUrl);
    } else {
      // 2. Nur wenn aktuelle Karte keinen Webhook hat: Pruefen ob ein Custom-Agent per Name angesprochen wird
      const spokenAg = detectSpokenAgent(userText);
      if (spokenAg && spokenAg.agent.startsWith('custom-')) {
        const builtAgents = JSON.parse(localStorage.getItem('kimanus-built-agents') || '[]');
        const customAgent = builtAgents.find(a => ('custom-' + (a.webhookPath || a.name.toLowerCase().replace(/\s+/g,'-'))) === spokenAg.agent);
        if (customAgent && customAgent.webhook_url) {
          chatUrl = customAgent.webhook_url;
          chatBody = { message: userText, history: [], session: 'wheel-' + Date.now() };
        }
      }
    }

    const chatResp = await fetch(chatUrl, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(chatBody)
    });

    let kimAnswer = '';
    const contentType = chatResp.headers.get('content-type') || '';

    if (contentType.includes('application/json')) {
      const data = await chatResp.json();
      kimAnswer = data.output || data.text || data.answer || '';
    } else {
      const reader = chatResp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream:true});
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const d = JSON.parse(line.slice(6));
              if (d.token) kimAnswer += d.token;
              if (d.full) kimAnswer = d.full;
              if (d.output) kimAnswer = d.output;
            } catch(e) {}
          }
        }
      }
    }

    if (kimAnswer) {
      conversationHistory.push({q: userText, a: kimAnswer, time: Date.now()});
      lastKimAnswer = kimAnswer;
      showKimResponse(userText, kimAnswer);
    }
  } catch(err) {
    console.error('KIM-Fehler:', err);
  }
  resetSpeechState();
}

  touchOnButton = false;

  longPressTriggered = false; // Erst hier zuruecksetzen - beim NEUEN Touch
  const el = e.target;
  // Mic-Ring = touch-sicher (kein Rad-Drehen)
  if (el.closest('#mic-ring-wrap')) {
    touchOnButton = true;
    return;
  }
  // Pruefen ob Touch auf einem Button oder klickbaren Element ist
  if (el.tagName === 'BUTTON' || el.id === 'trash-btn-glass' || el.closest('button')) {
    touchOnButton = true;
    return;
  }
  // Pruefen ob Touch innerhalb eines scrollbaren Bereichs ist
  let node = el;
  while (node && node !== wc) {
    const style = getComputedStyle(node);
    if ((style.overflowY === 'auto' || style.overflowY === 'scroll') && node.scrollHeight > node.clientHeight) {
      touchInScrollable = true;
      break;
    }
    node = node.parentElement;
  }
  // Long-Press Timer: 1.5s NUR auf Sichtfenster (panel-center) oder Karte, NICHT auf panel-bottom
  if (!isFlipped && !touchInScrollable && (el.closest('#panel-center') || el.closest('#panel-top') || el.closest('.wheel-card')) && !el.closest('#panel-bottom')) {
    panelLongTimer = setTimeout(() => {
      longPressTriggered = true;
      openActionSheet(currentIndex);
      panelLongTimer = null;
    }, 1500);
  }
}, {passive:true});
// Long-Press abbrechen bei Bewegung
wc.addEventListener('touchmove', (e) => {
  if (!panelLongTimer) return;
  const dx = Math.abs(e.touches[0].clientX - dragStartX);
  const dy = Math.abs(e.touches[0].clientY - dragStartY);
  if (dx > 12 || dy > 12) {
    clearTimeout(panelLongTimer);
    panelLongTimer = null;
  }
}, {passive:true});
wc.addEventListener('touchend', e => {
  if (panelLongTimer) { clearTimeout(panelLongTimer); panelLongTimer = null; }
  // Wenn Action-Sheet offen: kurzer Tap schliesst es sofort
  if (actionSheetCardIdx !== null && !longPressTriggered) {
    const diffY = Math.abs(dragStartY - e.changedTouches[0].clientY);
    const diffX = Math.abs(e.changedTouches[0].clientX - dragStartX);
    if (diffX < 15 && diffY < 15) {
      actionSheetJustOpened = false;
      closeActionSheet();
      return;
    }
  }
  if (touchOnButton) { touchOnButton = false; return; }
  if (longPressTriggered) return;
  const card = e.target.closest('.wheel-card');
  const diffY = dragStartY - e.changedTouches[0].clientY;
  const diffX = e.changedTouches[0].clientX - dragStartX;

  // Horizontaler Swipe = IMMER Flip (auch in scrollbaren Bereichen)
  if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
    touchInScrollable = false;
    flipCard();
  } else if (touchInScrollable) { touchInScrollable = false; return;
  } else if (Math.abs(diffY) > 40) {
    spinWheel(diffY > 0 ? 1 : -1);
  } else if (Math.abs(diffX) < 10 && Math.abs(diffY) < 10) {
    // Kurzer Tap: nur Action-Sheet schliessen wenn offen
    if (actionSheetCardIdx !== null) {
      closeActionSheet();
    }
  }
}, {passive:true});

// Mouse
wc.addEventListener('mousedown', e => { dragStartY = e.clientY; dragStartX = e.clientX; });
wc.addEventListener('mouseup', e => {
  const diffY = dragStartY - e.clientY;
  const diffX = e.clientX - dragStartX;
  if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
    flipCard();
  } else if (Math.abs(diffY) > 40) {
    spinWheel(diffY > 0 ? 1 : -1);
  }
});

// Scroll wheel
wc.addEventListener('wheel', e => {
  e.preventDefault();
  spinWheel(e.deltaY > 0 ? 1 : -1);
}, {passive:false});

// Swipe-Handler fuer Vollbild
(function() {
  const el = document.getElementById('regio-fullpage');
  el.addEventListener('touchstart', function(e) {
    regioSwipeStartX = e.touches[0].clientX;
    regioSwipeStartY = e.touches[0].clientY;
  }, {passive: true});

  el.addEventListener('touchend', function(e) {
    if (!regioFullpageOpen) return;
    const dx = e.changedTouches[0].clientX - regioSwipeStartX;
    const dy = e.changedTouches[0].clientY - regioSwipeStartY;

    // Runter-Wischen = schliessen
    if (dy > 100 && Math.abs(dx) < 80) {
      closeRegioPage();
      return;
    }

    // Links/Rechts Wischen = Einzelseite blaettern
    if (Math.abs(dx) > 50 && Math.abs(dy) < 80) {
      const pages = regioPages.length ? regioPages : getRegioDoppelPages();
      if (dx < 0) {
        // Swipe links = naechste Seite
        if (regioCurrentSide === 'left') {
          renderRegioEinzel(regioPageIndex, 'right');
        } else if (regioPageIndex < pages.length - 1) {
          renderRegioEinzel(regioPageIndex + 1, 'left');
        }
      } else {
        // Swipe rechts = vorherige Seite
        if (regioCurrentSide === 'right') {
          renderRegioEinzel(regioPageIndex, 'left');
        } else if (regioPageIndex > 0) {
          renderRegioEinzel(regioPageIndex - 1, 'right');
        }
      }
    }
  }, {passive: true});
})();

function saveLiveTranscript(role, text, agentName) {
  if (!text || !text.trim()) return;
  const transcripts = JSON.parse(localStorage.getItem('kimanus-live-transcripts') || '[]');
  transcripts.push({
    role: role, // 'user' oder 'agent'
    agent: agentName || 'KIM', // Welcher Agent (KIM, KAI, Claude)
    text: text.trim(),
    time: new Date().toISOString()
  });
  if (transcripts.length > 500) transcripts.splice(0, transcripts.length - 500);
  localStorage.setItem('kimanus-live-transcripts', JSON.stringify(transcripts));
}

// Transkripte in Vault sichern (ueber claude-home Webhook)
async function saveTranscriptsToVault() {
  const transcripts = JSON.parse(localStorage.getItem('kimanus-live-transcripts') || '[]');
  if (transcripts.length === 0) return;

  // Gruppiere nach Agent und Tag
  const sessions = {};
  transcripts.forEach(t => {
    const date = t.time.split('T')[0];
    const agent = t.agent || 'KIM';
    const key = `${date}_${agent}`;
    if (!sessions[key]) sessions[key] = [];
    sessions[key].push(t);
  });

  // An claude-home senden fuer Vault-Speicherung
  try {
    await fetch('https://manus.kimanus.de/webhook/claude', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        message: '[TRANSCRIPT_SAVE] Bitte speichere diese Gespraeche in deinen Vault unter /vault/daily/' +
                 new Date().toISOString().split('T')[0] + '-live-dialoge.md - Gruppiert nach Agent:\n\n' +
                 JSON.stringify(sessions, null, 2)
      })
    });
  } catch(e) {
    console.log('Vault save failed:', e);
  }
}

function getTranscriptSummary() {
  const t = getLiveTranscripts();
  if (t.length === 0) return 'Keine Gespraeche gespeichert';
  const sessions = {};
  t.forEach(entry => {
    const date = entry.time.split('T')[0];
    if (!sessions[date]) sessions[date] = 0;
    sessions[date]++;
  });
  const dates = Object.keys(sessions).sort().reverse();
  return dates.slice(0, 5).map(d => d + ': ' + sessions[d] + ' Nachrichten').join('\n');
}

  // Fallback wenn ungueltige Stimme im Setup
  if (!validVoices.includes(voice)) {

}

function ensureLivePlaybackCtx() {
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!livePlayCtx || livePlayCtx.state === 'closed') {
    livePlayCtx = new AC({ sampleRate: 24000 });
  }
  if (livePlayCtx.state === 'suspended') {
    livePlayCtx.resume();
    const silent = livePlayCtx.createBuffer(1, 1, 24000);
    const src = livePlayCtx.createBufferSource();
    src.buffer = silent;
    src.connect(livePlayCtx.destination);
    src.start();
  }
  return livePlayCtx;
}

async function startLiveMicrophone() {
  try {
    liveMicStream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
    const AC = window.AudioContext || window.webkitAudioContext;
    liveAudioCtx = new AC({ sampleRate: 16000 });
    if (liveAudioCtx.state === 'suspended') await liveAudioCtx.resume();
    const source = liveAudioCtx.createMediaStreamSource(liveMicStream);
    liveProcessor = liveAudioCtx.createScriptProcessor(8192, 1, 1);
    liveProcessor.onaudioprocess = (e) => {
      if (!liveIsActive || !liveWs || liveWs.readyState !== WebSocket.OPEN) return;
      const float32 = e.inputBuffer.getChannelData(0);
      const int16 = new Int16Array(float32.length);
      for (let i = 0; i < float32.length; i++) {
        int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
      }
      const bytes = new Uint8Array(int16.buffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      liveWs.send(JSON.stringify({
        realtimeInput: { audio: { data: btoa(binary), mimeType: 'audio/pcm;rate=16000' } }
      }));
    };
    source.connect(liveProcessor);
    liveProcessor.connect(liveAudioCtx.destination);
  } catch(err) {
    console.error('Live Mic Fehler:', err);
  }
}

async function playNextLiveAudio() {
  if (livePlaybackQueue.length === 0) { liveIsPlaying = false; return; }
  liveIsPlaying = true;
  const b64 = livePlaybackQueue.shift();
  try {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const int16 = new Int16Array(bytes.buffer);
    const ctx = ensureLivePlaybackCtx();
    if (ctx.state === 'suspended') await ctx.resume();
    const buffer = ctx.createBuffer(1, int16.length, 24000);
    const channel = buffer.getChannelData(0);
    // Sanfte Konvertierung ohne aggressive Normalisierung
    for (let i = 0; i < int16.length; i++) channel[i] = int16[i] / 32768;
    // Sanftes Ein-/Ausblenden gegen Knacksen (Fade 64 Samples = ~2.7ms)
    const fade = Math.min(64, int16.length / 4);
    for (let i = 0; i < fade; i++) channel[i] *= i / fade;
    for (let i = 0; i < fade; i++) channel[int16.length - 1 - i] *= i / fade;
    const source = ctx.createBufferSource();
    source.buffer = buffer;
    // Moderater Gain (nicht zu laut, kein Clipping)
    const gainNode = ctx.createGain();
    gainNode.gain.value = 1.2;
    source.connect(gainNode);
    gainNode.connect(ctx.destination);
    source.onended = () => playNextLiveAudio();
    source.start();
  } catch(err) { playNextLiveAudio(); }
}

let livePageCount = 0;
let liveAllPages = [];
let liveViewStart = 0;

function createNotebookPage() {
  livePageCount++;
  const page = document.createElement('div');
  page.className = 'live-page';
  page.id = 'live-page-' + livePageCount;
  page.style.cssText = 'flex:1;height:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:2px;padding:2px 4px;overflow:hidden;font-size:9px;line-height:1.3;color:rgba(255,255,255,0.5);word-wrap:break-word';
  const content = document.createElement('div');
  content.className = 'live-page-content';
  if (livePageCount === 1) {
    content.innerHTML = '<span style="font-size:7px;color:rgba(139,92,246,0.35)">Notiz ' + new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}) + ' · </span>';
  }
  page.appendChild(content);
  liveAllPages.push({ page, content });
  return content;
}

function showPagePair(startIdx) {
  const view = document.getElementById('live-pages-view');
  if (!view) return;
  view.innerHTML = '';
  for (let i = startIdx; i < startIdx + 2 && i < liveAllPages.length; i++) {
    view.appendChild(liveAllPages[i].page);
  }
  const nav = document.getElementById('live-pages-nav');
  const indicator = document.getElementById('live-page-indicator');
  if (nav && indicator && liveAllPages.length > 2) {
    nav.style.display = 'block';
    indicator.textContent = 'S.' + (startIdx + 1) + '-' + Math.min(startIdx + 2, liveAllPages.length) + ' von ' + liveAllPages.length;
  }
  liveViewStart = startIdx;
}

function getCurrentPage() {
  if (liveAllPages.length === 0) {
    createNotebookPage();
    createNotebookPage();
    showPagePair(0);
    return liveAllPages[0].content;
  }
  const last = liveAllPages[liveAllPages.length - 1];
  if (last.page.scrollHeight > last.page.clientHeight) {
    const newContent = createNotebookPage();
    const newStart = Math.max(0, liveAllPages.length - 2);
    if (newStart !== liveViewStart) showPagePair(newStart);
    return newContent;
  }
  return last.content;
}

function appendToNotebook(html) {
  const page = getCurrentPage();
  if (!page) return;
  const span = document.createElement('span');
  span.innerHTML = html;
  page.appendChild(span);
  const parent = page.parentElement;
  if (parent && page.scrollHeight > parent.clientHeight) {
    page.removeChild(span);
    const newContent = createNotebookPage();
    if (newContent) {
      newContent.appendChild(span);
      const newStart = Math.max(0, liveAllPages.length - 2);
      showPagePair(newStart);
    }
  }
}

function endLiveSession() {
  // Gespraech ins n8n-Memory speichern
  saveLiveToN8n();
  liveIsActive = false;
  if (liveWs) { liveWs.close(); liveWs = null; }
  if (liveProcessor) { liveProcessor.disconnect(); liveProcessor = null; }
  if (liveMicStream) { liveMicStream.getTracks().forEach(t => t.stop()); liveMicStream = null; }
  if (liveAudioCtx && liveAudioCtx.state !== 'closed') { liveAudioCtx.close(); liveAudioCtx = null; }
  livePlaybackQueue = [];
  liveIsPlaying = false;
  // Button zuruecksetzen
  const btn = document.getElementById('speech-btn');
  const agent = document.getElementById('speech-agent');
  if (btn) btn.style.background = 'radial-gradient(circle at 30% 30%,#4ade80 0%,#22c55e 50%,#16a34a 100%)';
  setInputMode(currentInputMode); // Reset icon
  // NEU: Haupt-Input-Button zurueck auf Idle (gruen statisch)
  setMainInputButtonActive(false);
  hideLiveAgentBadge();
  // Glasplatte zuruecksetzen - Original-Karte wiederherstellen
  rebuildWheel();
}
