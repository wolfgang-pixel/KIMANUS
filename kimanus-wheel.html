<!DOCTYPE html>
<!-- KIMANUS Wheel v6.0 - Architektur v4: KIMANUS/KIM/Tools/Wallet (kein KAI, kein KI-MANUS) -->
<html lang="de" style="color-scheme:dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0e">
<title>KIMANUS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{height:100dvh;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--skin-bg);color:var(--skin-glass-text)}

:root{
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --kim-red:#e63946;
  /* === SKIN VARIABLEN (austauschbar) === */
  --skin-header-bg:#1a1a1a;
  --skin-header-border:rgba(255,255,255,0.1);
  --skin-bar-bg:#1a1a1a;
  --skin-bar-border:rgba(255,255,255,0.12);
  --skin-glass-bg:rgba(35,35,38,0.88);
  --skin-glass-blur:12px;
  --skin-glass-border:rgba(255,255,255,0.12);
  --skin-glass-text:#f0f0f0;
  --skin-tresor-bg:rgba(35,35,38,0.96);
  --skin-tresor-blur:20px;
  --skin-bg:#111111;
}

#app{
  display:flex;flex-direction:column;
  height:100dvh;
  padding-top:var(--sat);padding-bottom:var(--sab);
  position:fixed;inset:0;
}

/* === HEADER === */
#header{
  display:flex;align-items:center;gap:8px;
  height:60px;
  padding:0 12px;
  background:var(--skin-header-bg);
  border-bottom:2px solid rgba(255,255,255,0.15);
  flex-shrink:0;z-index:20;
}
.logo-circle{
  width:30px;height:30px;border-radius:50%;
  background:var(--kim-red);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:14px;color:#fff;
}
#header .title{font-size:18px;font-weight:800;letter-spacing:3px;flex:1}
#header .hdr-btn{background:none;border:none;cursor:pointer;padding:4px}
#header .hdr-btn svg{width:22px;height:22px;fill:#888}

/* === DREI GLEICH GROSSE FELDER === */
#wheel-container{
  flex:1;display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}

.panel{
  flex:1;position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
/* Obere Glasplatte groesser (Platz fuer geflippte Karte) */
#panel-top{
  flex:1.2;
}
/* Sichtfenster fest */
#panel-center{
  flex:none;
  height:230px;
}
/* Untere Glasplatte kleiner */
#panel-bottom{
  flex:0.8;
}

/* Milchiges Glas oben */
#panel-top{
  position:relative;
}
#panel-top::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(14,14,14,0.35) 0%, rgba(14,14,14,0.08) 80%, transparent 100%);
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
  pointer-events:none;z-index:14;
  border-bottom:2px solid rgba(255,255,255,0.2);
}

/* Sichtfenster - klar */
#panel-center{
  position:relative;z-index:5;
}

/* Milchiges Glas unten */
#panel-bottom{
  position:relative;
}
#panel-bottom::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(0deg, rgba(14,14,14,0.35) 0%, rgba(14,14,14,0.08) 80%, transparent 100%);
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
  pointer-events:none;z-index:14;
  border-top:2px solid rgba(255,255,255,0.2);
}

/* === SWIPE HINT (pulsender Pfeil unter Milchglas) === */
#swipe-hint-behind{
  position:absolute;
  bottom:calc(40% - 75px);
  left:22px;
  font-size:34px;
  font-weight:200;
  color:rgba(230,57,70,0.8);
  z-index:0;
  pointer-events:none;
  animation:swipeHintGlow 2s ease-in-out infinite;
}
@keyframes swipeHintPulse{
  0%{color:rgba(230,57,70,0);text-shadow:none}
  50%{color:rgba(230,57,70,1);text-shadow:0 0 12px rgba(230,57,70,0.8)}
  100%{color:rgba(230,57,70,0);text-shadow:none}
}
@keyframes swipeHintGlow{
  0%{opacity:0}
  50%{opacity:1}
  100%{opacity:0}
}
#swipe-hint-behind.hidden{display:none}

/* === RAD-MECHANISMUS === */
#wheel-track,#back-track{
  position:absolute;
  left:0;right:0;
  transition:transform 1.2s cubic-bezier(0.23,1,0.32,1);
  will-change:transform;
}
#back-track{z-index:12}
.back-wheel-card{
  width:calc(100% - 20px);
  height:210px;
  position:absolute;
  left:10px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;
  transition:all 1.2s cubic-bezier(0.23,1,0.32,1);
}
.back-wheel-card .bwc-title{
  font-size:15px;font-weight:700;color:rgba(255,255,255,0.6);
  text-transform:uppercase;letter-spacing:2px;
  margin-bottom:10px;
}
.back-wheel-card .bwc-content{
  font-size:14px;color:rgba(255,255,255,0.5);text-align:center;line-height:1.8;
  white-space:pre-line;
}
.back-wheel-card .bwc-video-full{
  width:100%;
  height:100%;
  border-radius:0;
}
.back-wheel-card .bwc-video{
  width:calc(100% - 16px);
  height:calc(100% - 40px);
  border-radius:4px;
  margin-top:4px;
}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes bwave{0%,100%{transform:scaleY(0.5)}50%{transform:scaleY(1.2)}}
@keyframes sendPulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,0.6)}50%{box-shadow:0 0 0 12px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
@keyframes slideArrow{0%{transform:translateX(-30px);opacity:0}50%{opacity:1}100%{transform:translateX(30px);opacity:0}}
.back-wheel-card .bwc-search-hint{
  margin-top:12px;
  font-size:10px;
  color:rgba(230,57,70,0.4);
  letter-spacing:0.5px;
}

.wheel-card{
  height:210px;
  width:calc(100% - 20px);
  left:50%;
  transform:translateX(-50%);
  margin-left:0;
  position:absolute;
  border-radius:0;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  perspective:800px;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}

/* Card-Inneres fuer Flip */
.card-inner{
  width:100%;height:100%;
  position:relative;
  transition:transform 1.2s cubic-bezier(0.25,0.1,0.25,1);
  transform-style:preserve-3d;
}
.wheel-card.flipped .card-inner{
  transform:rotateY(180deg);
}

.card-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:0;
  padding:16px;
}

/* Vorderseite */
.card-front{
  background:transparent;
  padding:16px 20px;
  justify-content:space-between;
  align-items:stretch;
}
.card-front .card-icon{
  font-size:48px;
  position:absolute;top:14px;right:18px;
}
.card-front .card-header{
  display:flex;flex-direction:column;gap:3px;
}
.card-front .card-name{
  font-size:26px;font-weight:700;color:rgba(255,255,255,0.6);
  letter-spacing:1px;
}
.card-front .card-role{
  font-size:13px;font-weight:600;color:rgba(255,255,255,0.4);
  letter-spacing:2px;text-transform:uppercase;
}
.card-front .card-contact{
  display:flex;flex-direction:column;gap:3px;
}
.card-front .card-contact span{
  font-size:13px;color:rgba(255,255,255,0.35);letter-spacing:0.5px;
}
.card-front .card-brand{
  position:absolute;bottom:14px;right:18px;
  font-size:10px;font-weight:800;color:rgba(255,255,255,0.2);
  letter-spacing:3px;
}

/* === Features-Layout (KIM-Karte etc.) === */
.card-front .card-body{
  display:flex;justify-content:space-between;align-items:flex-end;
  flex:1;margin-top:12px;gap:12px;
}
.card-front .card-features{
  display:flex;flex-direction:column;gap:5px;
  flex:1;
}
.card-front .card-features span{
  font-size:13px;font-weight:600;color:rgba(255,255,255,0.45);
  letter-spacing:2px;text-transform:uppercase;line-height:1.4;
}
.card-front .card-features span::before{
  content:'· ';font-weight:700;
}
.card-front .card-contact-right{
  display:flex;flex-direction:column;gap:3px;
  align-items:flex-end;text-align:right;
  min-width:fit-content;padding-bottom:2px;
}
.card-front .card-contact-right span{
  font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:0.5px;
}
/* Subtitle fuer Karten mit features: KIMANUS nach dem Namen */
.card-front .card-name .card-name-sub{
  font-size:14px;font-weight:400;color:rgba(255,255,255,0.3);
  letter-spacing:2px;margin-left:6px;
}

/* Rückseite */
.card-back{
  background:transparent;
  transform:rotateY(180deg);
}
.card-back .back-title{
  font-size:15px;font-weight:700;color:rgba(255,255,255,0.6);
  text-transform:uppercase;letter-spacing:2px;
  margin-bottom:10px;
}
.card-back .back-content{
  font-size:14px;color:rgba(255,255,255,0.5);text-align:center;line-height:1.8;
  white-space:pre-line;padding:0 20px;
}

/* === Grid-Layout (Scouts etc.) === */
.grid-header{
  position:absolute;top:12px;left:16px;
  font-size:14px;font-weight:700;color:rgba(255,255,255,0.5);
  letter-spacing:2px;text-transform:uppercase;
}
.grid-container{
  display:grid;gap:6px;
  width:100%;padding:0 4px;
}
.grid-cell{
  border:1px solid rgba(255,255,255,0.06);
  border-radius:3px;
  background:rgba(255,255,255,0.02);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:2px;padding:2px;
  overflow:hidden;
}
.grid-cell-filled{
  background:rgba(255,255,255,0.05);
  border-color:rgba(255,255,255,0.1);
  cursor:pointer;
}
.grid-cell-filled:active{
  background:rgba(255,255,255,0.1);
}
.grid-cell-icon{
  font-size:22px;line-height:1;
}
.grid-cell-label{
  font-size:10px;font-weight:600;color:rgba(255,255,255,0.4);
  text-align:center;letter-spacing:0.3px;text-transform:uppercase;
  line-height:1.1;
}

.grid-sections{
  width:100%;height:100%;display:flex;flex-direction:column;
  padding:0;gap:0;
  overflow:hidden;
}
.grid-section-header{
  font-size:12px;font-weight:700;color:rgba(255,255,255,0.45);
  letter-spacing:3px;text-transform:uppercase;
  padding:6px 6px 4px;
  flex-shrink:0;
}
.grid-section{
  min-height:0;
}
.grid-section .grid-cell{
  height:auto;min-height:50px;
}
/* Grid-Karten: kein Padding, Inhalt fuellt ganze Karte */
.back-wheel-card:has(.grid-sections),
.back-wheel-card:has([style*="position:relative"]){
  padding:0;
}

/* Keine Extra-Effekte - reine Glasplatte */

/* === FLIP LABEL (Vorderseite oben beim Flip) === */
#flip-label{
  display:none;
  position:absolute;
  left:50%;
  transform:translateX(-50%) scale(0.85);
  z-index:30;
  width:100%;
  height:210px;
  background:var(--skin-tresor-bg);
  border:1px solid var(--skin-glass-border);
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  align-items:center;justify-content:center;
  opacity:0;
  transition:all 0.8s ease;
}
#flip-label.visible{
  display:flex;
  opacity:1;
}
.fl-card{
  width:100%;height:100%;
  padding:12px 16px;
  display:flex;flex-direction:column;
  justify-content:space-between;
  position:relative;
}
.fl-card .fl-icon{font-size:36px;position:absolute;top:10px;right:14px}
.fl-card .fl-name{font-size:22px;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:1px}
.fl-card .fl-role{font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.fl-card .fl-contact{font-size:11px;color:rgba(255,255,255,0.25)}
.fl-card .fl-features{display:flex;flex-direction:column;gap:1px;margin-top:4px}
.fl-card .fl-features span{font-size:10px;font-weight:600;color:rgba(255,255,255,0.3);letter-spacing:1px;text-transform:uppercase}
.fl-card .fl-brand{position:absolute;bottom:10px;right:14px;font-size:8px;font-weight:800;color:rgba(255,255,255,0.15);letter-spacing:3px}

/* === REGISTER === */
#register-panel{
  display:none;
  position:absolute;bottom:0;left:0;right:0;
  height:33.33%;z-index:15;
  background:#161616;
  border-top:1px solid rgba(255,255,255,0.08);
}
#register-panel.visible{display:flex;flex-direction:column}
#register-tabs{flex:1;overflow-y:auto;padding:6px 12px;scrollbar-width:none}
#register-tabs::-webkit-scrollbar{display:none}
.register-tab{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
}
.register-tab:active{background:rgba(255,255,255,0.06)}
.register-tab .tab-icon{font-size:20px}
.register-tab .tab-name{font-size:14px;font-weight:600;color:#ccc;flex:1}

/* === BOTTOM BAR === */
#bottom-bar{
  display:flex;align-items:center;justify-content:center;gap:20px;
  height:80px;
  margin-bottom:-40px;
  padding:0 16px;
  background:#161616;
  border-top:2px solid rgba(255,255,255,0.15);
  border-bottom:2px solid rgba(255,255,255,0.2);
  flex-shrink:0;z-index:20;
  position:relative;
}

#speech-btn{
  width:70px;height:70px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#4ade80 0%,#22c55e 50%,#16a34a 100%);
  border:4px solid rgba(220,220,220,0.5);
  box-shadow:0 4px 20px rgba(230,57,70,0.4);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform 0.15s;
  margin-top:-35px;
}
#speech-btn:active{transform:scale(0.9)}
#speech-btn svg{width:28px;height:28px;fill:#fff}
#speech-btn.listening{animation:pulse 1s infinite}
#speech-btn.send-ready{animation:sendPulse 1.5s infinite}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(230,57,70,0.7);transform:scale(1)}
  50%{box-shadow:0 0 0 18px rgba(230,57,70,0);transform:scale(1.05)}
  100%{box-shadow:0 0 0 0 rgba(230,57,70,0);transform:scale(1)}
}

.small-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.small-btn:active{transform:scale(0.9);background:rgba(255,255,255,0.1)}
.small-btn svg{width:18px;height:18px;fill:#888}

/* Status */
#status-text{
  display:none;
}
#speech-btn span{
  font-size:14px;font-weight:800;color:#fff;letter-spacing:2px;
}

/* === TASTATUR-TOOLBAR === */
#kb-toolbar{
  display:none;
  position:fixed;
  left:0;right:0;
  bottom:0;
  height:44px;
  background:#1e1e1e;
  border-top:1px solid rgba(255,255,255,0.1);
  z-index:100;
  align-items:center;
  justify-content:space-between;
  padding:0 8px;
  gap:6px;
}
#kb-toolbar.visible{display:flex}
.kb-btn{
  padding:6px 12px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.4);
  font-size:12px;
  cursor:pointer;
  border-radius:4px;
  white-space:nowrap;
}
.kb-btn:active{background:rgba(255,255,255,0.12)}
.kb-analyze{background:rgba(230,57,70,0.15);border-color:rgba(230,57,70,0.3);color:rgba(230,57,70,0.6)}
.kb-kim{background:rgba(230,57,70,0.1);border-color:rgba(230,57,70,0.2);color:rgba(230,57,70,0.5)}
.kb-done{margin-left:auto}

/* === TRESOR === */
#tresor-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.4);
  z-index:15;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.5s;
}
#tresor-overlay.open{opacity:1;pointer-events:auto}
/* Tresor-Panel: hinter Bottom Bar, gleiche Breite wie Karten */
#tresor-panel{
  position:fixed;
  left:50%;
  width:calc((100% - 10px) * 0.9);
  bottom:-500px;
  transform:translateX(-50%);
  background:var(--skin-tresor-bg);
  backdrop-filter:blur(var(--skin-tresor-blur));-webkit-backdrop-filter:blur(var(--skin-tresor-blur));
  border:1px solid var(--skin-glass-border);
  z-index:16;
  transition:bottom 0.5s cubic-bezier(0.25,0.1,0.25,1);
  padding:2px;
}
#tresor-overlay.open #tresor-panel{
  bottom:80px;
}
/* Section-Titel: ganz schmal, fein */
.tresor-section-title{
  font-size:13px;font-weight:600;
  color:rgba(255,255,255,0.25);
  letter-spacing:1.5px;
  padding:0 6px;
  height:17px;
  line-height:17px;
  background:rgba(255,255,255,0.06);
}
.tresor-divider{
  padding:0 6px;
  height:17px;
  line-height:17px;
  margin:0;
  background:rgba(255,255,255,0.06);
  display:flex;align-items:center;
}
.tresor-divider span{
  font-size:13px;font-weight:600;
  color:rgba(255,255,255,0.25);
  letter-spacing:1.5px;
}
/* Grids: eng */
.tresor-grid{
  width:100%;
  display:grid;
  gap:0;
}
.tresor-grid-3x2{
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,1fr);
}
.tresor-grid-2x2{
  grid-template-columns:repeat(2,1fr);
  grid-template-rows:repeat(2,1fr);
}
.tresor-grid-2x1{
  grid-template-columns:repeat(2,1fr);
  grid-template-rows:1fr;
}
.tresor-tab{
  display:flex;align-items:center;justify-content:center;
  background:transparent;
  border-right:1px solid rgba(255,255,255,0.07);
  border-bottom:1px solid rgba(255,255,255,0.07);
  cursor:pointer;
  padding:10px 3px;
  min-height:42px;
}
.tresor-tab:last-child{border-right:none}
.tresor-tab:active{background:rgba(255,255,255,0.05)}
.tresor-tab span{font-size:14px;font-weight:600;color:rgba(255,255,255,0.35);text-align:center}

/* Tresor-Button links in Bar */
#tresor-btn{
  position:absolute;
  left:15px;top:50%;transform:translateY(-50%);
  font-size:20px;
  cursor:pointer;
  padding:8px;
  opacity:0.4;
  transition:opacity 0.3s;
  border:none;background:none;
  -webkit-tap-highlight-color:transparent;
}
#tresor-btn:active{opacity:0.7}

/* Helligkeits-Schieber rechts in Bar */
#brightness-slider{
  position:absolute;
  right:12px;top:50%;transform:translateY(-50%);
  -webkit-appearance:none;appearance:none;
  width:90px;height:4px;
  background:rgba(255,255,255,0.15);
  border-radius:2px;
  outline:none;
  opacity:0.5;
  transition:opacity 0.3s;
}
#brightness-slider:active{opacity:0.9}
#brightness-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:16px;height:16px;border-radius:50%;
  background:#f0f0f0;
  border:2px solid rgba(255,255,255,0.3);
  cursor:pointer;
}

</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="logo-circle" onclick="showKimanusInfo()">K</div>
    <div style="flex:1">
      <div style="cursor:pointer" onclick="showKimanusInfo()"><span class="title" style="margin:0">KIMANUS</span></div>
      <div onclick="showKimInfo()" style="cursor:pointer">
        <span style="font-size:14px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:2px">KIM</span>

let activeCards = CARDS;
let currentIndex = 0;
let isFlipped = false;
let backIndex = 0;
let isListening = false;
let registerOpen = false;
let panelH = 0;
let isAnimating = false;

function init() {
  calcSizes();
  // Setup-Config anwenden BEVOR Karten gebaut werden
  rebuildWheel();

  // Wiederkehrende Nutzer: letzte Position wiederherstellen
  const visited = localStorage.getItem('kimanus-visited');
  const lastCard = parseInt(localStorage.getItem('kimanus-lastCard') || '0');
  if (visited && lastCard > 0 && lastCard < activeCards.length) {
    currentIndex = lastCard;
    positionCards(false);
  }

  window.addEventListener('resize', () => { calcSizes(); positionCards(false); });
}

function calcSizes() {
  const container = document.getElementById('wheel-container');
  const totalH = container.clientHeight;
  const centerH = 230;
  const remainH = totalH - centerH;
  const topH = Math.floor(remainH * 0.6);
  const bottomH = remainH - topH;
  panelH = centerH;
  // Debug
  document.querySelector('#header .title').textContent = 'KIMANUS';
}

function buildCards() {
  const track = document.getElementById('wheel-track');
  track.innerHTML = activeCards.map((card, i) => `
    <div class="wheel-card" id="card-${i}" onclick="handleCardTap(${i})">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-icon">${card.icon}</div>
          <div class="card-header">
            <div class="card-name">${card.title}${card.features ? '<span class="card-name-sub">KIMANUS</span>' : ''}</div>
            <div class="card-role">${card.subtitle}</div>
          </div>
          ${card.features ? `
          <div class="card-body">
            <div class="card-features">
              ${card.features.map(f => `<span>${f}</span>`).join('')}
            </div>
            <div class="card-contact-right">
              <span>${card.email || ''}</span>
              <span>${card.phone || ''}</span>
            </div>
          </div>
          ` : `
          <div class="card-contact">
            <span>${card.email || ''}</span>
            <span>${card.phone || ''}</span>
          </div>
          <div class="card-brand">KIMANUS</div>
          `}
        </div>
        <div class="card-face card-back">
          <div class="back-title" id="back-title-${i}">${card.backs?.[0]?.title || ''}</div>
          <div class="back-content" id="back-content-${i}">${card.backs?.[0]?.content || ''}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function positionCards(animate) {
  const container = document.getElementById('wheel-container');
  const totalH = container.clientHeight;
  const centerH = 230;
  const remainH = totalH - centerH;
  const topH = Math.floor(remainH * 0.6);
  const bottomH = remainH - topH;

  // Mittelpunkte der drei Panels
  const topMid = topH / 2;
  const centerMid = topH + (centerH / 2);
  const bottomMid = topH + centerH + (bottomH / 2);

  activeCards.forEach((card, i) => {
    const el = document.getElementById('card-' + i);
    if (!el) return;

    const cardH = el.offsetHeight || 200;
    const offset = getOffset(i);

    let cardMid;
    if (offset === 0) cardMid = centerMid;
    else if (offset === -1) cardMid = topMid;
    else if (offset === 1) cardMid = bottomMid + 40;
    else if (offset < -1) cardMid = topMid - topH;
    else cardMid = bottomMid + bottomH + 60;

    el.style.top = (cardMid - cardH / 2) + 'px';
    el.style.transition = animate ? 'all 1.2s cubic-bezier(0.23,1,0.32,1)' : 'none';

    if (offset === 0) {
      el.style.opacity = '1';
      el.style.transform = 'translateX(-50%) scale(1)';
      el.style.zIndex = '10';
    } else if (Math.abs(offset) === 1) {
      el.style.opacity = '0.5';
      el.style.transform = 'translateX(-50%) scale(0.9)';
      el.style.zIndex = '5';
    } else {
      el.style.opacity = '0';
      el.style.transform = 'translateX(-50%) scale(0.8)';
      el.style.zIndex = '1';
    }
  });
  updateStatus();
  updateFlipLabel();
}

function getOffset(i) {
  let diff = i - currentIndex;
  if (diff > activeCards.length / 2) diff -= activeCards.length;
  if (diff < -activeCards.length / 2) diff += activeCards.length;
  return diff;
}

function spinWheel(direction) {
  if (isAnimating) return;
  // Header-Karte entfernen wenn User am Rad dreht
  if (headerCardActive && !isFlipped) {
    hideHeaderCard();
    return;
  }
  if (isFlipped) {
    const backs = activeCards[currentIndex].backs || [];
    if (backs.length < 2) return;
    isAnimating = true;
    backIndex = (backIndex + direction + backs.length) % backs.length;
    positionBackCards(true);
    setTimeout(() => { isAnimating = false; }, 400);
    return;
  }
  isAnimating = true;
  currentIndex = (currentIndex + direction + activeCards.length) % activeCards.length;
  positionCards(true);
  // Position merken
  localStorage.setItem('kimanus-lastCard', currentIndex);
  localStorage.setItem('kimanus-visited', 'true');
  setTimeout(() => { isAnimating = false; }, 400);
}

function handleCardTap(i) {
  if (i === currentIndex) {
    // Aktive Karte antippen = Flip
    flipCard();
  }
}

function flipCard() {
  const el = document.getElementById('card-' + currentIndex);
  if (!el) return;
  isFlipped = !isFlipped;
  // Swipe-Hint: verstecken wenn geflippt, zeigen wenn zurueck
  const hb = document.getElementById('swipe-hint-behind');
  if (hb) hb.style.display = isFlipped ? 'none' : 'block';
  backIndex = 0;

  const backTrack = document.getElementById('back-track');
  const wheelTrack = document.getElementById('wheel-track');

  if (isFlipped) {
    el.classList.add('flipped');
    // Hauptrad verstecken, Rückseiten-Rad zeigen
    setTimeout(() => {
      wheelTrack.style.display = 'none';
      backTrack.style.display = 'block';
      buildBackCards();
      positionBackCards(false);
      adjustBrightness(currentBrightness); // Helligkeit auf neue Karten anwenden
    }, 700); // Nach der Flip-Animation
  } else {
    // Rückseiten-Rad verstecken, Hauptrad zeigen
    backTrack.style.display = 'none';
    wheelTrack.style.display = 'block';
    el.classList.remove('flipped');
    positionCards(false);
    // Header-Karte entfernen wenn zurueckgeflippt
    if (headerCardActive) {
      setTimeout(() => hideHeaderCard(), 300);
    }
  }
  updateFlipLabel();
}

      </div>`;
    } else if (back.type === 'yt-info') {

          allowfullscreen></iframe>`;
    } else if (back.type === 'grid') {
      const cols = back.gridCols || 4;
      if (back.sections) {
        const GW = 355, GH = 210;
        const cardW = (78/GW*100).toFixed(1);
        const cardH = (40/GH*100).toFixed(1); // etwas kleiner
        const colX = [9,95,181,267].map(x => (x/GW*100).toFixed(1));
        const rowY = [22,82,142].map(y => (y/GH*100).toFixed(1)); // enger zusammen
        const labelOffset = ((40+2)/GH*100).toFixed(1);
        // Setup-Config lesen und deaktivierte Genres/Items filtern
        const setupCfg = getSetupConfig();
        const cardId = activeCards[currentIndex]?.id?.replace('2','') || '';
        const filteredSections = back.sections.filter(sec => {
          const secKey = cardId + '_' + sec.label;
          return setupCfg[secKey] !== false;
        }).map(sec => {
          const secKey = cardId + '_' + sec.label;
          const filteredItems = sec.items.filter(item => {
            const itemKey = secKey + '_' + item.label;
            return setupCfg[itemKey] !== false;
          });
          return {...sec, items: filteredItems};
        }).filter(sec => sec.items.length > 0);

        // Berechnen welche Genres draufpassen (max 3 Reihen)
        let testRow = 0;
        const visibleGenres = [];
        filteredSections.forEach(sec => {
          if (testRow >= 3) return;
          visibleGenres.push(sec.label);
          const rowsNeeded = Math.ceil(sec.items.length / cols);
          testRow += rowsNeeded;
        });
        const genreNames = visibleGenres.join(' · ');
        let html = genreNames ? `<div style="position:absolute;left:2.5%;top:1%;font-size:9px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:1px;text-transform:uppercase">${genreNames}</div>` : '';
        let currentRow = 0;
        filteredSections.forEach(sec => {
          if (currentRow >= 3) return;
          sec.items.forEach((item, idx) => {
            const col = idx % cols;
            if (idx > 0 && col === 0) currentRow++;
            if (currentRow >= 3) return;
            const left = colX[col];
            const top = rowY[currentRow];
            const lTop = (parseFloat(top) + parseFloat(labelOffset)).toFixed(1);
            html += `<div style="position:absolute;left:${left}%;top:${top}%;width:${cardW}%;height:${cardH}%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer">${item.icon}</div>`;
            html += `<div style="position:absolute;left:${left}%;top:${lTop}%;width:${cardW}%;text-align:center;font-size:10px;font-weight:600;color:rgba(255,255,255,0.4)">${item.label}</div>`;
          });
          // Naechstes Genre beginnt in neuer Reihe
          currentRow++;
        });
        inner = `<div style="position:relative;width:100%;height:100%">${html}</div>`;
      } else {
        const rows = back.gridRows || 6;
        const totalCells = cols * rows;
        let cells = '';
        for (let c = 0; c < totalCells; c++) {
          const item = back.items && back.items[c];
          if (item) {
            cells += `<div class="grid-cell grid-cell-filled"><span class="grid-cell-icon">${item.icon}</span><span class="grid-cell-label">${item.label}</span></div>`;
          } else {
            cells += `<div class="grid-cell"></div>`;
          }
        }
        inner = `
          <div class="grid-header">${back.title}</div>
          <div class="grid-container" style="grid-template-columns:repeat(${cols},1fr);grid-template-rows:repeat(${rows},1fr)">${cells}</div>`;
      }
    } else if (back.type === 'search') {
      inner = `
        <div class="bwc-title">${back.title}</div>
        <div class="bwc-content">${back.content}</div>
        <div class="bwc-search-hint">🎤 Drück den KIM-Button und sag was du suchst</div>`;
    } else {
      inner = `
        <div class="bwc-title">${back.title}</div>
        <div class="bwc-content">${back.content}</div>`;
    }
    return `<div class="back-wheel-card" id="bcard-${i}">${inner}</div>`;
  }).join('');
}

function positionBackCards(animate) {
  const card = activeCards[currentIndex];
  const backs = card.backs || [];
  if (backs.length === 0) return;

  const container = document.getElementById('wheel-container');
  const totalH = container.clientHeight;
  const centerH = 230;
  const remainH = totalH - centerH;
  const topH = Math.floor(remainH * 0.6);
  const bottomH = remainH - topH;
  const topMid = topH / 2;
  const centerMid = topH + (centerH / 2);
  const bottomMid = topH + centerH + (bottomH / 2);
  const cardH = 210;

  backs.forEach((back, i) => {
    const el = document.getElementById('bcard-' + i);
    if (!el) return;

    let diff = i - backIndex;
    if (diff > backs.length / 2) diff -= backs.length;
    if (diff < -backs.length / 2) diff += backs.length;

    // EXAKT wie Hauptrad
    let cardMid;
    if (diff === 0) cardMid = centerMid;
    else if (diff === -1) cardMid = topMid;
    else if (diff === 1) cardMid = bottomMid + 40;
    else if (diff < -1) cardMid = topMid - topH;
    else cardMid = bottomMid + bottomH + 60;

    el.style.top = (cardMid - cardH / 2) + 'px';
    el.style.transition = animate ? 'all 1.2s cubic-bezier(0.23,1,0.32,1)' : 'none';

    if (diff === 0) {
      el.style.opacity = '1';
      el.style.transform = 'scale(1)';
      el.style.zIndex = '10';
    } else if (diff === 1) {
      el.style.opacity = '0.5';
      el.style.transform = 'scale(0.9)';
      el.style.zIndex = '5';
    } else if (diff === -1) {
      el.style.opacity = '0.5';
      el.style.transform = 'scale(0.8)';
      el.style.zIndex = '5';
    } else {
      el.style.opacity = '0';
      el.style.transform = 'scale(0.75)';
      el.style.zIndex = '1';
    }
  });
}

// === HELLIGKEIT ===
let currentBrightness = 30;
function adjustBrightness(val) {
  currentBrightness = val;
  const v = val / 100;
  // Spektrum: schwarz bis fast weiss
  const cardBg = Math.round(v * 220);
  const cardAlpha = 0.04 + v * 0.92;
  const borderAlpha = 0.1 + v * 0.5;
  const textAlpha = 0.4 + v * 0.6;
  // Bei hellen Karten dunkle Schrift, bei dunklen helle Schrift
  const textColor = v > 0.6 ? `rgba(0,0,0,${0.3 + v * 0.7})` : `rgba(255,255,255,${textAlpha})`;
  const textSub = v > 0.6 ? `rgba(0,0,0,${0.2 + v * 0.5})` : `rgba(255,255,255,${textAlpha * 0.7})`;
  const textFine = v > 0.6 ? `rgba(0,0,0,${0.15 + v * 0.4})` : `rgba(255,255,255,${textAlpha * 0.6})`;
  const cardStyle = `rgba(${cardBg},${cardBg},${cardBg+2},${cardAlpha})`;
  // Vorderseiten-Karten
  document.querySelectorAll('.wheel-card').forEach(c => {
    c.style.background = cardStyle;
    c.style.borderColor = `rgba(255,255,255,${borderAlpha})`;
  });
  // Rueckseiten-Karten (gleiche Helligkeit!)
  document.querySelectorAll('.back-wheel-card').forEach(c => {
    c.style.background = cardStyle;
    c.style.borderColor = `rgba(255,255,255,${borderAlpha})`;
  });
  // Flip-Label oben (gleiche Helligkeit wie Karten!)
  const fl = document.getElementById('flip-label');
  if (fl) fl.style.background = `rgba(${cardBg},${cardBg},${cardBg+2},0.95)`;
  // Texte - Vorderseite
  document.querySelectorAll('.card-front .card-name').forEach(e => e.style.color = textColor);
  document.querySelectorAll('.card-front .card-role').forEach(e => e.style.color = textSub);
  document.querySelectorAll('.card-front .card-contact span').forEach(e => e.style.color = textFine);
  document.querySelectorAll('.card-front .card-brand').forEach(e => e.style.color = textFine);
  // Texte - Rueckseiten-Rad
  document.querySelectorAll('.bwc-title').forEach(e => e.style.color = textSub);
  document.querySelectorAll('.bwc-content').forEach(e => e.style.color = textFine);
  // Texte - Flip-Rueckseite
  document.querySelectorAll('.back-title').forEach(e => e.style.color = textSub);
  document.querySelectorAll('.back-content').forEach(e => e.style.color = textFine);
  // Texte - Flip-Label oben (fl-name, fl-role, fl-contact, fl-brand)
  document.querySelectorAll('.fl-name').forEach(e => e.style.color = textColor);
  document.querySelectorAll('.fl-role').forEach(e => e.style.color = textSub);
  document.querySelectorAll('.fl-contact').forEach(e => e.style.color = textFine);
  document.querySelectorAll('.fl-brand').forEach(e => e.style.color = textFine);
  // Bar-Kanten dynamisch anpassen (dunkel=dezent, hell=sichtbar)
  const edgeAlpha = 0.06 + v * 0.25;
  const edgeBorder = `2px solid rgba(255,255,255,${edgeAlpha})`;
  document.getElementById('header').style.borderTop = 'none';
  document.getElementById('header').style.borderBottom = edgeBorder;
  document.getElementById('bottom-bar').style.borderTop = edgeBorder;
  document.getElementById('bottom-bar').style.borderBottom = edgeBorder;
  // Setup-Panel Helligkeit anpassen
  const setupPanel = document.getElementById('setup-panel');
  if (setupPanel) {
    const setupBg = Math.round(v * 40);
    setupPanel.style.background = `rgb(${setupBg},${setupBg},${setupBg})`;
  }
}

function closeSetup() {
  document.getElementById('setup-overlay').style.display = 'none';
  document.getElementById('setup-back-btn').style.display = 'none';
  document.getElementById('tresor-btn').style.display = '';
  document.getElementById('brightness-slider').style.display = '';

  if (kimCard) kimCard.style.display = 'none';
  updateHeaderKimStatus();
  updateKimBacks();
  rebuildWheel();
}

function toggleSetupItem(key, enabled) {
  const cfg = getSetupConfig();
  cfg[key] = enabled;
  saveSetupConfig(cfg);
  // Setup neu rendern aber offen lassen
  openSetup(setupMode);
}

function rebuildWheel() {
  if (isFlipped) flipCard();
  const cfg = getSetupConfig();

  // KIMANUS und KIM sind jetzt im Header, nicht mehr auf dem Rad
  let wheelCards = [];

  // Aktivierte Agenten als eigene Karten hinzufuegen
  ALL_AGENTS.forEach(agent => {
    const key = 'agent_' + agent.id;
    if (cfg[key] === true) {
      wheelCards.push(agent);
    }
  });

  // Haupt-Karten (Tools, Wallet, Archiv, Apps, Chat) wenn aktiv
  const mainCards = CARDS.filter(c =>
    !c.id.endsWith('2') &&
    !['landing','kim'].includes(c.id) &&
    c.id !== 'chat'
  );
  mainCards.forEach(card => {
    const key = 'card_' + card.id;
    if (cfg[key] === true) {
      wheelCards.push(card);
    }
  });

  // Chat immer wenn mindestens ein Agent aktiv
  const chat = CARDS.find(c => c.id === 'chat');
  if (wheelCards.length > 2 && chat) {
    wheelCards.push(chat);
  }

  // Hinweis-Karte wenn Rad leer
  if (wheelCards.length === 0) {
    wheelCards.push({id:'hint', icon:'⚙️', title:'Setup', subtitle:'Agenten aktivieren', color:'#64748b', email:'', phone:'',
      backs:[{title:'Los gehts!', content:'Oeffne das Setup (Schloss unten)\nund waehle deine Agenten.\n\nTippe auf KIMANUS oder KIM\nim Header fuer mehr Infos.'}]
    });
  }

  // Duplikate fuer fluessiges Endlos-Rad (mindestens 5 Karten)
  const origCards = [...wheelCards];
  if (origCards.length > 0) {
    while (wheelCards.length < 5) {
      wheelCards = wheelCards.concat(origCards.map(c => ({...c, id: c.id + '_d' + wheelCards.length})));
    }
    wheelCards = wheelCards.concat(origCards.map(c => ({...c, id: c.id + '_dup'})));
  }

  activeCards = wheelCards;
  currentIndex = 0;
  buildCards();
  positionCards(false);
  adjustBrightness(currentBrightness);
}

// Einfache Spracheingabe NUR fuer URL-Feld (kein KIM Chat)
let ytMicRecorder = null;
let ytMicChunks = [];
let ytMicStream = null;
let ytMicActive = false;

function ytMic() {
  if (ytMicActive) {
    ytMicStop();
  } else {
    ytMicStart();
  }
}

async function ytMicStart() {
  try {
    ytMicActive = true;
    const urlField = document.getElementById('yt-url');
    urlField.textContent = '🎤 Sprich jetzt...';
    urlField.style.color = 'rgba(230,57,70,0.5)';

    ytMicStream = await navigator.mediaDevices.getUserMedia({audio:true});
    // Beste Audio-Qualitaet fuer Whisper: mp4 auf iOS, webm auf Android/Desktop
    const mimeOptions = ['audio/mp4', 'audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus'];
    let selectedMime = '';
    for (const mime of mimeOptions) {
      if (MediaRecorder.isTypeSupported(mime)) { selectedMime = mime; break; }
    }
    ytMicRecorder = selectedMime ? new MediaRecorder(ytMicStream, {mimeType:selectedMime}) : new MediaRecorder(ytMicStream);
    ytMicChunks = [];

    ytMicRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) ytMicChunks.push(e.data);
    };

    ytMicRecorder.onstop = async () => {
      const mimeType = ytMicRecorder.mimeType || 'audio/webm';
      const blob = new Blob(ytMicChunks, {type:mimeType});
      if (ytMicStream) { ytMicStream.getTracks().forEach(t=>t.stop()); ytMicStream=null; }
      ytMicActive = false;

      if (blob.size < 1000) {
        urlField.textContent = 'Keine URL';
        urlField.style.color = 'rgba(255,255,255,0.4)';
        return;
      }

      urlField.textContent = '⏳ Erkenne...';

      const formData = new FormData();
      const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
      formData.append('audio', blob, 'recording.' + ext);

      try {
        const resp = await fetch('/api/stt', {method:'POST', body:formData});
        const data = await resp.json();
        const text = (data.text || '').trim();
        if (text) {
          urlField.textContent = text;
          urlField.style.color = 'rgba(255,255,255,0.5)';
        } else {
          urlField.textContent = 'Nicht verstanden - nochmal versuchen';
          urlField.style.color = 'rgba(255,255,255,0.2)';
        }
      } catch(e) {
        urlField.textContent = 'Fehler - nochmal versuchen';
        urlField.style.color = 'rgba(255,255,255,0.2)';
      }
    };

    ytMicRecorder.start(250);

    // Auto-stop nach 8 Sekunden
    setTimeout(() => { if (ytMicActive) ytMicStop(); }, 8000);

  } catch(e) {
    ytMicActive = false;
    console.error('Mic-Fehler:', e);
  }
}

function ytMicStop() {
  ytMicActive = false;
  if (ytMicRecorder && ytMicRecorder.state === 'recording') {
    ytMicRecorder.stop();
  }
}

function ytExtractId(url) {
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : '';
}

  const videoId = ytExtractId(text);

}

      wrap.innerHTML = '<div style="font-size:11px;color:rgba(255,255,255,0.15);text-align:center">Noch keine Videos gespeichert</div>';

    // Duplikate entfernen

      const vid = ytExtractId(v.url || '');

      return false;

let audioCtx, analyser, animFrameId;

function startAudioVisualizer(stream) {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  const source = audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);
  const canvas = document.getElementById('audio-wave');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const barCount = 20;
  const barW = 3, gap = (W - barCount * barW) / (barCount - 1);

  function draw() {
    animFrameId = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(data);
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < barCount; i++) {
      const val = data[i * 3] / 255;
      const h = Math.max(2, val * H);
      const x = i * (barW + gap);
      const y = (H - h) / 2;
      const alpha = 0.2 + val * 0.5;
      ctx.fillStyle = `rgba(230,57,70,${alpha})`;
      ctx.fillRect(x, y, barW, h);
    }
  }
  draw();
}

function stopAudioVisualizer() {
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  if (audioCtx) { audioCtx.close().catch(()=>{}); audioCtx = null; }
  const canvas = document.getElementById('audio-wave');
  if (canvas) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // Zeichne flache Linie
    ctx.fillStyle = 'rgba(230,57,70,0.15)';
    ctx.fillRect(0, 11, canvas.width, 2);
  }
}

async function startRecording() {
  try {
    audioStream = await navigator.mediaDevices.getUserMedia({audio: true});
    startAudioVisualizer(audioStream);
    mediaRecorder = new MediaRecorder(audioStream);
    audioChunks = [];
    let liveTranscriptTimer = null;

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    // Live-Transkription: Alle 3 Sekunden bisheriges Audio transkribieren
    let lastLiveText = '';
    liveTranscriptTimer = setInterval(async () => {
      if (speechState !== 'recording' || audioChunks.length === 0) return;
      try {
        const mimeType = mediaRecorder.mimeType || 'audio/webm';
        const liveBlob = new Blob([...audioChunks], {type: mimeType});
        if (liveBlob.size < 3000) return;
        const fd = new FormData();
        const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
        fd.append('audio', liveBlob, 'live.' + ext);
        const resp = await fetch('/api/stt', {method:'POST', body:fd});
        const data = await resp.json();
        if (data.text && data.text.trim() && data.text !== lastLiveText && speechState === 'recording') {
          lastLiveText = data.text;
          const cc = document.getElementById('chat-content');
          if (cc) cc.innerHTML = '<span style="color:rgba(255,255,255,0.4)">' + data.text + '</span><span style="display:inline-block;width:2px;height:13px;background:rgba(230,57,70,0.5);margin-left:3px;vertical-align:middle;animation:bwave 0.5s infinite"></span>';
        }
      } catch(e) {}
    }, 3000);

    mediaRecorder.onstop = async () => {
      if (liveTranscriptTimer) { clearInterval(liveTranscriptTimer); liveTranscriptTimer = null; }
      const mimeType = mediaRecorder.mimeType || 'audio/webm';
      const blob = new Blob(audioChunks, {type: mimeType});
      cleanupMic();
      if (blob.size > 1000) {
        await processVoice(blob, mimeType);
      }
    };
    mediaRecorder.start(250);
  } catch(err) {
    console.error('Mikrofon-Fehler:', err);
    resetSpeechState();
  }
}

function stopRecording() {
  stopAudioVisualizer();
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

function cleanupMic() {
  if (audioStream) {
    audioStream.getTracks().forEach(t => t.stop());
    audioStream = null;
  }
}

async function processVoice(blob, mimeType) {
  const btn = document.getElementById('speech-btn');
  btn.querySelector('span').textContent = '⏳';

  // Sofort-Check: Sind wir offline?
  if (!navigator.onLine) {
    chatAddMessage('KIM', 'Ich bin gerade offline. Sobald du wieder Netz hast, bin ich sofort fuer dich da! 📡');
    const _flr = document.querySelector('#flip-label .fl-role'); if(_flr) _flr.textContent = 'Offline 📡';
    resetSpeechState();
    return;
  }

  // 1. Sprache -> Text (Groq Whisper)
  const formData = new FormData();
  const ext = mimeType.includes('mp4') ? 'mp4' : mimeType.includes('webm') ? 'webm' : 'wav';
  formData.append('audio', blob, 'recording.' + ext);

  try {
    const sttResp = await fetch('/api/stt', {method:'POST', body:formData});
    const sttData = await sttResp.json();
    const userText = sttData.text || '';

    if (!userText.trim()) {
      btn.querySelector('span').textContent = '❌';
      setTimeout(() => resetSpeechState(), 2000);
      return;
    }

    // Pruefen ob wir im YouTube Scout sind
    const currentCard = activeCards[currentIndex];
    const ytUrlField = document.getElementById('yt-url');

    if (currentCard && currentCard.id === 'yt-scout' && ytUrlField) {
      // Im YouTube Scout: Text ins URL-Feld oder direkt an KIM
      const videoId = ytExtractId(userText);
      if (videoId) {
        // User hat eine URL gesprochen
        ytUrlField.textContent = userText;
        ytUrlField.style.color = 'rgba(255,255,255,0.5)';
        btn.querySelector('span').textContent = 'KIM';
        ytAnalyze();
        return;
      }
      // Kein URL - als Suchanfrage an KIM weiterleiten
    }

    // Zeige erkannten Text im Chat-Overlay
    pendingText = userText;
    chatAddMessage('DU', userText);
    const _flr = document.querySelector('#flip-label .fl-role'); if(_flr) _flr.textContent = (getSetupConfig()['kim_mode'] === 'persoenlich' ? 'Assistentin' : 'Concierge') + ' · Denkt nach...';
    // Button auf SENDEN setzen (gruen, blinkend) + Loeschen-Button zeigen
    speechState = 'review';
    btn.querySelector('span').textContent = '▶';
    btn.querySelector('span').style.fontSize = '';
    btn.classList.add('send-ready');
    btn.style.background = 'radial-gradient(circle at 30% 30%,#4ade80 0%,#22c55e 50%,#16a34a 100%)';
    const delBtn = document.getElementById('delete-btn');
    if (delBtn) delBtn.style.display = 'flex';

    if (walkieTalkieMode) {
      // Walkie-Talkie: Sofort senden
      await sendToKim(userText);
    }
    // Review: Warten bis User auf gruenen Button drueckt

  } catch(err) {
    console.error('Pipeline-Fehler:', err);
  }
  if (speechState !== 'review') {
    resetSpeechState();
  }
}

let walkieTalkieMode = true; // Walkie-Talkie: Loslassen = sofort senden

async function sendToKim(userText) {
  const btn = document.getElementById('speech-btn');
  const delBtn = document.getElementById('delete-btn');
  if (delBtn) delBtn.style.display = 'none';
  btn.classList.remove('send-ready');

  // Sofort-Check: Offline?
  if (!navigator.onLine) {
    chatAddMessage('KIM', 'Ich bin gerade offline. Deine Frage habe ich mir gemerkt - sobald du wieder Netz hast, beantworte ich sie! 📡');
    const _flr = document.querySelector('#flip-label .fl-role'); if(_flr) _flr.textContent = 'Offline 📡';
    document.getElementById('chat-bottom-bar').style.display = 'none';
    resetSpeechState();
    return;
  }

  btn.querySelector('span').textContent = '⏳';
  btn.style.background = 'radial-gradient(circle at 30% 30%,#4ade80 0%,#22c55e 50%,#16a34a 100%)';

  // Zeige "KIM denkt nach" auf der Glasplatte
  showBookQuestion(userText);

  try {
    const chatResp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        message: userText,
        agent: 'kim',
        model: 'groq-llama',
        session: 'wheel-' + Date.now()
      })
    });

    let kimAnswer = '';
    const contentType = chatResp.headers.get('content-type') || '';

    if (contentType.includes('application/json')) {
      const data = await chatResp.json();
      kimAnswer = data.output || data.text || data.answer || '';
    } else {
      const reader = chatResp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream:true});
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const d = JSON.parse(line.slice(6));
              if (d.token) kimAnswer += d.token;
              if (d.full) kimAnswer = d.full;
              if (d.output) kimAnswer = d.output;
            } catch(e) {}
          }
        }
      }
    }

    if (kimAnswer) {
      conversationHistory.push({q: userText, a: kimAnswer, time: Date.now()});
      lastKimAnswer = kimAnswer;
      showKimResponse(userText, kimAnswer);
    }
  } catch(err) {
    console.error('KIM-Fehler:', err);
  }
  resetSpeechState();
}

// === CHAT-MODUS: Rad wird zum Gespraechs-Verlauf ===
let conversationHistory = [];
let lastKimAnswer = '';
let chatMode = false;
let savedCards = null;
let savedIndex = 0;

function enterChatMode() {
  if (chatMode) return;
  chatMode = true;
  savedCards = activeCards;
  savedIndex = currentIndex;
  // Chat startet mit leerer Frage-Glasplatte
  conversationHistory = [];
  activeCards = [{id:'chat-q-0', chatType:'question', icon:'', title:'', subtitle:'', color:'', email:'', phone:'', backs:[]}];
  currentIndex = 0;
  isFlipped = false;
  buildCards();
  positionCards(false);
  // Leere Chat-Glasplatte zeigen
  showChatInput();
}

function exitChatMode() {
  if (!chatMode) return;
  chatMode = false;
  activeCards = savedCards;
  currentIndex = savedIndex;
  isFlipped = false;
  buildCards();
  positionCards(false);
  adjustBrightness(currentBrightness);
}

function showChatInput() {
  const el = document.getElementById('card-' + currentIndex);
  if (!el) return;
  const front = el.querySelector('.card-front');

    <div id="chat-page" style="width:100%;height:100%;display:flex;flex-direction:column;padding:6px 10px;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y">

      <div id="chat-content" style="font-size:13px;color:rgba(255,255,255,0.2);line-height:1.4">Sprich jetzt...</div>

}

  activeCards.push({id:'chat-a-'+idx, chatType:'answer', icon:'', title:'', subtitle:'', color:'', email:'', phone:'', backs:[]});

          <div style="display:flex;justify-content:space-between;align-items:center">

function showKimResponse(question, answer) {
  const currentCard = activeCards[currentIndex];

  // Im YouTube Scout: Antwort auf die Kapitel-Glasplatte
  if (currentCard && currentCard.id === 'yt-scout' && isFlipped) {
    const chaptersWrap = document.getElementById('yt-chapters-wrap');
    if (chaptersWrap) {
      chaptersWrap.innerHTML = `
        <div style="font-size:11px;color:rgba(255,255,255,0.25);margin-bottom:6px">🗣️ ${question}</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.35);line-height:1.8;white-space:pre-line">${answer}</div>`;
    }
    backIndex = 2;
    positionBackCards(true);
    return;
  }

  // Gespraech speichern
  conversationHistory.push({q: question, a: answer, time: Date.now()});
  lastKimAnswer = answer;

  // Antwort ins Chat-Overlay
  chatAddMessage('KIM', answer);

  // Vorlesen-Button zeigen
  document.getElementById('chat-bottom-bar').style.display = 'block';

  // KIM Status updaten
  const cfg2 = typeof getSetupConfig === 'function' ? getSetupConfig() : {};
  const mode2 = cfg2['kim_mode'] || 'concierge';
  const gender2 = cfg2['kim_gender'] || 'weiblich';
  const subtitle2 = mode2 === 'concierge' ? 'Concierge' : (gender2 === 'weiblich' ? 'Assistentin' : 'Assistent');
  const _flr = document.querySelector('#flip-label .fl-role'); if(_flr) _flr.textContent = subtitle2 + ' · Fertig ✓';
}

function speakAnswer(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'de-DE';
    u.rate = 0.95;
    u.pitch = 1.0;
    window.speechSynthesis.speak(u);
  }
}

function demoKimAction() {
  document.getElementById('status-text').textContent = 'KIM: "Hier ist das Wetter!"';
  if (isFlipped) flipCard();
  const target = activeCards.findIndex(c => c.id === 'wetterfrosch');
  animateToCard(target, () => setTimeout(flipCard, 500));
}

function animateToCard(target, cb) {
  if (currentIndex === target) { if (cb) cb(); return; }
  const iv = setInterval(() => {
    if (currentIndex === target) { clearInterval(iv); if (cb) cb(); return; }
    const diff = (target - currentIndex + activeCards.length) % activeCards.length;
    spinWheel(diff <= activeCards.length / 2 ? 1 : -1);
  }, 250);
}

// Globaler Handler fuer Muelleimer (click + touchend fuer iOS)
function handleTrash(e) {
  const t = e.target;
  if (t && (t.id === 'trash-btn-glass' || t.closest('#trash-btn-glass'))) {
    e.preventDefault();
    e.stopPropagation();
    clearAndRespeak();
  }
}
document.addEventListener('click', handleTrash);
document.addEventListener('touchend', handleTrash);

// Touch - vertikal=Rad drehen, horizontal=Flip
let dragStartY = 0;
let dragStartX = 0;
const wc = document.getElementById('wheel-container');

let touchInScrollable = false;
let touchOnButton = false;
wc.addEventListener('touchstart', e => {
  dragStartY = e.touches[0].clientY;
  dragStartX = e.touches[0].clientX;
  touchOnButton = false;
  touchInScrollable = false;
  const el = e.target;
  // Pruefen ob Touch auf einem Button oder klickbaren Element ist
  if (el.tagName === 'BUTTON' || el.id === 'trash-btn-glass' || el.closest('button')) {
    touchOnButton = true;
    return;
  }
  // Pruefen ob Touch innerhalb eines scrollbaren Bereichs ist
  let node = el;
  while (node && node !== wc) {
    const style = getComputedStyle(node);
    if ((style.overflowY === 'auto' || style.overflowY === 'scroll') && node.scrollHeight > node.clientHeight) {
      touchInScrollable = true;
      break;
    }
    node = node.parentElement;
  }
}, {passive:true});
wc.addEventListener('touchend', e => {
  // Wenn Touch auf Button war, nicht als Swipe behandeln
  if (touchOnButton) { touchOnButton = false; return; }
  // Wenn Touch in scrollbarem Bereich war, Karte NICHT bewegen
  if (touchInScrollable) { touchInScrollable = false; return; }
  const diffY = dragStartY - e.changedTouches[0].clientY;
  const diffX = e.changedTouches[0].clientX - dragStartX;
  // Horizontal stärker = Flip
  if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
    flipCard();
  }
  // Vertikal stärker = Rad drehen
  else if (Math.abs(diffY) > 40) {
    spinWheel(diffY > 0 ? 1 : -1);
  }
}, {passive:true});

// Mouse
wc.addEventListener('mousedown', e => { dragStartY = e.clientY; dragStartX = e.clientX; });
wc.addEventListener('mouseup', e => {
  const diffY = dragStartY - e.clientY;
  const diffX = e.clientX - dragStartX;
  if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
    flipCard();
  } else if (Math.abs(diffY) > 40) {
    spinWheel(diffY > 0 ? 1 : -1);
  }
});

// Scroll wheel
wc.addEventListener('wheel', e => {
  e.preventDefault();
  spinWheel(e.deltaY > 0 ? 1 : -1);
}, {passive:false});

// Service Worker registrieren (Offline-First)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(reg => console.log('SW registriert:', reg.scope))
    .catch(err => console.log('SW Fehler:', err));
}
