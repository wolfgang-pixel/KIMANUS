<!DOCTYPE html>
<!-- KIMANUS Wheel v6.0 - Architektur v4: KIMANUS/KIM/Tools/Wallet (kein KAI, kein KI-MANUS) -->
<html lang="de" style="color-scheme:dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0e">
<title>KIMANUS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{height:100dvh;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0e0e0e;color:#e0e0e0}

:root{
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --kim-red:#e63946;
}

#app{
  display:flex;flex-direction:column;
  height:100dvh;
  padding-top:var(--sat);padding-bottom:var(--sab);
  position:fixed;inset:0;
}

/* === HEADER === */
#header{
  display:flex;align-items:center;gap:8px;
  height:60px;
  padding:0 12px;
  background:#161616;
  border-bottom:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;z-index:20;
}
.logo-circle{
  width:30px;height:30px;border-radius:50%;
  background:var(--kim-red);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:14px;color:#fff;
}
#header .title{font-size:18px;font-weight:800;letter-spacing:3px;flex:1}
#header .hdr-btn{background:none;border:none;cursor:pointer;padding:4px}
#header .hdr-btn svg{width:22px;height:22px;fill:#888}

/* === DREI GLEICH GROSSE FELDER === */
#wheel-container{
  flex:1;display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}

.panel{
  flex:1;position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
/* Obere Glasplatte groesser (Platz fuer geflippte Karte) */
#panel-top{
  flex:1.2;
}
/* Sichtfenster fest */
#panel-center{
  flex:none;
  height:230px;
}
/* Untere Glasplatte kleiner */
#panel-bottom{
  flex:0.8;
}

/* Milchiges Glas oben */
#panel-top{
  position:relative;
}
#panel-top::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(14,14,14,0.35) 0%, rgba(14,14,14,0.08) 80%, transparent 100%);
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
  pointer-events:none;z-index:2;
  border-bottom:2px solid rgba(255,255,255,0.1);
}

/* Sichtfenster - klar */
#panel-center{
  position:relative;z-index:5;
}

/* Milchiges Glas unten */
#panel-bottom{
  position:relative;
}
#panel-bottom::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(0deg, rgba(14,14,14,0.35) 0%, rgba(14,14,14,0.08) 80%, transparent 100%);
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
  pointer-events:none;z-index:2;
  border-top:2px solid rgba(255,255,255,0.1);
}

/* === SWIPE HINT (pulsender Pfeil unter Milchglas) === */
#swipe-hint-behind{
  position:absolute;
  bottom:calc(40% - 75px);
  left:22px;
  font-size:34px;
  font-weight:200;
  color:rgba(230,57,70,0.8);
  z-index:0;
  pointer-events:none;
  animation:swipeHintGlow 2s ease-in-out infinite;
}
@keyframes swipeHintPulse{
  0%{color:rgba(230,57,70,0);text-shadow:none}
  50%{color:rgba(230,57,70,1);text-shadow:0 0 12px rgba(230,57,70,0.8)}
  100%{color:rgba(230,57,70,0);text-shadow:none}
}
@keyframes swipeHintGlow{
  0%{opacity:0}
  50%{opacity:1}
  100%{opacity:0}
}
#swipe-hint-behind.hidden{display:none}

/* === RAD-MECHANISMUS === */
#wheel-track,#back-track{
  position:absolute;
  left:0;right:0;
  transition:transform 1.2s cubic-bezier(0.23,1,0.32,1);
  will-change:transform;
}
#back-track{z-index:12}
.back-wheel-card{
  width:100%;
  height:210px;
  position:absolute;
  left:0;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;
  transition:all 1.2s cubic-bezier(0.23,1,0.32,1);
}
.back-wheel-card .bwc-title{
  font-size:13px;font-weight:600;color:rgba(255,255,255,0.3);
  text-transform:uppercase;letter-spacing:2px;
  margin-bottom:10px;
}
.back-wheel-card .bwc-content{
  font-size:12px;color:rgba(255,255,255,0.2);text-align:center;line-height:1.8;
  white-space:pre-line;
}
.back-wheel-card .bwc-video-full{
  width:100%;
  height:100%;
  border-radius:0;
}
.back-wheel-card .bwc-video{
  width:calc(100% - 16px);
  height:calc(100% - 40px);
  border-radius:4px;
  margin-top:4px;
}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.back-wheel-card .bwc-search-hint{
  margin-top:12px;
  font-size:10px;
  color:rgba(230,57,70,0.4);
  letter-spacing:0.5px;
}

.wheel-card{
  height:210px;
  width:calc(100% - 20px);
  left:50%;
  transform:translateX(-50%);
  margin-left:0;
  position:absolute;
  border-radius:0;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  perspective:800px;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}

/* Card-Inneres fuer Flip */
.card-inner{
  width:100%;height:100%;
  position:relative;
  transition:transform 1.2s cubic-bezier(0.25,0.1,0.25,1);
  transform-style:preserve-3d;
}
.wheel-card.flipped .card-inner{
  transform:rotateY(180deg);
}

.card-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:0;
  padding:16px;
}

/* Vorderseite */
.card-front{
  background:transparent;
  padding:16px 20px;
  justify-content:space-between;
  align-items:stretch;
}
.card-front .card-icon{
  font-size:48px;
  position:absolute;top:14px;right:18px;
}
.card-front .card-header{
  display:flex;flex-direction:column;gap:3px;
}
.card-front .card-name{
  font-size:22px;font-weight:700;color:rgba(255,255,255,0.4);
  letter-spacing:1px;
}
.card-front .card-role{
  font-size:11px;font-weight:600;color:rgba(255,255,255,0.25);
  letter-spacing:2px;text-transform:uppercase;
}
.card-front .card-contact{
  display:flex;flex-direction:column;gap:3px;
}
.card-front .card-contact span{
  font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:0.5px;
}
.card-front .card-brand{
  position:absolute;bottom:14px;right:18px;
  font-size:9px;font-weight:800;color:rgba(255,255,255,0.12);
  letter-spacing:3px;
}

/* Rückseite */
.card-back{
  background:transparent;
  transform:rotateY(180deg);
}
.card-back .back-title{
  font-size:13px;font-weight:600;color:rgba(255,255,255,0.3);
  text-transform:uppercase;letter-spacing:2px;
  margin-bottom:10px;
}
.card-back .back-content{
  font-size:12px;color:rgba(255,255,255,0.2);text-align:center;line-height:1.8;
  white-space:pre-line;padding:0 20px;
}

/* Keine Extra-Effekte - reine Glasplatte */

/* === FLIP LABEL (Vorderseite oben beim Flip) === */
#flip-label{
  display:none;
  position:absolute;
  left:50%;
  transform:translateX(-50%) scale(0.85);
  z-index:30;
  width:100%;
  height:210px;
  background:rgba(30,30,30,0.95);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  align-items:center;justify-content:center;
  opacity:0;
  transition:all 0.8s ease;
}
#flip-label.visible{
  display:flex;
  opacity:1;
}
.fl-card{
  width:100%;height:100%;
  padding:12px 16px;
  display:flex;flex-direction:column;
  justify-content:space-between;
  position:relative;
}
.fl-card .fl-icon{font-size:36px;position:absolute;top:10px;right:14px}
.fl-card .fl-name{font-size:18px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:1px}
.fl-card .fl-role{font-size:9px;font-weight:600;color:rgba(255,255,255,0.2);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.fl-card .fl-contact{font-size:9px;color:rgba(255,255,255,0.15)}
.fl-card .fl-brand{position:absolute;bottom:10px;right:14px;font-size:7px;font-weight:800;color:rgba(255,255,255,0.1);letter-spacing:3px}

/* === REGISTER === */
#register-panel{
  display:none;
  position:absolute;bottom:0;left:0;right:0;
  height:33.33%;z-index:15;
  background:#161616;
  border-top:1px solid rgba(255,255,255,0.08);
}
#register-panel.visible{display:flex;flex-direction:column}
#register-tabs{flex:1;overflow-y:auto;padding:6px 12px;scrollbar-width:none}
#register-tabs::-webkit-scrollbar{display:none}
.register-tab{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,0.04);
  cursor:pointer;
}
.register-tab:active{background:rgba(255,255,255,0.06)}
.register-tab .tab-icon{font-size:20px}
.register-tab .tab-name{font-size:14px;font-weight:600;color:#ccc;flex:1}

/* === BOTTOM BAR === */
#bottom-bar{
  display:flex;align-items:center;justify-content:center;gap:20px;
  height:80px;
  margin-bottom:-40px;
  padding:0 16px;
  background:#161616;
  border-top:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;z-index:20;
  position:relative;
}

#speech-btn{
  width:70px;height:70px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#ff4d5a 0%,var(--kim-red) 50%,#b81c2a 100%);
  border:4px solid rgba(220,220,220,0.5);
  box-shadow:0 4px 20px rgba(230,57,70,0.4);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform 0.15s;
  margin-top:-35px;
}
#speech-btn:active{transform:scale(0.9)}
#speech-btn svg{width:28px;height:28px;fill:#fff}
#speech-btn.listening{animation:pulse 1.5s infinite}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(230,57,70,0.5)}
  70%{box-shadow:0 0 0 15px rgba(230,57,70,0)}
  100%{box-shadow:0 0 0 0 rgba(230,57,70,0)}
}

.small-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.small-btn:active{transform:scale(0.9);background:rgba(255,255,255,0.1)}
.small-btn svg{width:18px;height:18px;fill:#888}

/* Status */
#status-text{
  display:none;
}
#speech-btn span{
  font-size:14px;font-weight:800;color:#fff;letter-spacing:2px;
}

/* === TASTATUR-TOOLBAR === */
#kb-toolbar{
  display:none;
  position:fixed;
  left:0;right:0;
  bottom:0;
  height:44px;
  background:#1e1e1e;
  border-top:1px solid rgba(255,255,255,0.1);
  z-index:100;
  align-items:center;
  justify-content:space-between;
  padding:0 8px;
  gap:6px;
}
#kb-toolbar.visible{display:flex}
.kb-btn{
  padding:6px 12px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.4);
  font-size:12px;
  cursor:pointer;
  border-radius:4px;
  white-space:nowrap;
}
.kb-btn:active{background:rgba(255,255,255,0.12)}
.kb-analyze{background:rgba(230,57,70,0.15);border-color:rgba(230,57,70,0.3);color:rgba(230,57,70,0.6)}
.kb-kim{background:rgba(230,57,70,0.1);border-color:rgba(230,57,70,0.2);color:rgba(230,57,70,0.5)}
.kb-done{margin-left:auto}

/* === TRESOR === */
#tresor-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.4);
  z-index:15;
  opacity:0;
  pointer-events:none;
  transition:opacity 2s;
}
#tresor-overlay.open{opacity:1;pointer-events:auto}
/* Tresor-Panel: hinter Bottom Bar, gleiche Breite wie Karten */
#tresor-panel{
  position:fixed;
  left:50%;
  width:calc((100% - 10px) * 0.9);
  bottom:-500px;
  transform:translateX(-50%);
  background:rgba(30,30,32,0.96);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.06);
  z-index:16;
  transition:bottom 2s cubic-bezier(0.25,0.1,0.25,1);
  padding:2px;
}
#tresor-overlay.open #tresor-panel{
  bottom:80px;
}
/* Section-Titel: ganz schmal, fein */
.tresor-section-title{
  font-size:13px;font-weight:600;
  color:rgba(255,255,255,0.25);
  letter-spacing:1.5px;
  padding:0 6px;
  height:17px;
  line-height:17px;
  background:rgba(255,255,255,0.06);
}
.tresor-divider{
  padding:0 6px;
  height:17px;
  line-height:17px;
  margin:0;
  background:rgba(255,255,255,0.06);
  display:flex;align-items:center;
}
.tresor-divider span{
  font-size:13px;font-weight:600;
  color:rgba(255,255,255,0.25);
  letter-spacing:1.5px;
}
/* Grids: eng */
.tresor-grid{
  width:100%;
  display:grid;
  gap:0;
}
.tresor-grid-3x2{
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,1fr);
}
.tresor-grid-2x2{
  grid-template-columns:repeat(2,1fr);
  grid-template-rows:repeat(2,1fr);
}
.tresor-grid-2x1{
  grid-template-columns:repeat(2,1fr);
  grid-template-rows:1fr;
}
.tresor-tab{
  display:flex;align-items:center;justify-content:center;
  background:transparent;
  border-right:1px solid rgba(255,255,255,0.07);
  border-bottom:1px solid rgba(255,255,255,0.07);
  cursor:pointer;
  padding:8px 3px;
  min-height:34px;
}
.tresor-tab:last-child{border-right:none}
.tresor-tab:active{background:rgba(255,255,255,0.05)}
.tresor-tab span{font-size:13px;font-weight:600;color:rgba(255,255,255,0.3);text-align:center}

/* Tresor-Button links in Bar */
#tresor-btn{
  position:absolute;
  left:15px;top:50%;transform:translateY(-50%);
  font-size:20px;
  cursor:pointer;
  padding:8px;
  opacity:0.4;
  transition:opacity 0.3s;
  border:none;background:none;
  -webkit-tap-highlight-color:transparent;
}
#tresor-btn:active{opacity:0.7}

</style>
</head>

  <div id="bottom-bar">

      <span id="speech-agent">KIM</span>
    </button>
  </div>
</div>

let activeCards = CARDS;
let currentIndex = 0;
let isFlipped = false;
let backIndex = 0;
let isListening = false;
let registerOpen = false;
let panelH = 0;
let isAnimating = false;

function init() {
  calcSizes();
  buildCards();

  // Wiederkehrende Nutzer: letzte Position wiederherstellen
  const visited = localStorage.getItem('kimanus-visited');
  const lastCard = parseInt(localStorage.getItem('kimanus-lastCard') || '0');
  if (visited && lastCard > 0 && lastCard < activeCards.length) {
    currentIndex = lastCard;
  }

  positionCards(false);
  window.addEventListener('resize', () => { calcSizes(); positionCards(false); });
}

function calcSizes() {
  const container = document.getElementById('wheel-container');
  const totalH = container.clientHeight;
  const centerH = 230;
  const remainH = totalH - centerH;
  const topH = Math.floor(remainH * 0.6);
  const bottomH = remainH - topH;
  panelH = centerH;
  // Debug
  document.querySelector('#header .title').textContent = 'KIMANUS';
}

function buildCards() {
  const track = document.getElementById('wheel-track');
  track.innerHTML = activeCards.map((card, i) => `
    <div class="wheel-card" id="card-${i}" onclick="handleCardTap(${i})">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-icon">${card.icon}</div>
          <div class="card-header">
            <div class="card-name">${card.title}</div>
            <div class="card-role">${card.subtitle}</div>
          </div>
          <div class="card-contact">
            <span>${card.email || ''}</span>
            <span>${card.phone || ''}</span>
          </div>
          <div class="card-brand">KIMANUS</div>
        </div>
        <div class="card-face card-back">
          <div class="back-title" id="back-title-${i}">${card.backs?.[0]?.title || ''}</div>
          <div class="back-content" id="back-content-${i}">${card.backs?.[0]?.content || ''}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function positionCards(animate) {
  const container = document.getElementById('wheel-container');
  const totalH = container.clientHeight;
  const centerH = 230;
  const remainH = totalH - centerH;
  const topH = Math.floor(remainH * 0.6);
  const bottomH = remainH - topH;

  // Mittelpunkte der drei Panels
  const topMid = topH / 2;
  const centerMid = topH + (centerH / 2);
  const bottomMid = topH + centerH + (bottomH / 2);

  activeCards.forEach((card, i) => {
    const el = document.getElementById('card-' + i);
    if (!el) return;

    const cardH = el.offsetHeight || 200;
    const offset = getOffset(i);

    let cardMid;
    if (offset === 0) cardMid = centerMid;
    else if (offset === -1) cardMid = topMid;
    else if (offset === 1) cardMid = bottomMid + 40;
    else if (offset < -1) cardMid = topMid - topH;
    else cardMid = bottomMid + bottomH + 60;

    el.style.top = (cardMid - cardH / 2) + 'px';
    el.style.transition = animate ? 'all 1.2s cubic-bezier(0.23,1,0.32,1)' : 'none';

    if (offset === 0) {
      el.style.opacity = '1';
      el.style.transform = 'translateX(-50%) scale(1)';
      el.style.zIndex = '10';
    } else if (Math.abs(offset) === 1) {
      el.style.opacity = '0.5';
      el.style.transform = 'translateX(-50%) scale(0.9)';
      el.style.zIndex = '5';
    } else {
      el.style.opacity = '0';
      el.style.transform = 'translateX(-50%) scale(0.8)';
      el.style.zIndex = '1';
    }
  });
  updateStatus();
  updateFlipLabel();
}

function getOffset(i) {
  let diff = i - currentIndex;
  if (diff > activeCards.length / 2) diff -= activeCards.length;
  if (diff < -activeCards.length / 2) diff += activeCards.length;
  return diff;
}

function spinWheel(direction) {
  if (isAnimating) return;
  if (isFlipped) {
    const backs = activeCards[currentIndex].backs || [];
    if (backs.length < 2) return;
    isAnimating = true;
    backIndex = (backIndex + direction + backs.length) % backs.length;
    positionBackCards(true);
    setTimeout(() => { isAnimating = false; }, 400);
    return;
  }
  isAnimating = true;
  currentIndex = (currentIndex + direction + activeCards.length) % activeCards.length;
  positionCards(true);
  // Position merken
  localStorage.setItem('kimanus-lastCard', currentIndex);
  localStorage.setItem('kimanus-visited', 'true');
  setTimeout(() => { isAnimating = false; }, 400);
}

function handleCardTap(i) {
  if (i === currentIndex) {
    // Aktive Karte antippen = Flip
    flipCard();
  }
}

function flipCard() {
  const el = document.getElementById('card-' + currentIndex);
  if (!el) return;
  isFlipped = !isFlipped;
  // Swipe-Hint: verstecken wenn geflippt, zeigen wenn zurueck
  const hb = document.getElementById('swipe-hint-behind');
  if (hb) hb.style.display = isFlipped ? 'none' : 'block';
  backIndex = 0;

  const backTrack = document.getElementById('back-track');
  const wheelTrack = document.getElementById('wheel-track');

  if (isFlipped) {
    el.classList.add('flipped');
    // Hauptrad verstecken, Rückseiten-Rad zeigen
    setTimeout(() => {
      wheelTrack.style.display = 'none';
      backTrack.style.display = 'block';
      buildBackCards();
      positionBackCards(false);
    }, 700); // Nach der Flip-Animation
  } else {
    // Rückseiten-Rad verstecken, Hauptrad zeigen
    backTrack.style.display = 'none';
    wheelTrack.style.display = 'block';
    el.classList.remove('flipped');
    positionCards(false);
  }
  updateFlipLabel();
}

function positionBackCards(animate) {
  const card = activeCards[currentIndex];
  const backs = card.backs || [];
  if (backs.length === 0) return;

  const container = document.getElementById('wheel-container');
  const totalH = container.clientHeight;
  const centerH = 230;
  const remainH = totalH - centerH;
  const topH = Math.floor(remainH * 0.6);
  const bottomH = remainH - topH;
  const topMid = topH / 2;
  const centerMid = topH + (centerH / 2);
  const bottomMid = topH + centerH + (bottomH / 2);
  const cardH = 210;

  backs.forEach((back, i) => {
    const el = document.getElementById('bcard-' + i);
    if (!el) return;

    let diff = i - backIndex;
    if (diff > backs.length / 2) diff -= backs.length;
    if (diff < -backs.length / 2) diff += backs.length;

    // EXAKT wie Hauptrad
    let cardMid;
    if (diff === 0) cardMid = centerMid;
    else if (diff === -1) cardMid = topMid;
    else if (diff === 1) cardMid = bottomMid + 40;
    else if (diff < -1) cardMid = topMid - topH;
    else cardMid = bottomMid + bottomH + 60;

    el.style.top = (cardMid - cardH / 2) + 'px';
    el.style.transition = animate ? 'all 1.2s cubic-bezier(0.23,1,0.32,1)' : 'none';

    if (diff === 0) {
      el.style.opacity = '1';
      el.style.transform = 'scale(1)';
      el.style.zIndex = '10';
    } else if (diff === 1) {
      el.style.opacity = '0.5';
      el.style.transform = 'scale(0.9)';
      el.style.zIndex = '5';
    } else if (diff === -1) {
      el.style.opacity = '0.5';
      el.style.transform = 'scale(0.8)';
      el.style.zIndex = '5';
    } else {
      el.style.opacity = '0';
      el.style.transform = 'scale(0.75)';
      el.style.zIndex = '1';
    }
  });
}

let ytCurrentVideoId = '';

async function ytPaste() {
  try {
    const text = await navigator.clipboard.readText();
    const urlField = document.getElementById('yt-url');
    urlField.textContent = text.trim();
    urlField.style.color = 'rgba(255,255,255,0.5)';
  } catch(e) {
    alert('Clipboard nicht verfügbar. Bitte URL kopieren und nochmal versuchen.');
  }

// Einfache Spracheingabe NUR fuer URL-Feld (kein KIM Chat)
let ytMicRecorder = null;
let ytMicChunks = [];
let ytMicStream = null;
let ytMicActive = false;

function ytMic() {
  if (ytMicActive) {
    ytMicStop();
  } else {
    ytMicStart();
  }
}

async function ytMicStart() {
  try {
    ytMicActive = true;
    const urlField = document.getElementById('yt-url');
    urlField.textContent = '🎤 Sprich jetzt...';
    urlField.style.color = 'rgba(230,57,70,0.5)';

    ytMicStream = await navigator.mediaDevices.getUserMedia({audio:true});
    // Beste Audio-Qualitaet fuer Whisper: mp4 auf iOS, webm auf Android/Desktop
    const mimeOptions = ['audio/mp4', 'audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus'];
    let selectedMime = '';
    for (const mime of mimeOptions) {
      if (MediaRecorder.isTypeSupported(mime)) { selectedMime = mime; break; }
    }
    ytMicRecorder = selectedMime ? new MediaRecorder(ytMicStream, {mimeType:selectedMime}) : new MediaRecorder(ytMicStream);
    ytMicChunks = [];

    ytMicRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) ytMicChunks.push(e.data);
    };

    ytMicRecorder.onstop = async () => {
      const mimeType = ytMicRecorder.mimeType || 'audio/webm';
      const blob = new Blob(ytMicChunks, {type:mimeType});
      if (ytMicStream) { ytMicStream.getTracks().forEach(t=>t.stop()); ytMicStream=null; }
      ytMicActive = false;

      if (blob.size < 1000) {
        urlField.textContent = 'Keine URL';
        urlField.style.color = 'rgba(255,255,255,0.4)';
        return;
      }

      urlField.textContent = '⏳ Erkenne...';

      const formData = new FormData();
      const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
      formData.append('audio', blob, 'recording.' + ext);

      try {
        const resp = await fetch('/api/stt', {method:'POST', body:formData});
        const data = await resp.json();
        const text = (data.text || '').trim();
        if (text) {
          urlField.textContent = text;
          urlField.style.color = 'rgba(255,255,255,0.5)';
        } else {
          urlField.textContent = 'Nicht verstanden - nochmal versuchen';
          urlField.style.color = 'rgba(255,255,255,0.2)';
        }
      } catch(e) {
        urlField.textContent = 'Fehler - nochmal versuchen';
        urlField.style.color = 'rgba(255,255,255,0.2)';
      }
    };

    ytMicRecorder.start(250);

    // Auto-stop nach 8 Sekunden
    setTimeout(() => { if (ytMicActive) ytMicStop(); }, 8000);

  } catch(e) {
    ytMicActive = false;
    console.error('Mic-Fehler:', e);
  }
}

function ytMicStop() {
  ytMicActive = false;
  if (ytMicRecorder && ytMicRecorder.state === 'recording') {
    ytMicRecorder.stop();
  }
}

function ytExtractId(url) {
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : '';
}

function ytGo() {
  const el = document.getElementById('yt-url');
  if (!el) return;
  const text = (el.textContent || '').trim();
  if (!text || text === 'Tippe 🎤 oder 📋' || text === 'Keine URL') return;

  const videoId = ytExtractId(text);
  if (videoId) {
    ytAnalyzeVideo(videoId);
  } else {
    ytSearch(text);
  }
}

  }

  // Zur Player-Glasplatte drehen
  if (isFlipped) {
    backIndex = 1;
    positionBackCards(true);

  // Analyse starten via KIM
  const chaptersWrap = document.getElementById('yt-chapters-wrap');
  if (chaptersWrap) {
    chaptersWrap.innerHTML = '<div style="font-size:11px;color:rgba(230,57,70,0.4);text-align:center">Analysiere Video...</div>';
  }

        agent:'kim',

    }

    if (infoWrap) {
      infoWrap.innerHTML = `

async function ytLoadSaved() {
  const wrap = document.getElementById('yt-saved-wrap');
  if (!wrap) return;
  try {
    const resp = await fetch('/api/video-list');
    const data = await resp.json();
    const videos = data.videos || [];
    if (videos.length === 0) {
      wrap.innerHTML = '<div style="font-size:11px;color:rgba(255,255,255,0.15);text-align:center">Noch keine Videos gespeichert</div>';
      return;
    }

    // Duplikate entfernen
    const seen = new Set();
    const unique = videos.filter(v => {
      const vid = ytExtractId(v.url || '');
      if (vid && !seen.has(vid)) { seen.add(vid); return true; }
      return false;
    });

    wrap.style.scrollbarWidth = 'none';
    wrap.innerHTML = unique.slice(0, 10).map(v => {
      const vid = ytExtractId(v.url || '');
      const title = (v.title || 'Video').slice(0, 40);
      return `<div onclick="ytLoadVideo('${vid}')" style="display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;align-items:center">
        <div style="width:64px;height:42px;flex-shrink:0;position:relative;overflow:hidden">
          <img src="https://img.youtube.com/vi/${vid}/default.jpg" style="width:100%;height:100%;object-fit:cover;opacity:0.7;display:block">
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
            <div style="width:18px;height:18px;background:rgba(230,57,70,0.8);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff">▶</div>
          </div>
        </div>
        <div style="flex:1;font-size:10px;color:rgba(255,255,255,0.3);line-height:1.3">${title}</div>
      </div>`;
    }).join('');

  } catch(e) {
    wrap.innerHTML = '<div style="font-size:11px;color:rgba(255,255,255,0.15)">Fehler beim Laden</div>';
  }
}

  try {
    const resp = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        message: 'Suche die 5 besten YouTube Videos zu: ' + query + '. Antworte EXAKT in diesem Format pro Zeile: NUMMER. TITEL | youtube.com/watch?v=VIDEO_ID - Nur echte YouTube URLs die wirklich existieren!',
        agent:'kim',

        session:'yt-search-' + Date.now()

        const color = colors[idx % colors.length];

          <div style="width:100%;height:100%;display:flex;flex-direction:row;padding:0;overflow:hidden;cursor:${vidId?'pointer':'default'}">

// === SPRACH-PIPELINE ===
let mediaRecorder = null;
let audioChunks = [];
let audioStream = null;

function toggleSpeech() {
  isListening = !isListening;
  const btn = document.getElementById('speech-btn');
  if (isListening) {
    btn.classList.add('listening');
    btn.querySelector('span').textContent = '...';
    startRecording();
  } else {
    btn.classList.remove('listening');
    btn.querySelector('span').textContent = 'KIM';
    stopRecording();
  }
}

async function startRecording() {
  try {
    audioStream = await navigator.mediaDevices.getUserMedia({audio: true});
    mediaRecorder = new MediaRecorder(audioStream);
    audioChunks = [];
    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };
    mediaRecorder.onstop = async () => {
      const mimeType = mediaRecorder.mimeType || 'audio/webm';
      const blob = new Blob(audioChunks, {type: mimeType});
      cleanupMic();
      if (blob.size > 1000) {
        await processVoice(blob, mimeType);
      }
    };
    mediaRecorder.start(250);

    // Auto-Stop nach 10 Sekunden Stille
    setTimeout(() => {
      if (isListening) {
        isListening = false;
        const btn = document.getElementById('speech-btn');
        btn.classList.remove('listening');
        btn.querySelector('span').textContent = 'KIM';
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mediaRecorder.stop();
        }
      }
    }, 10000);
  } catch(err) {
    console.error('Mikrofon-Fehler:', err);
    isListening = false;
    document.getElementById('speech-btn').classList.remove('listening');
    document.getElementById('speech-btn').querySelector('span').textContent = 'KIM';
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

function cleanupMic() {
  if (audioStream) {
    audioStream.getTracks().forEach(t => t.stop());
    audioStream = null;
  }
}

async function processVoice(blob, mimeType) {
  const btn = document.getElementById('speech-btn');
  btn.querySelector('span').textContent = '⏳';

  // 1. Sprache -> Text (Groq Whisper)
  const formData = new FormData();
  const ext = mimeType.includes('mp4') ? 'mp4' : mimeType.includes('webm') ? 'webm' : 'wav';
  formData.append('audio', blob, 'recording.' + ext);

  try {
    const sttResp = await fetch('/api/stt', {method:'POST', body:formData});
    const sttData = await sttResp.json();
    const userText = sttData.text || '';

    if (!userText.trim()) {
      btn.querySelector('span').textContent = '❌';
      setTimeout(() => btn.querySelector('span').textContent = 'KIM', 2000);
      return;
    }

    // Pruefen ob wir im YouTube Scout sind
    const currentCard = activeCards[currentIndex];
    const ytUrlField = document.getElementById('yt-url');

    if (currentCard && currentCard.id === 'yt-scout' && ytUrlField) {
      // Im YouTube Scout: Text ins URL-Feld oder direkt an KIM
      const videoId = ytExtractId(userText);
      if (videoId) {
        // User hat eine URL gesprochen
        ytUrlField.textContent = userText;
        ytUrlField.style.color = 'rgba(255,255,255,0.5)';
        btn.querySelector('span').textContent = 'KIM';
        ytAnalyze();
        return;
      }
      // Kein URL - als Suchanfrage an KIM weiterleiten
    }

    // Zeige erkannten Text auf der Glasplatte
    const centerCardEl = document.getElementById('card-' + currentIndex);
    if (centerCardEl && !isFlipped) {
      const front = centerCardEl.querySelector('.card-front');
      if (front) {
        front.innerHTML = `
          <div style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:14px 18px">
            <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:8px">🗣️ Du sagst:</div>
            <div style="font-size:15px;color:rgba(255,255,255,0.5);text-align:center;line-height:1.6">${userText}</div>
            <div style="font-size:10px;color:rgba(230,57,70,0.4);margin-top:12px">KIM denkt nach...</div>
          </div>
        `;
      }
    }

    btn.querySelector('span').textContent = '💬';

    // 2. Text -> KIM (Chat API)
    const chatResp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        message: userText,
        agent: 'kim',
        model: 'groq-llama',
        session: 'wheel-' + Date.now()
      })
    });

    let kimAnswer = '';
    const contentType = chatResp.headers.get('content-type') || '';

    if (contentType.includes('application/json')) {
      // Einfache JSON-Antwort
      const data = await chatResp.json();
      kimAnswer = data.output || data.text || data.answer || '';
    } else {
      // Streaming (SSE)
      const reader = chatResp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream:true});
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const d = JSON.parse(line.slice(6));
              if (d.token) kimAnswer += d.token;
              if (d.full) kimAnswer = d.full;
              if (d.output) kimAnswer = d.output;
            } catch(e) {}
          }
        }
      }
    }

    // 3. Antwort auf die Glasplatte projizieren
    if (kimAnswer) {
      showKimResponse(userText, kimAnswer);
    }

  } catch(err) {
    console.error('Pipeline-Fehler:', err);
  }

  btn.querySelector('span').textContent = 'KIM';
}

function showKimResponse(question, answer) {
  const currentCard = activeCards[currentIndex];

  // Im YouTube Scout: Antwort auf die Kapitel-Glasplatte
  if (currentCard && currentCard.id === 'yt-scout' && isFlipped) {
    const chaptersWrap = document.getElementById('yt-chapters-wrap');
    if (chaptersWrap) {
      chaptersWrap.innerHTML = `
        <div style="font-size:11px;color:rgba(255,255,255,0.25);margin-bottom:6px">🗣️ ${question}</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.35);line-height:1.8;white-space:pre-line">${answer}</div>`;
    }
    // Zur Kapitel-Glasplatte drehen
    backIndex = 2;
    positionBackCards(true);
    return;
  }

  // Normal: Auf der aktiven Glasplatte anzeigen
  if (isFlipped) {
    const bcard = document.getElementById('bcard-' + backIndex);
    if (bcard) {
      bcard.innerHTML = `
        <div style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:flex-start;padding:14px 18px;overflow-y:auto">
          <div style="font-size:11px;color:rgba(255,255,255,0.25);margin-bottom:6px">🗣️ ${question}</div>
          <div style="font-size:13px;color:rgba(255,255,255,0.4);line-height:1.6;white-space:pre-line">${answer}</div>
        </div>`;
    }
  } else {
    const centerCardEl = document.getElementById('card-' + currentIndex);
    if (!centerCardEl) return;
    const front = centerCardEl.querySelector('.card-front');
    if (front) {
      front.innerHTML = `
        <div style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:flex-start;padding:14px 18px;overflow-y:auto">
          <div style="font-size:11px;color:rgba(255,255,255,0.25);margin-bottom:6px">🗣️ ${question}</div>
          <div style="font-size:13px;color:rgba(255,255,255,0.4);line-height:1.6;white-space:pre-line">${answer}</div>
        </div>`;
    }
  }
}

function demoKimAction() {
  document.getElementById('status-text').textContent = 'KIM: "Hier ist das Wetter!"';
  if (isFlipped) flipCard();
  const target = activeCards.findIndex(c => c.id === 'wetterfrosch');
  animateToCard(target, () => setTimeout(flipCard, 500));
}

function animateToCard(target, cb) {
  if (currentIndex === target) { if (cb) cb(); return; }
  const iv = setInterval(() => {
    if (currentIndex === target) { clearInterval(iv); if (cb) cb(); return; }
    const diff = (target - currentIndex + activeCards.length) % activeCards.length;
    spinWheel(diff <= activeCards.length / 2 ? 1 : -1);
  }, 250);
}

function showKeyboard() { alert('Tastatur - kommt noch!'); }

// Touch - vertikal=Rad drehen, horizontal=Flip
let dragStartY = 0;
let dragStartX = 0;
const wc = document.getElementById('wheel-container');

wc.addEventListener('touchstart', e => {
  dragStartY = e.touches[0].clientY;
  dragStartX = e.touches[0].clientX;
}, {passive:true});
wc.addEventListener('touchend', e => {
  const diffY = dragStartY - e.changedTouches[0].clientY;
  const diffX = e.changedTouches[0].clientX - dragStartX;
  // Horizontal stärker = Flip
  if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
    flipCard();
  }
  // Vertikal stärker = Rad drehen
  else if (Math.abs(diffY) > 40) {
    spinWheel(diffY > 0 ? 1 : -1);
  }
}, {passive:true});

// Mouse
wc.addEventListener('mousedown', e => { dragStartY = e.clientY; dragStartX = e.clientX; });
wc.addEventListener('mouseup', e => {
  const diffY = dragStartY - e.clientY;
  const diffX = e.clientX - dragStartX;
  if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
    flipCard();
  } else if (Math.abs(diffY) > 40) {
    spinWheel(diffY > 0 ? 1 : -1);
  }
});

// Scroll wheel
wc.addEventListener('wheel', e => {
  e.preventDefault();
  spinWheel(e.deltaY > 0 ? 1 : -1);
}, {passive:false});

// Init
init();
</script>
