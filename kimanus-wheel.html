<!DOCTYPE html>
<!-- KIMANUS Wheel v2.0 - Echte 3D-Drehanimation -->
<html lang="de" style="color-scheme:dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0e">
<title>KIMANUS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{height:100dvh;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0e0e0e;color:#e0e0e0}

:root{
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --kim-red:#e63946;
}

#app{
  display:flex;flex-direction:column;
  height:100dvh;
  padding-top:var(--sat);padding-bottom:var(--sab);
  position:fixed;inset:0;
}

/* === HEADER === */
#header{
  display:flex;align-items:center;gap:8px;
  padding:6px 12px;
  background:#161616;
  border-bottom:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;z-index:20;
}
.logo-circle{
  width:30px;height:30px;border-radius:50%;
  background:var(--kim-red);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:14px;color:#fff;
}
#header .title{font-size:18px;font-weight:800;letter-spacing:3px;flex:1}
#header .hdr-btn{background:none;border:none;cursor:pointer;padding:4px}
#header .hdr-btn svg{width:22px;height:22px;fill:#888}

/* === DREI GLEICH GROSSE FELDER === */
#wheel-container{
  flex:1;display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}

.panel{
  flex:1;position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* Milchiges Glas oben */
#panel-top{
  position:relative;
}
#panel-top::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(14,14,14,0.85) 0%, rgba(14,14,14,0.3) 80%, transparent 100%);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  pointer-events:none;z-index:2;
}

/* Sichtfenster - klar */
#panel-center{
  position:relative;z-index:5;
}

/* Milchiges Glas unten */
#panel-bottom{
  position:relative;
}
#panel-bottom::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(0deg, rgba(14,14,14,0.85) 0%, rgba(14,14,14,0.3) 80%, transparent 100%);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  pointer-events:none;z-index:2;
}

/* === RAD-MECHANISMUS === */
#wheel-track{
  position:absolute;
  left:12px;right:12px;
  transition:transform 0.5s cubic-bezier(0.23,1,0.32,1);
  will-change:transform;
}

.wheel-card{
  width:100%;
  position:absolute;left:0;
  border-radius:12px;
  background:#1a1a1a;
  border:1px solid rgba(255,255,255,0.08);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  perspective:800px;
}

/* Card-Inneres fuer Flip */
.card-inner{
  width:100%;height:100%;
  position:relative;
  transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);
  transform-style:preserve-3d;
}
.wheel-card.flipped .card-inner{
  transform:rotateX(180deg);
}

.card-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:12px;
  padding:16px;
}

/* Vorderseite */
.card-front{
  background:#1a1a1a;
}
.card-front .card-icon{font-size:48px;margin-bottom:12px}
.card-front .card-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
.card-front .card-subtitle{font-size:12px;color:#888;letter-spacing:1px;text-transform:uppercase}

/* Rückseite */
.card-back{
  background:#1e1e1e;
  transform:rotateX(180deg);
}
.card-back .back-title{
  font-size:14px;font-weight:600;color:#ccc;
  text-transform:uppercase;letter-spacing:1px;
  margin-bottom:12px;
}
.card-back .back-content{
  font-size:14px;color:#999;text-align:center;line-height:1.8;
  white-space:pre-line;
}

/* Farbstreifen links */
.wheel-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  border-radius:12px 0 0 12px;
  z-index:1;
}

/* === FLIP LABEL (Vorderseite oben beim Flip) === */
#flip-label{
  display:none;
  position:absolute;top:8px;left:16px;right:16px;
  z-index:20;
  padding:8px 12px;
  background:rgba(26,26,26,0.9);
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.08);
  align-items:center;gap:10px;
}
#flip-label.visible{display:flex}
#flip-label .fl-icon{font-size:24px}
#flip-label .fl-title{font-size:14px;font-weight:700;color:#fff}
#flip-label .fl-sub{font-size:10px;color:#888;text-transform:uppercase}

/* === REGISTER === */
#register-panel{
  display:none;
  position:absolute;bottom:0;left:0;right:0;
  height:33.33%;z-index:15;
  background:#161616;
  border-top:1px solid rgba(255,255,255,0.08);
}
#register-panel.visible{display:flex;flex-direction:column}
#register-tabs{flex:1;overflow-y:auto;padding:6px 12px;scrollbar-width:none}
#register-tabs::-webkit-scrollbar{display:none}
.register-tab{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,0.04);
  cursor:pointer;
}
.register-tab:active{background:rgba(255,255,255,0.06)}
.register-tab .tab-icon{font-size:20px}
.register-tab .tab-name{font-size:14px;font-weight:600;color:#ccc;flex:1}

/* === BOTTOM BAR === */
#bottom-bar{
  display:flex;align-items:center;justify-content:center;gap:20px;
  padding:10px 16px;padding-bottom:calc(10px + var(--sab));
  background:#161616;
  border-top:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;z-index:20;
}

#speech-btn{
  width:60px;height:60px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#ff4d5a 0%,var(--kim-red) 50%,#b81c2a 100%);
  border:2px solid rgba(255,255,255,0.15);
  box-shadow:0 4px 20px rgba(230,57,70,0.4);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform 0.15s;
}
#speech-btn:active{transform:scale(0.9)}
#speech-btn svg{width:28px;height:28px;fill:#fff}
#speech-btn.listening{animation:pulse 1.5s infinite}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(230,57,70,0.5)}
  70%{box-shadow:0 0 0 15px rgba(230,57,70,0)}
  100%{box-shadow:0 0 0 0 rgba(230,57,70,0)}
}

.small-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.small-btn:active{transform:scale(0.9);background:rgba(255,255,255,0.1)}
.small-btn svg{width:18px;height:18px;fill:#888}

/* Status */
#status-text{
  position:absolute;bottom:85px;left:0;right:0;
  text-align:center;font-size:11px;color:#555;letter-spacing:1px;
  z-index:25;pointer-events:none;
}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="logo-circle">K</div>
    <span class="title">KIMANUS</span>
    <button class="hdr-btn" onclick="toggleRegister()">
      <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
  </div>

  <div id="wheel-container">
    <div id="flip-label">
      <span class="fl-icon" id="fl-icon"></span>
      <div>
        <div class="fl-title" id="fl-title"></div>
        <div class="fl-sub" id="fl-sub"></div>
      </div>
    </div>

    <div class="panel" id="panel-top"></div>
    <div class="panel" id="panel-center"></div>
    <div class="panel" id="panel-bottom"></div>

    <div id="wheel-track"></div>
    <div id="register-panel"><div id="register-tabs"></div></div>
  </div>

  <div id="status-text"></div>

  <div id="bottom-bar">
    <div class="small-btn" onclick="toggleRegister()">
      <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
    </div>
    <div class="small-btn" onclick="showKeyboard()">
      <svg viewBox="0 0 24 24"><path d="M20 5H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-9 3h2v2h-2V8zm0 3h2v2h-2v-2zM8 8h2v2H8V8zm0 3h2v2H8v-2zm-1 2H5v-2h2v2zm0-3H5V8h2v2zm9 7H8v-2h8v2zm0-4h-2v-2h2v2zm0-3h-2V8h2v2zm3 3h-2v-2h2v2zm0-3h-2V8h2v2z"/></svg>
    </div>
    <button id="speech-btn" onclick="toggleSpeech()">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <div class="small-btn" onclick="showKeyboard()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </div>
    <div class="small-btn" onclick="alert('Einstellungen')">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.6 3.6 0 0112 15.6z"/></svg>
    </div>
  </div>
</div>

<script>
const CARDS = [
  {id:'kim', icon:'👤', title:'KIM', subtitle:'Dein Assistent', color:'#e63946',
   backs:[
     {title:'Über KIM', content:'Dein persönlicher Assistent.\nFrag mich einfach was du brauchst!'},
     {title:'Fähigkeiten', content:'Termine • Wetter • Erinnerungen\nRecherche • Empfehlungen'},
     {title:'Letzte Gespräche', content:'Heute: Wetter abgefragt\nGestern: Termin eingetragen'},
   ]},
  {id:'kai', icon:'💼', title:'KAI', subtitle:'Business-Berater', color:'#4a90d9',
   backs:[
     {title:'Über KAI', content:'Dein Business-Berater.\nKalkulation, Einkauf und Geschäft.'},
     {title:'Services', content:'Rohaufschlag • Preisvergleich\nBestellungen • Lieferanten'},
   ]},
  {id:'wetterfrosch', icon:'🌤️', title:'Wetterfrosch', subtitle:'Meteorologe', color:'#4caf50',
   backs:[
     {title:'Aktuelles Wetter', content:'Nürnberg: 14°C, bewölkt\nRegenwahrscheinlichkeit: 20%'},
     {title:'Wochenvorschau', content:'Mo: ☀️ 16°C\nDi: 🌧️ 12°C\nMi: ⛅ 14°C'},
   ]},
  {id:'animateur', icon:'🎯', title:'Animateur', subtitle:'Freizeit & Events', color:'#ff9800',
   backs:[
     {title:'In der Nähe', content:'Kaiserburg Nürnberg (2km)\nTiergarten (5km)'},
     {title:'Empfehlung', content:'Bei dem Wetter:\nBiergarten am Dutzendteich!'},
   ]},
  {id:'kalkulierer', icon:'🧮', title:'Kalkulierer', subtitle:'Rohaufschlag-Experte', color:'#9c27b0',
   backs:[
     {title:'Letzte Kalkulation', content:'Schnitzel: WEK 4.20€ → VK 12.90€\nRohaufschlag: 207%'},
   ]},
  {id:'sekretaer', icon:'📅', title:'Sekretär', subtitle:'Termine', color:'#607d8b',
   backs:[
     {title:'Heute', content:'14:00 Zahnarzt\n16:30 Jannick anrufen'},
     {title:'Diese Woche', content:'Mi: Steuerberater\nFr: Lieferant Getränke'},
   ]},
  {id:'capcoin', icon:'🪙', title:'Cap-Coin', subtitle:'Sammeln & Einlösen', color:'#d4a017',
   backs:[
     {title:'Dein Guthaben', content:'127 Cap-Coins\n= 12,70 EUR'},
     {title:'Zuletzt gesammelt', content:'Brauerei Schlenkerla: +5\nGasthof Krone: +3'},
   ]},
];

const REGISTERS = [
  {icon:'👥', name:'Agenten'},
  {icon:'💳', name:'Clubkarten'},
  {icon:'🌐', name:'Webseiten'},
  {icon:'🖼️', name:'Bilderrahmen'},
  {icon:'🪙', name:'Cap-Coin'},
  {icon:'📱', name:'Meine Apps'},
  {icon:'📁', name:'Projektordner'},
  {icon:'📧', name:'E-Mail'},
  {icon:'🔒', name:'Schliessfach'},
];

let currentIndex = 0;
let isFlipped = false;
let backIndex = 0;
let isListening = false;
let registerOpen = false;
let panelH = 0;
let isAnimating = false;

function init() {
  calcSizes();
  buildCards();
  positionCards(false);
  window.addEventListener('resize', () => { calcSizes(); positionCards(false); });
}

function calcSizes() {
  const container = document.getElementById('wheel-container');
  panelH = Math.floor(container.clientHeight / 3);
}

function buildCards() {
  const track = document.getElementById('wheel-track');
  track.innerHTML = CARDS.map((card, i) => `
    <div class="wheel-card" id="card-${i}" style="height:${panelH - 12}px" onclick="handleCardTap(${i})">
      <div class="card-inner">
        <div class="card-face card-front" style="border-left:3px solid ${card.color}">
          <div class="card-icon">${card.icon}</div>
          <div class="card-title">${card.title}</div>
          <div class="card-subtitle">${card.subtitle}</div>
        </div>
        <div class="card-face card-back" style="border-left:3px solid ${card.color}">
          <div class="back-title" id="back-title-${i}">${card.backs?.[0]?.title || ''}</div>
          <div class="back-content" id="back-content-${i}">${card.backs?.[0]?.content || ''}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function positionCards(animate) {
  CARDS.forEach((card, i) => {
    const el = document.getElementById('card-' + i);
    if (!el) return;
    el.style.height = (panelH - 12) + 'px';

    const offset = getOffset(i);
    const y = panelH + (offset * panelH); // panelH = Mitte des Sichtfensters
    el.style.top = (y - (panelH - 12) / 2) + 'px';
    el.style.transition = animate ? 'all 0.5s cubic-bezier(0.23,1,0.32,1)' : 'none';

    if (offset === 0) {
      el.style.opacity = '1';
      el.style.transform = 'scale(1)';
      el.style.zIndex = '10';
    } else if (Math.abs(offset) === 1) {
      el.style.opacity = '0.5';
      el.style.transform = 'scale(0.9)';
      el.style.zIndex = '5';
    } else {
      el.style.opacity = '0';
      el.style.transform = 'scale(0.8)';
      el.style.zIndex = '1';
    }
  });
  updateStatus();
  updateFlipLabel();
}

function getOffset(i) {
  let diff = i - currentIndex;
  if (diff > CARDS.length / 2) diff -= CARDS.length;
  if (diff < -CARDS.length / 2) diff += CARDS.length;
  return diff;
}

function spinWheel(direction) {
  if (isAnimating) return;
  if (isFlipped) {
    // Rückseiten-Rad drehen
    const backs = CARDS[currentIndex].backs || [];
    if (backs.length <= 1) return;
    backIndex = (backIndex + direction + backs.length) % backs.length;
    updateBackContent();
    return;
  }
  isAnimating = true;
  currentIndex = (currentIndex + direction + CARDS.length) % CARDS.length;
  positionCards(true);
  setTimeout(() => { isAnimating = false; }, 500);
}

function handleCardTap(i) {
  if (i === currentIndex) {
    // Aktive Karte antippen = Flip
    flipCard();
  }
}

function flipCard() {
  const el = document.getElementById('card-' + currentIndex);
  if (!el) return;
  isFlipped = !isFlipped;
  backIndex = 0;

  if (isFlipped) {
    el.classList.add('flipped');
    updateBackContent();
  } else {
    el.classList.remove('flipped');
  }
  updateFlipLabel();
  updateStatus();
}

function updateBackContent() {
  const card = CARDS[currentIndex];
  const backs = card.backs || [];
  if (backs.length === 0) return;
  const back = backs[backIndex];
  const titleEl = document.getElementById('back-title-' + currentIndex);
  const contentEl = document.getElementById('back-content-' + currentIndex);
  if (titleEl) titleEl.textContent = back.title;
  if (contentEl) contentEl.textContent = back.content;
}

function updateFlipLabel() {
  const fl = document.getElementById('flip-label');
  if (isFlipped) {
    const card = CARDS[currentIndex];
    document.getElementById('fl-icon').textContent = card.icon;
    document.getElementById('fl-title').textContent = card.title;
    document.getElementById('fl-sub').textContent = `Seite ${backIndex + 1} von ${card.backs?.length || 0}`;
    fl.classList.add('visible');
  } else {
    fl.classList.remove('visible');
  }
}

function updateStatus() {
  const card = CARDS[currentIndex];
  document.getElementById('status-text').textContent = card.title;
}

// Register
function toggleRegister() {
  registerOpen = !registerOpen;
  const p = document.getElementById('register-panel');
  if (registerOpen) {
    p.classList.add('visible');
    p.innerHTML = '<div id="register-tabs">' + REGISTERS.map((r, i) =>
      `<div class="register-tab" onclick="selectRegister(${i})">
        <span class="tab-icon">${r.icon}</span>
        <span class="tab-name">${r.name}</span>
      </div>`
    ).join('') + '</div>';
  } else {
    p.classList.remove('visible');
  }
}
function selectRegister(i) { toggleRegister(); }

// Speech
function toggleSpeech() {
  isListening = !isListening;
  const btn = document.getElementById('speech-btn');
  if (isListening) {
    btn.classList.add('listening');
    document.getElementById('status-text').textContent = 'Kim hört zu...';
    setTimeout(() => {
      btn.classList.remove('listening');
      isListening = false;
      demoKimAction();
    }, 3000);
  } else {
    btn.classList.remove('listening');
    updateStatus();
  }
}

function demoKimAction() {
  document.getElementById('status-text').textContent = 'KIM: "Hier ist das Wetter!"';
  if (isFlipped) flipCard();
  const target = CARDS.findIndex(c => c.id === 'wetterfrosch');
  animateToCard(target, () => setTimeout(flipCard, 500));
}

function animateToCard(target, cb) {
  if (currentIndex === target) { if (cb) cb(); return; }
  const iv = setInterval(() => {
    if (currentIndex === target) { clearInterval(iv); if (cb) cb(); return; }
    const diff = (target - currentIndex + CARDS.length) % CARDS.length;
    spinWheel(diff <= CARDS.length / 2 ? 1 : -1);
  }, 250);
}

function showKeyboard() { alert('Tastatur - kommt noch!'); }

// Touch
let dragStartY = 0;
const wc = document.getElementById('wheel-container');

wc.addEventListener('touchstart', e => { dragStartY = e.touches[0].clientY; }, {passive:true});
wc.addEventListener('touchend', e => {
  const diff = dragStartY - e.changedTouches[0].clientY;
  if (Math.abs(diff) > 40) spinWheel(diff > 0 ? 1 : -1);
}, {passive:true});

// Mouse
wc.addEventListener('mousedown', e => { dragStartY = e.clientY; });
wc.addEventListener('mouseup', e => {
  const diff = dragStartY - e.clientY;
  if (Math.abs(diff) > 40) spinWheel(diff > 0 ? 1 : -1);
});

// Scroll wheel
wc.addEventListener('wheel', e => {
  e.preventDefault();
  spinWheel(e.deltaY > 0 ? 1 : -1);
}, {passive:false});

// Init
init();
</script>
</body>
</html>
