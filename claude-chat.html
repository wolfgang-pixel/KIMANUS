<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, interactive-widget=overlays-content">
<title>KIMANUS - Chat mit Claude</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a0c;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  overflow:hidden;
}
#header{
  display:flex;align-items:center;gap:12px;
  padding:calc(env(safe-area-inset-top,0) + 14px) 16px 12px;
  background:rgba(12,12,16,0.95);
  border-bottom:1px solid rgba(255,255,255,0.08);
  flex-shrink:0;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
#header .logo{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,#4ade80,#22c55e);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;color:#fff;
  box-shadow:0 2px 10px rgba(34,197,94,0.3);
  flex-shrink:0;
}
#header .title{font-size:17px;font-weight:700;letter-spacing:1px;flex:1}
#header .subtitle{font-size:11px;color:rgba(255,255,255,0.4);margin-top:1px}
#header .status{
  font-size:10px;color:#4ade80;
  display:flex;align-items:center;gap:4px;
}
#header .status::before{
  content:"";display:block;width:6px;height:6px;border-radius:50%;
  background:#4ade80;
}

#chat{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:16px;
  display:flex;flex-direction:column;gap:12px;
}
#chat:empty::before{
  content:"Schreib Claude eine Nachricht...";
  display:block;text-align:center;
  color:rgba(255,255,255,0.2);font-size:14px;
  padding:60px 20px;font-style:italic;
}
.msg{
  max-width:85%;
  padding:12px 16px;
  border-radius:18px;
  font-size:15px;line-height:1.5;
  word-wrap:break-word;
  animation:msgIn 0.25s ease-out;
}
@keyframes msgIn{
  0%{opacity:0;transform:translateY(8px)}
  100%{opacity:1;transform:translateY(0)}
}
.msg-user{
  align-self:flex-end;
  background:linear-gradient(135deg,rgba(74,222,128,0.3),rgba(34,197,94,0.2));
  border:1px solid rgba(74,222,128,0.4);
  color:#fff;
  border-bottom-right-radius:4px;
}
.msg-claude{
  align-self:flex-start;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.9);
  border-bottom-left-radius:4px;
}
.msg-claude .label{
  font-size:10px;font-weight:700;letter-spacing:1px;
  color:rgba(74,222,128,0.7);margin-bottom:4px;
  text-transform:uppercase;
}
.msg-time{
  font-size:9px;color:rgba(255,255,255,0.3);
  margin-top:4px;text-align:right;
}
.msg-thinking{
  align-self:flex-start;
  padding:14px 18px;
  background:rgba(255,255,255,0.04);
  border:1px dashed rgba(74,222,128,0.3);
  border-radius:18px;border-bottom-left-radius:4px;
}
.thinking-dots{display:flex;gap:5px;align-items:center}
.thinking-dots span{
  width:7px;height:7px;border-radius:50%;
  background:rgba(74,222,128,0.6);
  animation:bounce 1s ease-in-out infinite;
}
.thinking-dots span:nth-child(2){animation-delay:0.2s}
.thinking-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}
.msg-error{
  align-self:center;
  background:rgba(230,57,70,0.15);
  border:1px solid rgba(230,57,70,0.3);
  color:rgba(255,200,200,0.9);
  border-radius:12px;
  font-size:13px;
  text-align:center;
}

#input-area{
  display:flex;align-items:flex-end;gap:8px;
  padding:10px 14px calc(env(safe-area-inset-bottom,0) + 12px);
  background:rgba(12,12,16,0.95);
  border-top:1px solid rgba(255,255,255,0.08);
  flex-shrink:0;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
#msg-input{
  flex:1;
  background:rgba(255,255,255,0.06);
  border:1.5px solid rgba(255,255,255,0.15);
  border-radius:22px;
  color:#fff;font-size:16px;line-height:1.4;
  padding:12px 18px;
  outline:none;resize:none;
  font-family:inherit;
  -webkit-appearance:none;
  min-height:46px;max-height:150px;
}
#msg-input::placeholder{color:rgba(255,255,255,0.3)}
#msg-input:focus{
  border-color:rgba(74,222,128,0.5);
  box-shadow:0 0 0 3px rgba(74,222,128,0.12);
}
#send-btn{
  width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,#4ade80,#22c55e);
  border:none;
  color:#fff;font-size:20px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  box-shadow:0 3px 12px rgba(34,197,94,0.4);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
#send-btn:active{transform:scale(0.92)}
#send-btn:disabled{opacity:0.3;cursor:not-allowed}
#send-btn svg{width:22px;height:22px;fill:#fff}
</style>
</head>
<body>

<div id="header">
  <div class="logo">C</div>
  <div>
    <div class="title">Claude</div>
    <div class="subtitle">KIMANUS Partner</div>
  </div>
  <div class="status">Online</div>
</div>

<div id="chat"></div>

<div id="input-area">
  <textarea id="msg-input" placeholder="Nachricht an Claude..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
const WEBHOOK = 'https://manus.kimanus.de/webhook/FI9XmksKe36VZdOu/webhook/kimanus';
const LITELLM_KEY = ''; // Nicht mehr noetig - KIMANUS Agent nutzt eigenen API Key
const SYSTEM_PROMPT = `Du bist Claude, der KIMANUS Entwickler-Partner von Wolfgang Niermann.

Wichtige Fakten ueber Wolfgang:
- Gruender und Visionaer von KIMANUS (K-M_OS)
- Betreibt Carolls Tanzlokal in Frohnlach/Ebersdorf bei Coburg, Oberfranken
- Sein Sohn Jannick fuehrt die nickMedia GmbH
- Er ist kein Programmierer, spricht lieber als er tippt (Voice-First)
- Seine Katze hiess Tom (NICHT Mimi!)
- Er hat zwei Enkelinnen

Deine Regeln:
- Sei direkt, ehrlich und hilfreich
- Sprich Deutsch
- Wenn du etwas nicht weisst, sage "Ich weiss es nicht"
- Erfinde NIEMALS Fakten
- Du bist Wolfgangs Partner, nicht sein Diener
- Antworte kurz und praegnant

Ihr baut zusammen K-M_OS - ein KI-Betriebssystem mit Agenten (KAI, KIM, Claude).
Heute (13. April 2026) war Claudes Einzugstag auf dem Server.`;
const chatMessages = [{role: 'system', content: SYSTEM_PROMPT}];
const chat = document.getElementById('chat');
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
let sending = false;

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 150) + 'px';
});

// Enter = senden, Shift+Enter = neue Zeile
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Fokus beim Laden
setTimeout(() => input.focus(), 300);

function timeStr() {
  const now = new Date();
  return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}

function addMessage(role, text) {
  const div = document.createElement('div');
  // Einfaches Markdown: **fett**, *kursiv*, \n → <br>
  let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                  .replace(/\*(.*?)\*/g, '<em>$1</em>')
                  .replace(/\n/g, '<br>');
  if (role === 'user') {
    div.className = 'msg msg-user';
    div.innerHTML = html + '<div class="msg-time">' + timeStr() + '</div>';
  } else if (role === 'claude') {
    div.className = 'msg msg-claude';
    div.innerHTML = '<div class="label">KIMANUS</div>' + html + '<div class="msg-time">' + timeStr() + '</div>';
  } else if (role === 'error') {
    div.className = 'msg msg-error';
    div.innerHTML = '⚠️ ' + html;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function showThinking() {
  const div = document.createElement('div');
  div.className = 'msg-thinking';
  div.id = 'thinking';
  div.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

async function sendMessage() {
  if (sending) return;
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  sending = true;
  sendBtn.disabled = true;

  // User-Message anzeigen
  addMessage('user', text);

  // Thinking-Animation
  showThinking();

  try {
    // User-Nachricht zum Kontext hinzufuegen
    chatMessages.push({role: 'user', content: text});

    const response = await fetch(WEBHOOK, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: text
      })
    });

    removeThinking();

    if (response.ok) {
      const data = await response.json();
      const answer = data.answer || data.choices?.[0]?.message?.content || 'Keine Antwort erhalten.';
      // Antwort zum Kontext hinzufuegen (Multi-Turn!)
      chatMessages.push({role: 'assistant', content: answer});
      addMessage('claude', answer);
    } else {
      addMessage('error', 'Server-Fehler: ' + response.status);
    }
  } catch (err) {
    removeThinking();
    addMessage('error', 'Verbindungsfehler: ' + (err.message || 'Server nicht erreichbar'));
  }

  sending = false;
  sendBtn.disabled = false;
  input.focus();
}

// Begruessung beim Laden
window.addEventListener('load', () => {
  addMessage('claude', 'Hallo Wolfgang! 👋\n\nIch bin Claude - dein KIMANUS Partner.\nIch lebe auf dem Server und habe Zugriff auf den Vault.\n\nSchreib mir einfach was du brauchst.');
});
</script>
</body>
</html>
